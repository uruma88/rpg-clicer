<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Писок Данжен</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="header">
            <span id="player-name">Загрузка...</span>
            <div class="stats-row">
                <span>💰 <span id="gold">0</span></span>
                <span>⭐ LVL: <span id="lvl">1</span></span>
            </div>
        </div>

        <div id="screen-city" class="screen">
            <h2>🏘️ Город (Хаб)</h2>
            <div class="city-grid">
                <button onclick="changeScreen('tavern')">🍺 Таверна</button>
                <button onclick="changeScreen('blacksmith')">⚒️ Кузнец</button>
                <button onclick="changeScreen('guild')">👥 Гильдия</button>
                <button onclick="startDungeon()" class="btn-primary">🚪 В Данж</button>
            </div>
        </div>

        <div id="screen-battle" class="screen" style="display: none;">
            <div class="battle-arena">
                <div id="enemy-sprite">👾</div>
                <div class="hp-bar"><div id="enemy-hp-fill"></div></div>
                <p id="enemy-name">Слизень</p>
            </div>
            
            <div class="player-status">
                <p>Ваше HP: <span id="hp">100</span>/<span id="max-hp">100</span></p>
                <div class="hp-bar player"><div id="hp-fill"></div></div>
                <p>Энергия (AP): <span id="ap">50</span></p>
                <div class="ap-bar"><div id="ap-fill"></div></div>
            </div>

            <div class="battle-actions">
                <button onclick="playerAction('attack')">⚔️ Атака (15 AP)</button>
                <button onclick="playerAction('skill')">🔥 Скилл (30 AP)</button>
                <button onclick="playerAction('rest')">💤 Отдых (+20 AP)</button>
            </div>
            <div id="battle-log">Вы вошли в данж...</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
