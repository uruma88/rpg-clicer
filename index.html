<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PISOK RPG: UNLIMITED</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0f0f13; --card: #1c1c24; --accent: #f1c40f;
            --warrior: #e74c3c; --mage: #3498db; --thief: #2ecc71;
            --rare: #3498db; --epic: #9b59b6;
        }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; }
        #game-container { max-width: 500px; margin: 0 auto; min-height: 100vh; background: var(--bg); position: relative; }
        
        .screen { display: none; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; }
        .active { display: flex; }

        /* Красивые карточки */
        .glass-card {
            background: var(--card); border: 1px solid #ffffff10;
            border-radius: 20px; width: 100%; padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 15px;
        }

        /* Аватар и профиль */
        .profile-section { display: flex; align-items: center; gap: 20px; }
        .avatar-frame {
            width: 80px; height: 80px; border-radius: 20px;
            border: 3px solid var(--accent); overflow: hidden;
            box-shadow: 0 0 15px var(--accent);
        }
        .avatar-frame img { width: 100%; height: 100%; object-fit: cover; }

        /* Полоски прогресса */
        .progress-container { width: 100%; background: #000; height: 12px; border-radius: 6px; margin-top: 8px; overflow: hidden; position: relative; }
        .progress-fill { height: 100%; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .progress-text { position: absolute; width: 100%; text-align: center; font-size: 9px; line-height: 12px; font-weight: 900; }

        /* Сетка инвентаря */
        .inventory-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
            background: #00000050; padding: 15px; border-radius: 15px; width: 100%;
        }
        .item-slot {
            aspect-ratio: 1; background: #252530; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; border: 1px solid #333; cursor: pointer; transition: 0.2s;
        }
        .item-slot:active { transform: scale(0.9); }

        /* Кнопки */
        .btn {
            width: 100%; padding: 18px; border: none; border-radius: 15px;
            font-weight: 800; font-size: 16px; cursor: pointer;
            transition: 0.3s; color: white; margin-bottom: 10px;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-battle { background: linear-gradient(135deg, #ff416c, #ff4b2b); box-shadow: 0 5px 15px rgba(255, 65, 108, 0.4); }
        .btn-work { background: linear-gradient(135deg, #4776e6, #8e54e9); }
        .btn-rest { background: linear-gradient(135deg, #11998e, #38ef7d); }

        /* Лог боя */
        #battle-log { height: 100px; overflow-y: auto; font-size: 13px; color: #aaa; width: 100%; margin-top: 15px; }

        /* Выбор класса */
        .class-btn { padding: 10px; border: 2px solid #333; border-radius: 10px; text-align: center; cursor: pointer; flex: 1; }
        .class-btn.selected { border-color: var(--accent); background: #ffffff05; }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- SETUP -->
        <div id="screen-setup" class="screen active">
            <h1 style="color: var(--accent)">PISOK RPG</h1>
            <p>Выбери героя для начала легенды</p>
            <div id="friends-list" style="display:grid; grid-template-columns: repeat(4, 1fr); gap:10px; margin-bottom:20px;"></div>
            
            <h3>Твой класс</h3>
            <div style="display:flex; gap:10px; width:100%;">
                <div class="class-btn" id="cls-Warrior" onclick="selectClass('Warrior')">⚔️<br>Воин</div>
                <div class="class-btn" id="cls-Mage" onclick="selectClass('Mage')">🔮<br>Маг</div>
                <div class="class-btn" id="cls-Thief" onclick="selectClass('Thief')">🗡️<br>Вор</div>
            </div>
            <button class="btn btn-battle" style="margin-top:30px" onclick="startGame()">ВОЙТИ В ИГРУ</button>
        </div>

        <!-- CITY -->
        <div id="screen-city" class="screen">
            <div class="glass-card profile-section">
                <div class="avatar-frame"><img id="user-img" src=""></div>
                <div style="flex:1">
                    <h2 id="user-name" style="margin:0">ЮРА</h2>
                    <div id="user-class" style="color:var(--accent); font-size:12px; font-weight:bold">МАГ УР. 1</div>
                    <div class="progress-container">
                        <div id="hp-fill" class="progress-fill" style="background:#e74c3c"></div>
                        <div class="progress-text" id="hp-text">100/100 HP</div>
                    </div>
                    <div class="progress-container" style="height:6px; margin-top:4px">
                        <div id="xp-fill" class="progress-fill" style="background:var(--accent)"></div>
                    </div>
                </div>
            </div>

            <div style="display:flex; justify-content: space-around; width:100%; margin-bottom:15px; font-weight:bold;">
                <span>💰 <span id="res-gold">0</span></span>
                <span>🐺 <span id="res-skins">0</span></span>
                <span>⛓️ <span id="res-ore">0</span></span>
            </div>

            <div class="glass-card" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div>💪 STR: <span id="st-str">0</span></div>
                <div>🛡️ DEF: <span id="st-def">0</span></div>
                <div>🍀 LCK: <span id="st-lck">0</span></div>
                <div style="color:var(--accent)">✨ PTS: <span id="st-pts">0</span></div>
            </div>

            <button class="btn btn-battle" onclick="showScreen('screen-battle'); startBattle()">⚔️ В БОЙ (ДАНЖ)</button>
            <button class="btn btn-work" onclick="craft()">⚒️ КУЗНИЦА (УЛУЧШИТЬ БРОНЮ)</button>
            <button class="btn btn-rest" onclick="rest()">🍺 ТАВЕРНА (ВОССТАНОВЛЕНИЕ)</button>

            <h3 style="width:100%; text-align:left;">ИНВЕНТАРЬ</h3>
            <div id="inventory-list" class="inventory-grid"></div>
        </div>

        <!-- BATTLE -->
        <div id="screen-battle" class="screen">
            <div style="font-size:100px; margin-top:40px" id="enemy-ico">👾</div>
            <h2 id="enemy-name">БОСС</h2>
            <div class="progress-container" style="width:80%; height:20px">
                <div id="enemy-hp-fill" class="progress-fill" style="background:var(--epic)"></div>
                <div class="progress-text" id="enemy-hp-text">500/500</div>
            </div>
            
            <div style="margin-top:auto; width:100%; margin-bottom:40px">
                <button class="btn btn-battle" onclick="attack()">УДАРИТЬ!</button>
                <div id="battle-log"></div>
            </div>
        </div>
    </div>

    <script>
        const friends = ['алина', 'бень', 'богдан', 'ваня', 'егор', 'илюха', 'капрал', 'кирилл', 'лера', 'никитос', 'полина', 'рома', 'саша', 'серега', 'таня', 'юра'];
        let player = JSON.parse(localStorage.getItem('pisok_ultra_v1')) || null;
        let enemy = null;

        function init() {
            if(!player) {
                const list = document.getElementById('friends-list');
                friends.forEach(f => {
                    list.innerHTML += `<img src="avatars/${f}.jpg" onclick="selectHero('${f}')" id="av-${f}" style="width:100%; border-radius:10px; border:2px solid #333; cursor:pointer" onerror="this.src='https://ui-avatars.com/api/?name=${f}'">`;
                });
            } else { showScreen('screen-city'); updateUI(); }
        }

        function selectHero(name) {
            player = { name: name, class: 'Warrior', lvl: 1, xp: 0, next: 100, gold: 50, skins: 0, ore: 0, str: 10, def: 5, lck: 5, pts: 0, hp: 100, max: 100, inv: [] };
            document.querySelectorAll('#friends-list img').forEach(i => i.style.borderColor='#333');
            document.getElementById('av-'+name).style.borderColor='#f1c40f';
        }

        function selectClass(c) {
            if(!player) return alert("Сначала выбери фото!");
            player.class = c;
            document.querySelectorAll('.class-btn').forEach(b => b.classList.remove('selected'));
            document.getElementById('cls-'+c).classList.add('selected');
        }

        function startGame() { if(player) { save(); showScreen('screen-city'); updateUI(); } }

        function updateUI() {
            document.getElementById('user-img').src = `avatars/${player.name}.jpg`;
            document.getElementById('user-name').innerText = player.name.toUpperCase();
            document.getElementById('user-class').innerText = `${player.class} | Уровень ${player.lvl}`;
            document.getElementById('st-str').innerText = player.str;
            document.getElementById('st-def').innerText = player.def;
            document.getElementById('st-lck').innerText = player.lck;
            document.getElementById('st-pts').innerText = player.pts;
            document.getElementById('res-gold').innerText = player.gold;
            document.getElementById('res-skins').innerText = player.skins;
            document.getElementById('hp-text').innerText = `${player.hp}/${player.max} HP`;
            document.getElementById('hp-fill').style.width = (player.hp/player.max*100)+'%';
            document.getElementById('xp-fill').style.width = (player.xp/player.next*100)+'%';
            
            const inv = document.getElementById('inventory-list');
            inv.innerHTML = "";
            player.inv.forEach(item => {
                inv.innerHTML += `<div class="item-slot" style="border-color:${item.rarity === 'epic' ? '#9b59b6' : '#333'}">${item.icon}</div>`;
            });
        }

        function startBattle() {
            enemy = { name: "Тёмный Рыцарь", hp: 40 + (player.lvl*25), max: 40 + (player.lvl*25), ico: "💀" };
            document.getElementById('enemy-ico').innerText = enemy.ico;
            document.getElementById('enemy-name').innerText = enemy.name;
            document.getElementById('battle-log').innerHTML = "Бой начался!";
            updateBattleUI();
        }

        function attack() {
            let dmg = player.str + (Math.random() < player.lck/100 ? player.str : 0);
            enemy.hp -= dmg;
            document.getElementById('battle-log').innerHTML = `Ты ударил на ${dmg}! <br>` + document.getElementById('battle-log').innerHTML;
            
            if(enemy.hp <= 0) return win();

            let edmg = Math.max(1, 12 - player.def);
            player.hp -= edmg;
            if(player.hp <= 0) { player.hp = 1; alert("Ты вырубился..."); showScreen('screen-city'); }
            updateBattleUI();
        }

        function win() {
            let g = 20 + player.lvl * 5;
            player.gold += g; player.xp += 40;
            if(Math.random() > 0.5) player.skins++;
            if(player.xp >= player.next) { player.lvl++; player.xp = 0; player.pts += 5; player.next *= 1.4; }
            save(); updateUI(); showScreen('screen-city');
        }

        function rest() { player.hp = player.max; save(); updateUI(); }
        function save() { localStorage.setItem('pisok_ultra_v1', JSON.stringify(player)); }
        function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function updateBattleUI() {
            document.getElementById('enemy-hp-fill').style.width = (enemy.hp/enemy.max*100)+'%';
            document.getElementById('enemy-hp-text').innerText = `${Math.floor(enemy.hp)}/${enemy.max}`;
        }
        
        init();
    </script>
</body>
</html>
