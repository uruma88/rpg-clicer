<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PISOK RPG: DIABLO EDITION</title>
    <style>
        :root {
            --bg: #0a0a0e; --card: #15151c; --accent: #f1c40f;
            --common: #95a5a6; --rare: #3498db; --epic: #9b59b6; --leg: #e67e22;
            --text: #eee;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Verdana', sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .game-container { width: 100%; max-width: 480px; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; border: 1px solid #222; margin-bottom: 10px; }
        
        /* Статы и Уровни */
        .header-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .lvl-badge { background: var(--accent); color: #000; padding: 2px 8px; border-radius: 4px; font-weight: bold; font-size: 12px; }
        
        /* Инвентарь и Цвета */
        .inv-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        .item { aspect-ratio: 1; background: #222; border: 2px solid #444; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; position: relative; }
        .rarity-0 { border-color: var(--common); }
        .rarity-1 { border-color: var(--rare); box-shadow: 0 0 5px var(--rare); }
        .rarity-2 { border-color: var(--epic); box-shadow: 0 0 8px var(--epic); }
        .rarity-3 { border-color: var(--leg); box-shadow: 0 0 12px var(--leg); }

        /* Бой */
        .battle-ui { text-align: center; }
        .hp-bar { height: 12px; background: #333; border-radius: 6px; overflow: hidden; margin: 5px 0; border: 1px solid #000; }
        .hp-fill { height: 100%; background: #e74c3c; transition: 0.4s cubic-bezier(0.17, 0.67, 0.83, 0.67); }
        .damage-pop { animation: floatUp 0.6s ease-out; position: absolute; color: #ff4d4d; font-weight: bold; }

        @keyframes floatUp { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-30px); } }
        
        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; text-transform: uppercase; margin-top: 5px; color: white; }
        .btn-battle { background: linear-gradient(to bottom, #e74c3c, #c0392b); font-size: 18px; }
        
        .tab-btn { background: #222; border: 1px solid #333; padding: 8px; color: #888; cursor: pointer; flex: 1; }
        .tab-btn.active { background: #333; color: var(--accent); border-bottom: 2px solid var(--accent); }

        #log { height: 80px; overflow-y: auto; font-size: 11px; background: #000; padding: 5px; border-radius: 5px; margin-top: 10px; border: 1px solid #222; }
    </style>
</head>
<body>

<div class="game-container">
    <!-- ИГРОК -->
    <div class="card">
        <div class="header-box">
            <div>
                <b id="p-name">ГЕРОЙ</b> <span class="lvl-badge">LVL <span id="p-lvl">1</span></span>
            </div>
            <div style="font-size: 12px; color: var(--accent)">💰 <span id="p-gold">0</span> | 🦴 <span id="p-mats">0</span></div>
        </div>
        <div class="hp-bar"><div id="p-hp-f" class="hp-fill" style="width: 100%"></div></div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 12px; margin-top: 10px;">
            <div>Сила: <b id="p-str">0</b></div>
            <div>Защита: <b id="p-def">0</b></div>
            <div>EXP: <b id="p-exp">0</b>/100</div>
            <div>Мощь: <b id="p-pow" style="color:var(--accent)">0</b></div>
        </div>
    </div>

    <!-- ВКЛАДКИ -->
    <div style="display: flex; gap: 2px; margin-bottom: 10px;">
        <button class="tab-btn active" onclick="showTab('main')">БОЙ</button>
        <button class="tab-btn" onclick="showTab('inv')">ИНВЕНТАРЬ</button>
        <button class="tab-btn" onclick="showTab('forge')">КУЗНИЦА</button>
        <button class="tab-btn" onclick="showTab('pvp')">ТОП</button>
    </div>

    <!-- ЭКРАН БОЯ -->
    <div id="tab-main" class="tab-content">
        <div class="card battle-ui">
            <h4 id="e-name">ДИКИЙ ВОЛК</h4>
            <div class="hp-bar"><div id="e-hp-f" class="hp-fill" style="width: 100%; background: #9b59b6"></div></div>
            <div style="font-size: 11px; margin-bottom: 10px;">Этаж: <span id="p-floor">1</span></div>
            <button id="atk-btn" class="btn btn-battle" onclick="battleTurn()">УДАРИТЬ</button>
            <div id="log"></div>
        </div>
    </div>

    <!-- ИНВЕНТАРЬ -->
    <div id="tab-inv" class="tab-content" style="display:none">
        <div class="card">
            <div class="inv-grid" id="inv-render"></div>
            <div style="margin-top: 10px; font-size: 11px; color: #666">* Нажми на вещь, чтобы надеть</div>
        </div>
    </div>

    <!-- КУЗНИЦА -->
    <div id="tab-forge" class="tab-content" style="display:none">
        <div class="card">
            <h3>УЛУЧШЕНИЕ</h3>
            <p style="font-size: 12px">Нужно: 5 материалов 🦴 за +1 к статам вещи</p>
            <div id="forge-render"></div>
        </div>
    </div>

    <!-- ПВП / ТОП -->
    <div id="tab-pvp" class="tab-content" style="display:none">
        <div class="card">
            <h3>ТАБЛИЦА СИЛЫ</h3>
            <div id="leaderboard" style="font-size: 13px"></div>
        </div>
    </div>
</div>

<script>
let p = JSON.parse(localStorage.getItem('pisok_final_v1')) || {
    name: "ЮРА", lvl: 1, exp: 0, gold: 100, mats: 0, floor: 1,
    str: 10, vit: 100, hp: 100,
    eq: { w: null, a: null },
    inv: []
};

let enemy = null;

function save() {
    localStorage.setItem('pisok_final_v1', JSON.stringify(p));
    render();
}

function render() {
    document.getElementById('p-name').innerText = p.name;
    document.getElementById('p-lvl').innerText = p.lvl;
    document.getElementById('p-gold').innerText = p.gold;
    document.getElementById('p-mats').innerText = p.mats;
    document.getElementById('p-str').innerText = p.str + (p.eq.w ? p.eq.w.val : 0);
    document.getElementById('p-def').innerText = p.eq.a ? p.eq.a.val : 0;
    document.getElementById('p-exp').innerText = p.exp;
    document.getElementById('p-floor').innerText = p.floor;
    document.getElementById('p-pow').innerText = (p.str + (p.eq.w ? p.eq.w.val : 0)) * 2 + (p.vit + (p.eq.a ? p.eq.a.val : 0));
    
    // Инвентарь
    const invR = document.getElementById('inv-render');
    invR.innerHTML = '';
    p.inv.forEach((it, i) => {
        const div = document.createElement('div');
        div.className = `item rarity-${it.rare}`;
        div.innerHTML = it.icon;
        div.onclick = () => equip(i);
        invR.appendChild(div);
    });

    // Кузница
    const forgeR = document.getElementById('forge-render');
    forgeR.innerHTML = '';
    ['w', 'a'].forEach(slot => {
        if(p.eq[slot]) {
            const it = p.eq[slot];
            const btn = document.createElement('button');
            btn.className = 'btn'; btn.style.background = '#333';
            btn.innerHTML = `ТОЧИТЬ ${it.icon} (Блеск +${it.val}) за 5🦴`;
            btn.onclick = () => {
                if(p.mats >= 5) { p.mats -= 5; it.val += 2; save(); alert("Успех!"); }
            };
            forgeR.appendChild(btn);
        }
    });
}

function showTab(t) {
    document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + t).style.display = 'block';
    event.target.classList.add('active');
}

function spawnEnemy() {
    const scale = Math.pow(1.1, p.floor);
    enemy = {
        name: p.floor % 10 === 0 ? "БОСС ЭТАЖА" : "МОНСТР",
        hp: Math.floor(50 * scale),
        maxHp: Math.floor(50 * scale),
        dmg: Math.floor(5 * scale)
    };
    document.getElementById('e-name').innerText = enemy.name;
    document.getElementById('e-hp-f').style.width = '100%';
}

function battleTurn() {
    if(!enemy) spawnEnemy();
    
    // Ход игрока
    const pDmg = p.str + (p.eq.w ? p.eq.w.val : 0);
    enemy.hp -= pDmg;
    addLog(`Ты ударил на ${pDmg}`, '#fff');
    document.getElementById('e-hp-f').style.width = (enemy.hp / enemy.maxHp * 100) + '%';

    if(enemy.hp <= 0) {
        addLog("Враг повержен!", "var(--accent)");
        p.exp += 30; p.gold += 10; p.floor++;
        if(Math.random() > 0.5) { p.mats += 1; addLog("+1 Материал для крафта", "#9b59b6"); }
        if(Math.random() > 0.7) dropLoot();
        if(p.exp >= 100) { p.lvl++; p.exp = 0; p.str += 5; alert("НОВЫЙ УРОВЕНЬ!"); }
        spawnEnemy();
        save();
        return;
    }

    // Ход врага
    setTimeout(() => {
        const eDmg = Math.max(1, enemy.dmg - (p.eq.a ? p.eq.a.val : 0));
        p.hp -= eDmg;
        addLog(`Враг кусает на ${eDmg}`, '#e74c3c');
        document.getElementById('p-hp-f').style.width = (p.hp / (p.vit + (p.eq.a ? p.eq.a.val : 0)) * 100) + '%';
        if(p.hp <= 0) { alert("СМЕРТЬ! Откат на 1 этаж."); p.floor = Math.max(1, p.floor-1); p.hp = p.vit; spawnEnemy(); save(); }
    }, 300);
}

function dropLoot() {
    const r = Math.random();
    let rare = 0;
    if(r > 0.95) rare = 3; // Легенда
    else if(r > 0.8) rare = 2; // Эпик
    else if(r > 0.5) rare = 1; // Редкое
    
    const isWep = Math.random() > 0.5;
    const newItem = {
        icon: isWep ? '⚔️' : '🛡️',
        type: isWep ? 'w' : 'a',
        rare: rare,
        val: (rare + 1) * p.floor * 2
    };
    p.inv.push(newItem);
    addLog("ВЫПАЛ ЛУТ!", "var(--leg)");
}

function equip(i) {
    const it = p.inv[i];
    if(p.eq[it.type]) p.inv.push(p.eq[it.type]);
    p.eq[it.type] = it;
    p.inv.splice(i, 1);
    save();
}

function addLog(m, col) {
    const l = document.getElementById('log');
    l.innerHTML = `<div style="color:${col}">${m}</div>` + l.innerHTML;
}

spawnEnemy();
render();
</script>
</body>
</html>
