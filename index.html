<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>🍺 Писок Данжен · Город на карте</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            margin: 0;
            padding: 0;
        }
        body {
            background: #0f110c;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }
        .game {
            max-width: 600px;
            width: 100%;
            background: #1d261b;
            border-radius: 48px;
            padding: 20px 16px;
            border: 3px solid #e6b45a;
            box-shadow: 0 10px 25px black;
        }
        .status-bar {
            background: #2f2a1a;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            padding: 10px 16px;
            border-radius: 60px;
            margin-bottom: 20px;
            color: #ffde9c;
            font-weight: bold;
            font-size: 12px;
        }
        .status-item {
            background: #00000066;
            padding: 4px 10px;
            border-radius: 30px;
        }
        /* ПИКСЕЛЬНАЯ КАРТА ГОРОДА (сетка 2x2) */
        .city-map {
            background: #527a3a;
            border-radius: 36px;
            padding: 20px 12px;
            margin-bottom: 20px;
            border: 2px solid #f5ce7a;
            box-shadow: inset 0 0 0 3px #314d20;
        }
        .city-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }
        .building {
            background: #b48b44;
            border-radius: 24px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            border-bottom: 4px solid #684f24;
            transition: 0.05s linear;
            font-weight: bold;
            color: #fff0c8;
        }
        .building:active {
            transform: translateY(2px);
            border-bottom-width: 2px;
        }
        .building-icon {
            font-size: 44px;
        }
        /* ОБЛАСТЬ КОНТЕНТА (меню здания) */
        .content-area {
            background: #1f2b18cc;
            backdrop-filter: blur(4px);
            border-radius: 32px;
            padding: 18px;
            margin-top: 8px;
        }
        .pixel-btn {
            background: #daa243;
            padding: 12px;
            border-radius: 60px;
            text-align: center;
            font-weight: bold;
            cursor: pointer;
            margin: 8px 0;
            box-shadow: 0 3px 0 #784f1c;
        }
        .pixel-btn:active {
            transform: translateY(2px);
            box-shadow: none;
        }
        .friend-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            max-height: 220px;
            overflow-y: auto;
        }
        .friend-card {
            background: #b68b40;
            width: 80px;
            text-align: center;
            padding: 6px;
            border-radius: 28px;
            cursor: pointer;
        }
        .friend-avatar {
            width: 52px;
            height: 52px;
            margin: 0 auto;
            background: #4d351b;
            border-radius: 30px;
            overflow: hidden;
        }
        .friend-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .log {
            background: #0e0f08;
            border-radius: 28px;
            padding: 10px;
            height: 70px;
            overflow-y: auto;
            margin-top: 16px;
            font-size: 10px;
            color: #eabd72;
        }
        .damage-number {
            position: fixed;
            font-size: 28px;
            font-weight: bold;
            color: #ffc107;
            text-shadow: 0 0 2px black;
            pointer-events: none;
            animation: floatUp 0.4s forwards;
            z-index: 1000;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-50px); }
        }
        .shake {
            animation: shakeAnim 0.2s ease 2;
        }
        @keyframes shakeAnim {
            0% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
            100% { transform: translateX(0); }
        }
        .flash-red {
            animation: redFlash 0.15s linear 2;
        }
        @keyframes redFlash {
            0% { background: #1f2b18cc; }
            50% { background: #c95757cc; }
            100% { background: #1f2b18cc; }
        }
    </style>
</head>
<body>
<div class="game">
    <div class="status-bar">
        <div class="status-item">🍺 <span id="gold">250</span></div>
        <div class="status-item">⚔️ <span id="atk">0</span></div>
        <div class="status-item">❤️ <span id="hp">0</span>/<span id="maxHp">0</span></div>
        <div class="status-item">💙 <span id="ap">100</span>/<span id="maxAp">100</span></div>
        <div class="status-item">🌟 lvl <span id="level">1</span></div>
        <div class="status-item">🏔️ <span id="floor">1</span></div>
    </div>

    <!-- КАРТА ГОРОДА (4 здания) -->
    <div class="city-map" id="cityMap">
        <div class="city-grid">
            <div class="building" data-bld="tavern">🍺<div>ТАВЕРНА</div></div>
            <div class="building" data-bld="smith">⚒️<div>КУЗНЕЦ</div></div>
            <div class="building" data-bld="guild">👥<div>ГИЛЬДИЯ</div></div>
            <div class="building" data-bld="gate">🚪<div>ВОРОТА</div></div>
        </div>
    </div>

    <!-- СЮДА БУДЕТ ПОДГРУЖАТЬСЯ МЕНЮ ЗДАНИЯ ИЛИ БОЙ -->
    <div id="mainArea"></div>

    <div class="log" id="logArea"></div>
</div>

<script>
    // ---------- ДРУЗЬЯ ----------
    const FRIENDS = [
        { name: "Алина", avatar: "avatars/алина.jpg", emoji: "👩", str: 1, int: 3, agi: 2, vit: 2 },
        { name: "Бень", avatar: "avatars/бень.jpg", emoji: "🐻", str: 4, int: 1, agi: 1, vit: 4 },
        { name: "Богдан", avatar: "avatars/богдан.jpg", emoji: "💪", str: 3, int: 2, agi: 2, vit: 3 },
        { name: "Ваня", avatar: "avatars/ваня.jpg", emoji: "🧢", str: 2, int: 2, agi: 3, vit: 3 },
        { name: "Егор", avatar: "avatars/егор.jpg", emoji: "⚡", str: 3, int: 1, agi: 3, vit: 2 },
        { name: "Илюха", avatar: "avatars/илюха.jpg", emoji: "🛡️", str: 2, int: 1, agi: 1, vit: 5 },
        { name: "Капрал", avatar: "avatars/капрал.jpg", emoji: "🎖️", str: 5, int: 1, agi: 2, vit: 3 },
        { name: "Кирилл", avatar: "avatars/кирилл.jpg", emoji: "👊", str: 3, int: 2, agi: 3, vit: 2 },
        { name: "Лера", avatar: "avatars/лера.jpg", emoji: "🌸", str: 1, int: 3, agi: 3, vit: 2 },
        { name: "Никитос", avatar: "avatars/никитос.jpg", emoji: "👊", str: 3, int: 2, agi: 3, vit: 2 },
        { name: "Полина", avatar: "avatars/полина.jpg", emoji: "✨", str: 1, int: 4, agi: 2, vit: 2 },
        { name: "Рома", avatar: "avatars/рома.jpg", emoji: "⚔️", str: 4, int: 1, agi: 2, vit: 3 },
        { name: "Саша", avatar: "avatars/саша.jpg", emoji: "⚔️", str: 4, int: 1, agi: 2, vit: 4 },
        { name: "Серега", avatar: "avatars/серега.jpg", emoji: "💣", str: 3, int: 2, agi: 2, vit: 3 },
        { name: "Таня", avatar: "avatars/таня.jpg", emoji: "🍀", str: 2, int: 3, agi: 2, vit: 3 },
        { name: "Юра", avatar: "avatars/юра.jpg", emoji: "🌪️", str: 3, int: 2, agi: 3, vit: 2 }
    ];

    // ------------------- ИГРОК -------------------
    let game = {
        gold: 350, level: 1, exp: 0, xpNext: 100, skillPoints: 0,
        strength: 10, intelligence: 10, agility: 10, vitality: 10,
        hp: 100, maxHp: 100,
        ap: 100, maxAp: 100,
        floor: 1,
        className: null, classLocked: false,
        friend: null,
        weapon: null, armor: null, helmet: null
    };
    let currentEnemy = null;
    let waitingAction = true;
    let logs = [];
    let inDungeon = false;

    function addLog(msg) { logs.unshift(`🍺 ${msg}`); if(logs.length>6) logs.pop(); document.getElementById('logArea').innerHTML = logs.join('<br>'); }
    function totalAtk() { let w = game.weapon?.atk || 0; return game.strength + w + (game.className==='warrior'? Math.floor(game.strength*0.2):0); }
    function totalMaxHp() { return 80 + game.vitality*5 + (game.armor?.hp||0) + (game.helmet?.hp||0); }
    function calcDamage() { return Math.floor(totalAtk() + Math.random()*8); }
    function updateUI() {
        document.getElementById('gold').innerText = Math.floor(game.gold);
        document.getElementById('atk').innerText = calcDamage();
        let mhp = totalMaxHp();
        document.getElementById('maxHp').innerText = mhp;
        document.getElementById('hp').innerText = game.hp;
        document.getElementById('ap').innerText = game.ap;
        document.getElementById('maxAp').innerText = game.maxAp;
        document.getElementById('level').innerText = game.level;
        document.getElementById('floor').innerText = game.floor;
        if(currentEnemy && document.getElementById('enemyFill')) {
            let per = (currentEnemy.hp/currentEnemy.maxHp)*100;
            document.getElementById('enemyFill').style.width = `${Math.max(0,per)}%`;
            document.getElementById('enemyHpText').innerHTML = `❤️ ${Math.floor(currentEnemy.hp)}/${currentEnemy.maxHp}`;
        }
    }
    function saveGame() { localStorage.setItem('pisokFinalCity', JSON.stringify(game)); }
    function loadGame() { let s = localStorage.getItem('pisokFinalCity'); if(s) { let d=JSON.parse(s); for(let k in d) game[k]=d[k]; } game.hp = Math.min(game.hp, totalMaxHp()); updateUI(); }

    // ---------- БОЙ ----------
    function startBattle() {
        inDungeon = true;
        let enemies = [
            { name: "🍺 Пиво", emoji: "🍺", hp: 55, maxHp:55, dmg:8, gold:30, exp:35 },
            { name: "🛢️ Бочка", emoji: "🛢️", hp: 80, maxHp:80, dmg:10, gold:45, exp:45 },
            { name: "💪 Вышибала", emoji: "💪", hp: 110, maxHp:110, dmg:13, gold:65, exp:60 }
        ];
        let isBoss = (game.floor % 5 === 0);
        if(isBoss) currentEnemy = { name: "👑 БОСС", emoji: "👑", hp: 180, maxHp:180, dmg:18, gold:150, exp:120 };
        else { let idx = Math.floor(Math.random()*enemies.length); currentEnemy = { ...enemies[idx], hp: enemies[idx].hp, maxHp: enemies[idx].hp }; }
        waitingAction = true;
        addLog(`⚔️ Бой: ${currentEnemy.name}`);
        renderBattle();
    }
    function renderBattle() {
        document.getElementById('mainArea').innerHTML = `
            <div class="content-area" id="battleCard">
                <div style="font-size:60px; text-align:center;">${currentEnemy.emoji}</div>
                <div style="text-align:center; font-weight:bold;">${currentEnemy.name}</div>
                <div style="background:#5a3e24; border-radius:20px; height:10px; margin:10px 0;"><div id="enemyFill" style="height:100%; width:100%; background:#d44c2f; border-radius:20px;"></div></div>
                <div id="enemyHpText" style="text-align:center;">❤️ ${currentEnemy.hp}/${currentEnemy.maxHp}</div>
            </div>
            <div class="content-area" style="margin-top:8px;">
                <div class="pixel-btn" id="atkBtn">⚔️ АТАКА (15 AP)</div>
                <div class="pixel-btn" id="skillBtn">✨ УМЕНИЕ (30 AP)</div>
                <div class="pixel-btn" id="restBtn">😴 ОТДЫХ (+20 AP)</div>
                <div class="pixel-btn" id="runBtn">🏃‍♂️ В ГОРОД</div>
            </div>
        `;
        document.getElementById('atkBtn').onclick = attack;
        document.getElementById('skillBtn').onclick = useSkill;
        document.getElementById('restBtn').onclick = () => { if(waitingAction){ game.ap=Math.min(game.maxAp,game.ap+20); addLog(`😴 +20 AP`); waitingAction=false; updateUI(); setTimeout(enemyTurn,600); } };
        document.getElementById('runBtn').onclick = () => { inDungeon=false; showBuildingMenu('tavern'); addLog(`Вы вернулись в город`); };
        updateUI();
    }
    function damageAnim(isPlayer) {
        let card = document.getElementById('battleCard');
        if(card) card.classList.add('shake');
        if(isPlayer) document.getElementById('mainArea').classList.add('flash-red');
        setTimeout(()=>document.getElementById('mainArea')?.classList.remove('flash-red'),250);
        let d = document.createElement('div'); d.className = 'damage-number'; d.innerText = '-УДАР!';
        d.style.left = '45%'; d.style.top = '35%'; document.body.appendChild(d); setTimeout(()=>d.remove(),400);
        setTimeout(()=>{ if(card) card.classList.remove('shake'); },300);
    }
    function victory() {
        game.gold += currentEnemy.gold;
        game.exp += currentEnemy.exp;
        addLog(`🏆 ПОБЕДА! +${currentEnemy.gold}🍺 +${currentEnemy.exp} XP`);
        if(game.exp >= game.xpNext) {
            game.level++; game.exp -= game.xpNext; game.xpNext = Math.floor(game.xpNext*1.2); game.skillPoints+=3;
            addLog(`🎉 УРОВЕНЬ ${game.level}! +3 очка навыков! 🎉`);
        }
        game.floor++;
        saveGame();
        startBattle();
        updateUI();
    }
    function attack() {
        if(!waitingAction) return;
        if(game.ap < 15) { addLog(`❌ Нет AP`); return; }
        game.ap -= 15;
        let dmg = calcDamage();
        if(game.className==='rogue' && Math.random()<0.2) { dmg = Math.floor(dmg*1.5); addLog(`🗡️ КРИТ!`); }
        currentEnemy.hp -= dmg;
        addLog(`⚔️ Удар ${dmg}`);
        damageAnim(false);
        if(currentEnemy.hp <= 0) { victory(); updateUI(); return; }
        waitingAction = false; updateUI(); setTimeout(enemyTurn,700);
    }
    function useSkill() {
        if(!waitingAction) return;
        if(game.ap < 30) { addLog(`❌ Нужно 30 AP`); return; }
        game.ap -= 30;
        let dmg = calcDamage() + 15;
        if(game.className==='mage') { dmg += game.intelligence; addLog(`🧙 Огненный шар! ${dmg}`); }
        else if(game.className==='warrior') { dmg = Math.floor(dmg*1.4); addLog(`⚔️ Сокрушитель! ${dmg}`); }
        else { dmg = Math.floor(dmg*1.3); addLog(`🗡️ Танец клинков! ${dmg}`); }
        currentEnemy.hp -= dmg;
        damageAnim(false);
        if(currentEnemy.hp <= 0) { victory(); updateUI(); return; }
        waitingAction = false; updateUI(); setTimeout(enemyTurn,600);
    }
    function enemyTurn() {
        if(currentEnemy.hp <= 0) return;
        let dmg = currentEnemy.dmg;
        game.hp -= dmg;
        addLog(`😖 ${currentEnemy.name} атакует! -${dmg} HP`);
        damageAnim(true);
        if(game.hp <= 0) {
            addLog(`💀 ПОРАЖЕНИЕ! -30 золота`);
            game.gold = Math.max(0, game.gold-30);
            game.hp = totalMaxHp(); game.ap = game.maxAp;
            inDungeon=false; showBuildingMenu('tavern');
            return;
        }
        waitingAction = true; updateUI(); saveGame();
    }

    // ---------- МЕНЮ ЗДАНИЙ ----------
    function showBuildingMenu(bld) {
        if(inDungeon) { addLog(`Сначала закончи бой!`); return; }
        if(bld === 'tavern') {
            document.getElementById('mainArea').innerHTML = `
                <div class="content-area">
                    <div class="pixel-btn" id="healBtn">💚 ЛЕЧЕНИЕ (30🍺)</div>
                    <div class="pixel-btn" id="statsBtn">📊 МОИ СТАТЫ</div>
                    <div class="pixel-btn" id="backCityBtn">🏠 К КАРТЕ</div>
                </div>
            `;
            document.getElementById('healBtn')?.addEventListener('click',()=>{ if(game.gold>=30){ game.gold-=30; game.hp=totalMaxHp(); game.ap=game.maxAp; addLog(`💚 Вылечен!`); saveGame(); updateUI(); } else addLog(`❌ Нужно 30🍺`); });
            document.getElementById('statsBtn')?.addEventListener('click',()=>{ addLog(`💪Сила:${totalAtk()} 🧠Инт:${game.intelligence} 🏃Ловк:${game.agility} ❤️Здор:${totalMaxHp()}`); });
            document.getElementById('backCityBtn').onclick = () => showCityMap();
        } 
        else if(bld === 'smith') {
            document.getElementById('mainArea').innerHTML = `
                <div class="content-area">
                    <div class="pixel-btn" id="buyClub">🗡️ ДУБИНА (+5 силы) 150🍺</div>
                    <div class="pixel-btn" id="buyArmor">🛡️ КОЖАНАЯ БРОНЯ (+15 HP) 120🍺</div>
                    <div class="pixel-btn" id="buyHelm">🧢 ШЛЕМ (+10 HP) 100🍺</div>
                    <div class="pixel-btn" id="backSmithBtn">🏠 К КАРТЕ</div>
                </div>
            `;
            document.getElementById('buyClub')?.addEventListener('click',()=>{ if(game.gold>=150 && !game.weapon){ game.gold-=150; game.weapon={name:"Дубина", atk:5}; addLog(`🗡️ Куплена дубина!`); saveGame(); updateUI(); showBuildingMenu('smith'); } else addLog(`❌ Ошибка`); });
            document.getElementById('buyArmor')?.addEventListener('click',()=>{ if(game.gold>=120 && !game.armor){ game.gold-=120; game.armor={name:"Кожанка", hp:15}; game.hp+=15; addLog(`🛡️ Куплена броня!`); saveGame(); updateUI(); showBuildingMenu('smith'); } else addLog(`❌ Ошибка`); });
            document.getElementById('buyHelm')?.addEventListener('click',()=>{ if(game.gold>=100 && !game.helmet){ game.gold-=100; game.helmet={name:"Шлем", hp:10}; game.hp+=10; addLog(`🧢 Куплен шлем!`); saveGame(); updateUI(); showBuildingMenu('smith'); } else addLog(`❌ Не хватает`); });
            document.getElementById('backSmithBtn').onclick = () => showCityMap();
        }
        else if(bld === 'guild') {
            if(!game.friend || !game.className) {
                document.getElementById('mainArea').innerHTML = `<div class="content-area" id="guildSelect"></div>`;
                let grid = document.getElementById('guildSelect');
                grid.innerHTML = `<div style="text-align:center;">ВЫБЕРИ ДРУГА</div><div id="friendGridGuild" style="display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin:12px 0;"></div><div id="classPick"></div>`;
                let friendContainer = document.getElementById('friendGridGuild');
                FRIENDS.forEach(f=>{
                    let card = document.createElement('div'); card.className = 'friend-card';
                    card.innerHTML = `<div class="friend-avatar"><img src="${f.avatar}" onerror="this.style.display='none'; this.parentElement.innerHTML='${f.emoji}'"></div><div>${f.name}</div>`;
                    card.onclick = () => {
                        game.friend = f;
                        game.strength = f.str; game.intelligence = f.int; game.agility = f.agi; game.vitality = f.vit;
                        game.hp = totalMaxHp();
                        document.getElementById('classPick').innerHTML = `<div class="pixel-btn" data-class="warrior">⚔️ ВОИН</div><div class="pixel-btn" data-class="mage">🧙 МАГ</div><div class="pixel-btn" data-class="rogue">🗡️ ВОР</div>`;
                        document.querySelectorAll('[data-class]').forEach(btn=>{
                            btn.onclick = () => { game.className = btn.dataset.class; game.classLocked = true; saveGame(); showCityMap(); };
                        });
                    };
                    friendContainer.appendChild(card);
                });
            } else {
                document.getElementById('mainArea').innerHTML = `
                    <div class="content-area">
                        <div class="pixel-btn" id="showHeroBtn">👤 МОЙ ГЕРОЙ</div>
                        <div class="pixel-btn" id="inventoryBtn">🎒 ИНВЕНТАРЬ</div>
                        <div class="pixel-btn" id="equipBtn">⚔️ СНАРЯЖЕНИЕ</div>
                        <div class="pixel-btn" id="upgradeStatsBtn">📈 ПРОКАЧКА</div>
                        <div class="pixel-btn" id="backGuildBtn">🏠 К КАРТЕ</div>
                    </div>
                `;
                document.getElementById('showHeroBtn')?.addEventListener('click', showHeroProfile);
                document.getElementById('inventoryBtn')?.addEventListener('click', showInventory);
                document.getElementById('equipBtn')?.addEventListener('click', showEquipment);
                document.getElementById('upgradeStatsBtn')?.addEventListener('click', showUpgrade);
                document.getElementById('backGuildBtn').onclick = () => showCityMap();
            }
        }
        else if(bld === 'gate') {
            document.getElementById('mainArea').innerHTML = `
                <div class="content-area">
                    <div class="pixel-btn" id="startDungeonBtn">🍺 НАЧАТЬ ЗАБЕГ</div>
                    <div class="pixel-btn" id="backGateBtn">🏠 К КАРТЕ</div>
                </div>
            `;
            document.getElementById('startDungeonBtn').onclick = startBattle;
            document.getElementById('backGateBtn').onclick = () => showCityMap();
        }
    }

    function showCityMap() {
        document.getElementById('mainArea').innerHTML = '';
        updateUI();
    }

    function showHeroProfile() {
        let f = game.friend || { name: "Герой", emoji: "🍺", avatar: "" };
        let avatarHtml = f.avatar ? `<img src="${f.avatar}" style="width:100%; height:100%; object-fit:cover;">` : f.emoji;
        document.getElementById('mainArea').innerHTML = `
            <div class="content-area">
                <div style="display:flex; gap:16px; align-items:center;">
                    <div style="width:70px; height:70px; background:#4d351b; border-radius:40px; overflow:hidden;">${avatarHtml}</div>
                    <div><div style="font-weight:bold;">${f.name}</div><div>${game.className?.toUpperCase() || "НЕТ"}</div></div>
                </div>
                <div class="pixel-btn" id="backHeroBtn">🔙 НАЗАД</div>
            </div>
        `;
        document.getElementById('backHeroBtn').onclick = () => showBuildingMenu('guild');
    }

    function showInventory() {
        let items = [];
        if(game.weapon) items.push(`🗡️ ${game.weapon.name} (+${game.weapon.atk}⚔️)`);
        if(game.armor) items.push(`🛡️ ${game.armor.name} (+${game.armor.hp}❤️)`);
        if(game.helmet) items.push(`🧢 ${game.helmet.name} (+${game.helmet.hp}❤️)`);
        let html = `<div class="content-area">`;
        if(items.length===0) html += `<div class="pixel-btn">🎒 ПУСТО</div>`;
        else items.forEach(it=>{ html += `<div class="pixel-btn">${it}</div>`; });
        html += `<div class="pixel-btn" id="backInvBtn">🔙 НАЗАД</div></div>`;
        document.getElementById('mainArea').innerHTML = html;
        document.getElementById('backInvBtn').onclick = () => showBuildingMenu('guild');
    }

    function showEquipment() {
        let weap = game.weapon ? game.weapon.name : "---";
        let arm = game.armor ? game.armor.name : "---";
        let helm = game.helmet ? game.helmet.name : "---";
        document.getElementById('mainArea').innerHTML = `
            <div class="content-area">
                <div class="pixel-btn">🗡️ ОРУЖИЕ: ${weap} <button id="uneqW" style="margin-left:8px;">Снять</button></div>
                <div class="pixel-btn">🛡️ БРОНЯ: ${arm} <button id="uneqA" style="margin-left:8px;">Снять</button></div>
                <div class="pixel-btn">🧢 ШЛЕМ: ${helm} <button id="uneqH" style="margin-left:8px;">Снять</button></div>
                <div class="pixel-btn" id="backEquipBtn">🔙 НАЗАД</div>
            </div>
        `;
        document.getElementById('uneqW')?.addEventListener('click',()=>{ game.weapon=null; saveGame(); showEquipment(); updateUI(); });
        document.getElementById('uneqA')?.addEventListener('click',()=>{ game.armor=null; saveGame(); showEquipment(); updateUI(); });
        document.getElementById('uneqH')?.addEventListener('click',()=>{ game.helmet=null; saveGame(); showEquipment(); updateUI(); });
        document.getElementById('backEquipBtn').onclick = () => showBuildingMenu('guild');
    }

    function showUpgrade() {
        let sp = game.skillPoints;
        document.getElementById('mainArea').innerHTML = `
            <div class="content-area">
                <div class="pixel-btn">✨ ОЧКИ НАВЫКОВ: ${sp}</div>
                <div class="pixel-btn" id="upStr">💪 СИЛА (+1)</div>
                <div class="pixel-btn" id="upInt">🧠 ИНТЕЛЛЕКТ (+1)</div>
                <div class="pixel-btn" id="upAgi">🏃‍♂️ ЛОВКОСТЬ (+1)</div>
                <div class="pixel-btn" id="upVit">❤️ ЗДОРОВЬЕ (+1)</div>
                <div class="pixel-btn" id="backUpBtn">🔙 НАЗАД</div>
            </div>
        `;
        document.getElementById('upStr')?.addEventListener('click',()=>{ if(sp>0){ game.skillPoints--; game.strength++; addLog(`💪 Сила+1`); saveGame(); showUpgrade(); updateUI(); } else addLog(`❌ Нет очков`); });
        document.getElementById('upInt')?.addEventListener('click',()=>{ if(sp>0){ game.skillPoints--; game.intelligence++; addLog(`🧠 Инт+1`); saveGame(); showUpgrade(); updateUI(); } else addLog(`❌ Нет очков`); });
        document.getElementById('upAgi')?.addEventListener('click',()=>{ if(sp>0){ game.skillPoints--; game.agility++; addLog(`🏃 Ловк+1`); saveGame(); showUpgrade(); updateUI(); } else addLog(`❌ Нет очков`); });
        document.getElementById('upVit')?.addEventListener('click',()=>{ if(sp>0){ game.skillPoints--; game.vitality++; addLog(`❤️ Здоровье+1`); saveGame(); showUpgrade(); updateUI(); } else addLog(`❌ Нет очков`); });
        document.getElementById('backUpBtn').onclick = () => showBuildingMenu('guild');
    }

    // ---------- ИНИЦИАЛИЗАЦИЯ ----------
    document.querySelectorAll('.building').forEach(b=>{
        b.addEventListener('click',()=>{
            if(inDungeon) { addLog(`Сначала вернись из подземелья!`); return; }
            showBuildingMenu(b.dataset.bld);
        });
    });
    loadGame();
    if(!game.classLocked || !game.friend) showBuildingMenu('guild');
    else showCityMap();
    updateUI();
</script>
</body>
</html>
