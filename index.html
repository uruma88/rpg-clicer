<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PISOK RPG: FINAL HTML EDITION</title>
    <style>
        :root { --bg: #0d0d12; --card: #16161e; --accent: #f1c40f; --common: #95a5a6; --rare: #3498db; --epic: #9b59b6; --leg: #e67e22; }
        body { background: var(--bg); color: #eee; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .game { width: 100%; max-width: 450px; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; border: 1px solid #2a2a3a; margin-bottom: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        /* Сетка выбора персонажа */
        .char-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-top: 15px; }
        .char-item { width: 100%; aspect-ratio: 1; border-radius: 8px; border: 2px solid transparent; cursor: pointer; object-fit: cover; }
        .char-item.selected { border-color: var(--accent); }

        /* Полоски и статы */
        .bar { height: 16px; background: #222; border-radius: 8px; overflow: hidden; position: relative; margin: 5px 0; border: 1px solid #000; }
        .fill { height: 100%; transition: 0.4s; background: #e74c3c; }
        .bar-txt { position: absolute; width: 100%; text-align: center; font-size: 10px; line-height: 16px; font-weight: bold; text-shadow: 1px 1px #000; }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 13px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; }

        /* Инвентарь */
        .inv-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
        .slot { aspect-ratio: 1; background: #1a1a20; border: 2px solid #333; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; }
        .rare-1 { border-color: var(--rare); box-shadow: 0 0 5px var(--rare); }
        .rare-2 { border-color: var(--epic); box-shadow: 0 0 8px var(--epic); }
        .rare-3 { border-color: var(--leg); box-shadow: 0 0 12px var(--leg); }

        /* Чат */
        #chat-box { height: 120px; overflow-y: auto; background: #000; padding: 10px; font-size: 12px; border-radius: 8px; border: 1px solid #222; margin-top: 10px; }
        .msg { margin-bottom: 5px; border-bottom: 1px solid #111; padding-bottom: 2px; }

        .btn { border: none; border-radius: 10px; padding: 12px; color: #fff; font-weight: bold; width: 100%; cursor: pointer; text-transform: uppercase; margin-top: 5px; transition: 0.2s; }
        .btn-red { background: linear-gradient(135deg, #e74c3c, #c0392b); }
        .btn-blue { background: linear-gradient(135deg, #3498db, #2980b9); }
        .btn-tab { background: #222; flex: 1; font-size: 11px; color: #888; }
        .btn-tab.active { background: #333; color: var(--accent); border-bottom: 2px solid var(--accent); }

        .screen { display: none; } .active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="game">
    <!-- ЭКРАН СОЗДАНИЯ -->
    <div id="scr-setup" class="screen active">
        <div class="card" style="text-align:center">
            <h2 style="color:var(--accent)">ВЫБЕРИ ГЕРОЯ</h2>
            <div style="display:flex; gap:10px">
                <button class="btn btn-red" id="b-war" onclick="setCls('Воин')">ВОИН (+ХП)</button>
                <button class="btn btn-blue" id="b-mag" onclick="setCls('Маг')">МАГ (+УРОН)</button>
            </div>
            <div class="char-grid" id="setup-chars"></div>
            <button class="btn btn-red" style="margin-top:20px; padding:15px" onclick="startGame()">НАЧАТЬ ПРИКЛЮЧЕНИЕ</button>
        </div>
    </div>

    <!-- ГЛАВНЫЙ ЭКРАН -->
    <div id="scr-main" class="screen">
        <div class="card">
            <div style="display:flex; gap:15px; align-items:center; margin-bottom:15px">
                <img id="p-img" style="width:80px; height:80px; border-radius:12px; border:2px solid var(--accent); object-fit:cover">
                <div style="flex:1">
                    <div style="display:flex; justify-content:space-between">
                        <b id="p-name">ИМЯ</b> <span id="p-class" style="color:var(--accent); font-size:12px">КЛАСС</span>
                    </div>
                    <div class="bar"><div id="hp-f" class="fill"></div><div id="hp-t" class="bar-txt"></div></div>
                    <div style="font-size:12px; margin-top:5px">LVL: <span id="p-lvl">1</span> | Золото: <span id="p-gold">0</span></div>
                </div>
            </div>
            <div class="stats">
                <div>Сила: <span id="st-str" class="val">0</span></div>
                <div>Защита: <span id="st-def" class="val">0</span></div>
                <div style="grid-column: span 2">МОЩЬ: <span id="st-pow" class="val" style="font-size:16px">0</span></div>
            </div>
        </div>

        <div style="display:flex; gap:5px; margin-bottom:10px">
            <button class="btn btn-tab active" onclick="tab('battle')">⚔️ БОЙ</button>
            <button class="btn btn-tab" onclick="tab('inv')">🎒 ВЕЩИ</button>
            <button class="btn btn-tab" onclick="tab('chat')">💬 ЧАТ</button>
            <button class="btn btn-tab" onclick="tab('forge')">🔥 КУЗНЯ</button>
        </div>

        <!-- ВКЛАДКИ -->
        <div id="sub-battle" class="sub active">
            <div class="card" style="text-align:center">
                <h4 id="e-name">ВРАГ</h4>
                <div class="bar"><div id="e-hp-f" class="fill" style="background:#9b59b6"></div><div id="e-hp-t" class="bar-txt"></div></div>
                <div style="font-size:12px; margin-bottom:10px">Этаж: <b id="p-floor">1</b></div>
                <button id="atk-btn" class="btn btn-red" onclick="attack()">УДАРИТЬ</button>
                <div id="log"></div>
            </div>
        </div>

        <div id="sub-inv" class="sub" style="display:none">
            <div class="card">
                <h4>ИНВЕНТАРЬ</h4>
                <div class="inv-grid" id="inv-ui"></div>
            </div>
        </div>

        <div id="sub-chat" class="sub" style="display:none">
            <div class="card">
                <div id="chat-box"></div>
                <div style="display:flex; gap:5px; margin-top:5px">
                    <input id="chat-in" type="text" placeholder="Текст..." style="flex:1; padding:10px; border-radius:8px; border:none; background:#000; color:#fff">
                    <button class="btn btn-blue" style="width:60px; margin:0" onclick="sendMsg()">></button>
                </div>
            </div>
        </div>

        <div id="sub-forge" class="sub" style="display:none">
            <div class="card" id="forge-ui"></div>
        </div>
    </div>
</div>

<script>
const AVAS = ['юра','алина','бень','богдан','ваня','егор','илюха','капрал','кирилл','лера','никитос','полина','рома','саша','серега','таня'];
let p = JSON.parse(localStorage.getItem('pisok_ultra_v1')) || null;
let selAva = 'юра';
let selCls = 'Воин';
let enemy = null;
let busy = false;

window.onload = () => {
    if(!p) {
        const grid = document.getElementById('setup-chars');
        AVAS.forEach(n => {
            const img = document.createElement('img');
            img.src = `avatars/${n}.jpg`;
            img.className = 'char-item';
            img.onclick = () => {
                document.querySelectorAll('.char-item').forEach(i=>i.classList.remove('selected'));
                img.classList.add('selected'); selAva = n;
            };
            grid.appendChild(img);
        });
        document.querySelectorAll('.char-item')[0].classList.add('selected');
    } else { showMain(); }
};

function setCls(c) {
    selCls = c;
    document.getElementById('b-war').style.opacity = c === 'Воин' ? '1' : '0.5';
    document.getElementById('b-mag').style.opacity = c === 'Маг' ? '1' : '0.5';
}

function startGame() {
    p = {
        name: selAva.toUpperCase(), class: selCls, img: `avatars/${selAva}.jpg`,
        lvl: 1, exp: 0, gold: 100, mats: 0, floor: 1,
        str: selCls === 'Маг' ? 25 : 15, vit: selCls === 'Воин' ? 200 : 120,
        hp: selCls === 'Воин' ? 200 : 120,
        eq: { w: null, a: null }, inv: []
    };
    save(); showMain();
}

function save() { localStorage.setItem('pisok_ultra_v1', JSON.stringify(p)); updateUI(); }

function updateUI() {
    const wVal = p.eq.w ? p.eq.w.val : 0;
    const aVal = p.eq.a ? p.eq.a.val : 0;
    const maxHP = p.vit + aVal;
    
    document.getElementById('p-img').src = p.img;
    document.getElementById('p-name').innerText = p.name;
    document.getElementById('p-class').innerText = p.class;
    document.getElementById('p-lvl').innerText = p.lvl;
    document.getElementById('p-gold').innerText = p.gold;
    document.getElementById('st-str').innerText = p.str + wVal;
    document.getElementById('st-def').innerText = aVal;
    document.getElementById('p-floor').innerText = p.floor;
    document.getElementById('st-pow').innerText = (p.str + wVal) * 2 + maxHP;
    document.getElementById('hp-f').style.width = (p.hp/maxHP*100)+'%';
    document.getElementById('hp-t').innerText = `${p.hp}/${maxHP}`;

    // Инвентарь
    const invUI = document.getElementById('inv-ui'); invUI.innerHTML = '';
    p.inv.forEach((it, i) => {
        const d = document.createElement('div');
        d.className = `slot rare-${it.rare}`;
        d.innerHTML = it.icon;
        d.onclick = () => {
            if(p.eq[it.type]) p.inv.push(p.eq[it.type]);
            p.eq[it.type] = it; p.inv.splice(i, 1); save();
        };
        invUI.appendChild(d);
    });

    // Кузня
    const fUI = document.getElementById('forge-ui'); fUI.innerHTML = '<h4>КУЗНИЦА</h4>';
    ['w', 'a'].forEach(s => {
        if(p.eq[s]) {
            const it = p.eq[s];
            const b = document.createElement('button');
            b.className = 'btn btn-blue';
            b.innerHTML = `Улучшить ${it.icon} (+${it.val}) за 5🦴`;
            b.onclick = () => {
                if(p.mats >= 5) { p.mats -= 5; it.val += 4; save(); }
                else alert("Мало костей!");
            };
            fUI.appendChild(b);
        }
    });
}

function spawn() {
    const s = Math.pow(1.1, p.floor);
    enemy = {
        hp: Math.floor(50 * s), maxHp: Math.floor(50 * s),
        dmg: Math.floor(5 * s)
    };
    document.getElementById('e-hp-f').style.width = '100%';
    document.getElementById('e-hp-t').innerText = enemy.hp;
}

function attack() {
    if(busy || p.hp <= 0) return;
    busy = true;
    const d = p.str + (p.eq.w ? p.eq.w.val : 0);
    enemy.hp -= d;
    addLog(`Ты ударил на ${d}`, '#fff');
    
    if(enemy.hp <= 0) {
        addLog("Победа!", "var(--accent)");
        p.gold += 20; p.floor++;
        if(Math.random() > 0.5) p.mats++;
        if(Math.random() > 0.7) drop();
        save(); spawn(); busy = false; return;
    }
    
    document.getElementById('e-hp-f').style.width = (enemy.hp/enemy.maxHp*100)+'%';
    document.getElementById('e-hp-t').innerText = enemy.hp;
    setTimeout(() => {
        const ed = Math.max(1, enemy.dmg - (p.eq.a ? p.eq.a.val : 0));
        p.hp -= ed;
        addLog(`Враг ударил на ${ed}`, '#e74c3c');
        if(p.hp <= 0) { alert("СМЕРТЬ! Откат на 1 этаж."); p.floor = Math.max(1, p.floor-1); p.hp = p.vit; spawn(); }
        save(); busy = false;
    }, 400);
}

function drop() {
    const r = Math.random();
    let rare = 0; if(r > 0.95) rare = 3; else if(r > 0.8) rare = 2; else if(r > 0.5) rare = 1;
    const t = Math.random() > 0.5 ? 'w' : 'a';
    p.inv.push({ icon: t==='w'?'⚔️':'🛡️', type: t, rare: rare, val: (rare+1)*p.floor*2 });
}

function addLog(m, c) {
    const l = document.getElementById('log');
    l.innerHTML = `<div class="msg" style="color:${c}">${m}</div>` + l.innerHTML;
}

function sendMsg() {
    const i = document.getElementById('chat-in');
    if(!i.value) return;
    const b = document.getElementById('chat-box');
    b.innerHTML += `<div class="msg"><b>${p.name}:</b> ${i.value}</div>`;
    i.value = ''; b.scrollTop = b.scrollHeight;
}

function tab(n) {
    document.querySelectorAll('.sub').forEach(s => s.style.display = 'none');
    document.querySelectorAll('.btn-tab').forEach(b => b.classList.remove('active'));
    document.getElementById('sub-' + n).style.display = 'block';
    event.target.classList.add('active');
}

function showMain() {
    document.getElementById('scr-setup').classList.remove('active');
    document.getElementById('scr-main').classList.add('active');
    spawn(); updateUI();
}
</script>
</body>
</html>
