<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Писок Данжен</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Пиксельный стиль и шрифты */
        body { margin: 0; padding: 0; background: #000; color: #fff; font-family: 'Courier New', monospace; image-rendering: pixelated; }
        #game-container { max-width: 500px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; }
        
        .screen { display: none; flex-direction: column; align-items: center; padding: 10px; text-align: center; }
        .active { display: flex; }

        /* Выбор персонажа */
        .avatar-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
        .avatar-card { border: 2px solid #444; padding: 5px; cursor: pointer; background: #222; }
        .avatar-card img { width: 60px; height: 60px; display: block; margin-bottom: 5px; }
        .avatar-card.selected { border-color: #f1c40f; background: #443300; }

        /* Город (Пиксельная карта) */
        #city-map { 
            width: 320px; height: 320px; 
            background: #2d5a27; /* Зеленый цвет травы */
            border: 4px solid #5d4037;
            position: relative;
            background-image: radial-gradient(#3d7a37 10%, transparent 11%); /* Простая текстура */
            background-size: 20px 20px;
        }
        .building { position: absolute; cursor: pointer; font-size: 40px; transition: transform 0.2s; }
        .building:hover { transform: scale(1.1); }
        
        /* Кнопки и бары */
        button { padding: 10px 20px; background: #5d4037; color: #fff; border: 3px solid #3e2723; cursor: pointer; font-family: inherit; }
        .hp-bar { width: 200px; height: 20px; background: #333; border: 2px solid #fff; position: relative; }
        #hp-fill { background: #e74c3c; height: 100%; width: 100%; transition: 0.3s; }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- 1. ЭКРАН ВЫБОРА ГЕРОЯ (ПОКАЗЫВАЕТСЯ ОДИН РАЗ) -->
        <div id="screen-setup" class="screen">
            <h2>КТО ТЫ СЕГОДНЯ?</h2>
            <div class="avatar-grid" id="friends-list">
                <!-- Сюда подставятся твои друзья из папки avatars -->
            </div>
            <h3>ВЫБЕРИ КЛАСС</h3>
            <div>
                <button onclick="selectClass('Воин')">⚔️ Воин</button>
                <button onclick="selectClass('Маг')">🧙 Маг</button>
                <button onclick="selectClass('Вор')">🗡️ Вор</button>
            </div>
        </div>

        <!-- 2. ЭКРАН ГОРОДА -->
        <div id="screen-city" class="screen">
            <div id="header">
                <span id="display-name">Герой</span> (<span id="display-class">-</span>)
                <br>💰 <span id="gold">0</span> | ⭐ LVL: <span id="lvl">1</span>
            </div>
            <div id="city-map">
                <div class="building" style="top: 40px; left: 40px;" onclick="alert('Пиво восстановило HP!')">🍺<br><small style="font-size:10px">Таверна</small></div>
                <div class="building" style="top: 40px; right: 40px;" onclick="alert('Кузнец занят')">⚒️<br><small style="font-size:10px">Кузнец</small></div>
                <div class="building" style="top: 200px; left: 130px;" onclick="startDungeon()">🚪<br><small style="font-size:10px">В ДАНЖ</small></div>
            </div>
        </div>

        <!-- 3. ЭКРАН БОЯ -->
        <div id="screen-battle" class="screen">
            <div id="enemy-area">
                <div style="font-size: 60px;">👾</div>
                <div class="hp-bar"><div id="enemy-hp-fill" style="background:#a29bfe; width:100%; height:100%;"></div></div>
            </div>
            <div id="player-area" style="margin-top:40px;">
                <div class="hp-bar"><div id="hp-fill"></div></div>
                <p>Твое HP: <span id="hp">100</span></p>
                <button onclick="attack()">⚔️ АТАКОВАТЬ</button>
            </div>
        </div>
    </div>

    <script>
       const tg = window.Telegram.WebApp;
tg.expand();

// СЮДА ВПИШИ ИМЕНА СВОИХ ДРУЗЕЙ (названия файлов в папке avatars)
const friends = ['Dima', 'Sanya', 'Vovan', 'Lexa', 'Misha']; 

let gameState = JSON.parse(localStorage.getItem('pisok_rpg_save')) || null;

// Префиксы в стиле PoE
const prefixes = [
    { name: "Огненный", bonus: 5, stat: "str" },
    { name: "Ледяной", bonus: 3, stat: "str" },
    { name: "Древний", bonus: 10, stat: "hp" },
    { name: "Быстрый", bonus: 2, stat: "agi" }
];

function init() {
    if (!gameState) {
        showScreen('screen-setup');
        const list = document.getElementById('friends-list');
        friends.forEach(f => {
            list.innerHTML += `
                <div class="avatar-card" onclick="selectFriend('${f}')">
                    <img src="avatars/${f}.png" onerror="this.src='https://via.placeholder.com/60?text=👤'">
                    <span>${f}</span>
                </div>
            `;
        });
    } else {
        showScreen('screen-city');
        updateUI();
    }
}

function selectFriend(name) {
    gameState = { 
        friend: name, 
        class: '', 
        gold: 0, 
        lvl: 1, 
        hp: 100, 
        maxHp: 100, 
        str: 10,
        inventory: [] 
    };
    document.querySelectorAll('.avatar-card').forEach(c => c.classList.remove('selected'));
    event.currentTarget.classList.add('selected');
}

function selectClass(cl) {
    if (!gameState || !gameState.friend) return alert('Сначала выбери друга!');
    gameState.class = cl;
    saveGame();
    showScreen('screen-city');
    updateUI();
}

function generateLoot() {
    const pre = prefixes[Math.floor(Math.random() * prefixes.length)];
    const item = {
        name: `${pre.name} Меч`,
        bonus: pre.bonus,
        stat: pre.stat
    };
    gameState.inventory.push(item);
    if (pre.stat === 'str') gameState.str += pre.bonus;
    if (pre.stat === 'hp') gameState.maxHp += pre.bonus;
    return item.name;
}

function attack() {
    let dmg = gameState.str + Math.floor(Math.random() * 5);
    let lootName = generateLoot(); // Генерируем предмет в стиле PoE
    
    alert(`Ты нанес ${dmg} урона и победил!\nВыпал предмет: ${lootName}`);
    
    gameState.gold += 20;
    saveGame();
    showScreen('screen-city');
    updateUI();
}

// Остальные функции (showScreen, saveGame, updateUI, startDungeon) остаются такими же
function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function saveGame() {
    localStorage.setItem('pisok_rpg_save', JSON.stringify(gameState));
}

function updateUI() {
    if (!gameState) return;
    document.getElementById('display-name').innerText = gameState.friend;
    document.getElementById('display-class').innerText = gameState.class;
    document.getElementById('gold').innerText = gameState.gold;
    document.getElementById('lvl').innerText = gameState.lvl;
    document.getElementById('hp').innerText = gameState.hp;
    document.getElementById('hp-fill').style.width = (gameState.hp / gameState.maxHp * 100) + '%';
}

function startDungeon() { showScreen('screen-battle'); }

init();
    </script>
</body>
</html>
