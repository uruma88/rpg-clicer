<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PISOK RPG: DUNGEON LORDS</title>
    <style>
        :root { --bg: #0a0a0c; --card: #16161e; --accent: #f1c40f; --win: #2ecc71; --loss: #e74c3c; --shop: #9b59b6; }
        body { margin: 0; background: var(--bg); color: #eee; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        #game-container { max-width: 480px; margin: 0 auto; min-height: 100vh; padding: 15px; box-sizing: border-box; }
        
        .screen { display: none; flex-direction: column; }
        .active { display: flex; }

        /* Панель прогресса данжа */
        .floor-indicator { text-align: center; background: rgba(231, 76, 60, 0.1); border: 1px solid var(--loss); border-radius: 10px; padding: 5px; margin-bottom: 10px; font-weight: bold; color: var(--loss); }

        /* Карточки */
        .hero-panel { background: var(--card); border-radius: 20px; padding: 15px; border: 1px solid #333; margin-bottom: 15px; }
        .avatar-area { display: flex; gap: 15px; align-items: center; }
        .p-img { width: 65px; height: 65px; border-radius: 15px; border: 2px solid var(--accent); object-fit: cover; }
        
        /* Сетка предметов */
        .eq-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .eq-item { background: #222; border: 1px solid #444; border-radius: 12px; padding: 10px; display: flex; align-items: center; gap: 8px; cursor: pointer; position: relative; }
        .plus-tag { position: absolute; top: -5px; right: -5px; background: var(--accent); color: #000; font-size: 9px; padding: 2px 5px; border-radius: 8px; font-weight: bold; }

        /* Магазин */
        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        .shop-item { background: var(--card); border: 1px solid var(--shop); border-radius: 12px; padding: 10px; text-align: center; }

        /* Кнопки */
        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: bold; margin-bottom: 8px; cursor: pointer; color: #fff; text-transform: uppercase; font-size: 13px; }
        .btn-battle { background: linear-gradient(135deg, #e74c3c, #c0392b); }
        .btn-shop { background: linear-gradient(135deg, #9b59b6, #8e44ad); }
        .btn-inn { background: #27ae60; }
        .btn-back { background: #555; }

        .hp-bar { width: 100%; height: 10px; background: #222; border-radius: 5px; overflow: hidden; margin: 5px 0; }
        .hp-fill { height: 100%; transition: 0.3s; }
        
        .inv-slot { width: 50px; height: 50px; background: #1c1c24; border: 1px solid #333; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    </style>
</head>
<body>

<div id="game-container">
    <!-- ГОРОД -->
    <div id="screen-city" class="screen active">
        <div class="floor-indicator">ТЕКУЩИЙ ЭТАЖ: <span id="cur-floor">1</span></div>
        
        <div class="hero-panel">
            <div class="avatar-area">
                <img id="p-img" class="p-img" src="" onerror="this.src='https://ui-avatars.com/api/?name=Hero'">
                <div style="flex:1">
                    <h3 id="p-name" style="margin:0">ЮРА</h3>
                    <div style="font-size: 10px; color: var(--accent);">POWER: <span id="p-power">0</span> | HP: <span id="p-hp-num">100/100</span></div>
                    <div class="hp-bar"><div id="hp-fill" class="hp-fill" style="background:var(--loss)"></div></div>
                </div>
            </div>

            <div class="eq-grid">
                <div class="eq-item" onclick="forge('weapon')">
                    <span id="p-wep-icon">🗡️</span>
                    <div style="font-size:11px"><b id="p-wep-lvl">+0</b><br>ATK</div>
                </div>
                <div class="eq-item" onclick="forge('armor')">
                    <span id="p-arm-icon">🛡️</span>
                    <div style="font-size:11px"><b id="p-arm-lvl">+0</b><br>DEF</div>
                </div>
            </div>

            <div style="display:flex; justify-content:space-between; font-size:12px; background:rgba(0,0,0,0.4); padding:8px; border-radius:8px;">
                <span>💰 <span id="p-gold">0</span></span>
                <span>🐺 <span id="p-skins">0</span></span>
                <span>⛓️ <span id="p-ore">0</span></span>
            </div>
        </div>

        <button class="btn btn-battle" onclick="showScreen('screen-battle'); startBattle()">⚔️ ВОЙТИ В ДАНЖ</button>
        <button class="btn btn-shop" onclick="showScreen('screen-shop')">🛒 МАГАЗИН</button>
        <button class="btn btn-inn" onclick="rest()">🍺 ТАВЕРНА (20💰)</button>
    </div>

    <!-- МАГАЗИН -->
    <div id="screen-shop" class="screen">
        <h2 style="color:var(--shop)">ЛАВКА МЕРЛИНА</h2>
        <div class="shop-grid">
            <div class="shop-item">
                <div style="font-size:30px">🧪</div>
                <div style="font-size:12px; margin:5px 0">Зелье HP</div>
                <button class="btn btn-shop" style="padding:5px" onclick="buyItem('potion', 50)">50💰</button>
            </div>
            <div class="shop-item">
                <div style="font-size:30px">📦</div>
                <div style="font-size:12px; margin:5px 0">Случайный Лут</div>
                <button class="btn btn-shop" style="padding:5px" onclick="buyItem('chest', 150)">150💰</button>
            </div>
        </div>
        <button class="btn btn-back" style="margin-top:20px" onclick="showScreen('screen-city')">НАЗАД В ГОРОД</button>
    </div>

    <!-- БОЙ -->
    <div id="screen-battle" class="screen">
        <div style="text-align:center; padding:30px 0;">
            <div id="e-icon" style="font-size:80px; transition: 0.2s">👹</div>
            <h2 id="e-name" style="margin:10px 0">МОНСТР</h2>
            <div class="hp-bar" style="width:200px; margin:0 auto;"><div id="e-hp-fill" class="hp-fill" style="background:var(--win)"></div></div>
            <div id="battle-log" style="font-size:12px; color:#888; margin-top:15px; height:40px"></div>
        </div>
        <button class="btn btn-battle" id="atk-btn" onclick="attack()">УДАРИТЬ</button>
    </div>
</div>

<script>
    let p = JSON.parse(localStorage.getItem('psk_dungeon_v1')) || {
        name: 'Юра', gold: 100, skins: 0, ore: 0, hp: 100, max: 100, floor: 1,
        wepLvl: 0, armLvl: 0, inv: []
    };

    let enemy = null;

    function save() { localStorage.setItem('psk_dungeon_v1', JSON.stringify(p)); }

    function updateUI() {
        document.getElementById('p-img').src = `avatars/${p.name.toLowerCase()}.jpg`;
        document.getElementById('p-gold').innerText = p.gold;
        document.getElementById('p-skins').innerText = p.skins;
        document.getElementById('p-ore').innerText = p.ore;
        document.getElementById('cur-floor').innerText = p.floor;
        document.getElementById('p-wep-lvl').innerText = `+${p.wepLvl}`;
        document.getElementById('p-arm-lvl').innerText = `+${p.armLvl}`;
        document.getElementById('p-hp-num').innerText = `${Math.floor(p.hp)}/${p.max}`;
        
        let power = 10 + (p.wepLvl * 5) + (p.armLvl * 3) + (p.floor * 2);
        document.getElementById('p-power').innerText = power;
        document.getElementById('hp-fill').style.width = (p.hp / p.max * 100) + '%';
        save();
    }

    function forge(type) {
        let lvl = type === 'weapon' ? p.wepLvl : p.armLvl;
        let cost = (lvl + 1) * 40;
        if(p.gold >= cost) {
            p.gold -= cost;
            if(type === 'weapon') p.wepLvl++; else p.armLvl++;
            alert("Улучшено!"); updateUI();
        } else alert("Нужно " + cost + " золота!");
    }

    function buyItem(type, cost) {
        if(p.gold >= cost) {
            p.gold -= cost;
            if(type === 'potion') { p.hp = p.max; alert("Здоровье восстановлено!"); }
            if(type === 'chest') { p.wepLvl += 2; alert("В сундуке была заточка! +2 к оружию!"); }
            updateUI();
        } else alert("Мало золота!");
    }

    function startBattle() {
        let isBoss = p.floor % 5 === 0;
        enemy = {
            name: isBoss ? "БОСС: ПОЖИРАТЕЛЬ" : "Гоблин-разведчик",
            hp: (20 * p.floor) + (isBoss ? 200 : 0),
            max: (20 * p.floor) + (isBoss ? 200 : 0),
            str: 5 + (p.floor * 2),
            icon: isBoss ? "🐉" : "👺"
        };
        document.getElementById('e-icon').innerText = enemy.icon;
        document.getElementById('e-name').innerText = enemy.name;
        document.getElementById('battle-log').innerText = isBoss ? "ПРИГОТОВЬСЯ К СМЕРТИ!" : "Враг нападает!";
        updateBattleUI();
    }

    function attack() {
        let dmg = 10 + (p.wepLvl * 4) + Math.floor(Math.random() * 10);
        enemy.hp -= dmg;
        document.getElementById('e-icon').style.transform = "scale(1.2)";
        setTimeout(() => document.getElementById('e-icon').style.transform = "scale(1)", 100);

        if(enemy.hp <= 0) return win();

        let eDmg = Math.max(1, enemy.str - (p.armLvl * 3));
        p.hp -= eDmg;
        document.getElementById('battle-log').innerText = `Ты: -${dmg} HP | Враг: -${eDmg} HP`;

        if(p.hp <= 0) {
            p.hp = 1; p.floor = Math.max(1, p.floor - 1);
            alert("Ты пал... Пришлось отступить на этаж назад.");
            showScreen('screen-city');
        }
        updateBattleUI(); updateUI();
    }

    function win() {
        let reward = 20 + (p.floor * 10);
        p.gold += reward;
        if(p.floor % 5 === 0) { p.ore += 5; alert("БОСС ПОВЕРЖЕН! +5 Руды"); }
        p.floor++;
        alert(`Победа! Этаж ${p.floor-1} пройден. Награда: ${reward}💰`);
        showScreen('screen-city');
        updateUI();
    }

    function rest() { if(p.gold >= 20) { p.gold -= 20; p.hp = p.max; updateUI(); } }
    function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    function updateBattleUI() { document.getElementById('e-hp-fill').style.width = (enemy.hp/enemy.max*100) + '%'; }

    updateUI();
</script>
</body>
</html>
