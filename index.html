<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>🍺 Писок Данжен · Пиксельный мир</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            margin: 0;
            padding: 0;
        }
        body {
            background: #0c100a;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }
        .game {
            max-width: 600px;
            width: 100%;
            background: #1e2518;
            border-radius: 36px;
            padding: 16px;
            border: 3px solid #b87c3a;
            box-shadow: 0 8px 20px black;
        }
        /* Верхняя панель статуса */
        .status-bar {
            background: #2a2a1c;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            padding: 8px 12px;
            border-radius: 40px;
            margin-bottom: 16px;
            font-weight: bold;
            color: #f7d77b;
            font-size: 12px;
        }
        .status-item {
            background: #00000066;
            padding: 4px 10px;
            border-radius: 30px;
        }
        /* Пиксельный город */
        .pixel-town {
            background: #3f6032;
            border-radius: 32px;
            padding: 16px 12px;
            margin-bottom: 16px;
            border: 2px solid #e4b05a;
            box-shadow: inset 0 0 0 2px #2a3a1e;
        }
        .houses {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .house {
            background: #9c7b48;
            width: 95px;
            text-align: center;
            padding: 8px 4px;
            border-radius: 20px;
            cursor: pointer;
            border-bottom: 4px solid #5e3e24;
            font-weight: bold;
            color: #ffefb9;
        }
        .house:active { transform: translateY(2px); border-bottom-width: 2px; }
        .house-icon { font-size: 40px; }
        /* Главный экран с героем */
        .hero-screen {
            background: #2a2a1cdd;
            border-radius: 32px;
            padding: 16px;
            margin-bottom: 16px;
            display: flex;
            gap: 16px;
            align-items: center;
        }
        .hero-pixel {
            background: #344e2a;
            border-radius: 28px;
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 56px;
            box-shadow: inset 0 0 0 2px #c2a15b;
            position: relative;
        }
        .hero-info {
            flex: 1;
        }
        .hero-name {
            font-size: 20px;
            font-weight: bold;
            color: #ffcd94;
        }
        .hero-class {
            background: #00000077;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 60px;
            font-size: 12px;
            margin-top: 6px;
        }
        .stat-buttons {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        .pixel-btn {
            background: #ca943a;
            padding: 8px;
            border-radius: 40px;
            text-align: center;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 3px 0 #754c20;
            flex: 1;
        }
        .pixel-btn:active { transform: translateY(2px); box-shadow: none; }
        /* Инвентарь / Снаряжение */
        .grid-items {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 12px;
            max-height: 220px;
            overflow-y: auto;
        }
        .item-row {
            background: #8b6946;
            padding: 10px;
            border-radius: 36px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .equip-slot {
            background: #5f4a2e;
            border-radius: 24px;
            padding: 8px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }
        .btn-small {
            background: #f3b33d;
            border: none;
            padding: 5px 12px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
        }
        .log-area {
            background: #0f110a;
            border-radius: 28px;
            padding: 8px;
            height: 70px;
            overflow-y: auto;
            font-size: 10px;
            color: #eab96b;
            margin-top: 12px;
        }
        .damage-number {
            position: fixed;
            font-size: 28px;
            font-weight: bold;
            color: #ffc857;
            text-shadow: 0 0 3px black;
            pointer-events: none;
            animation: floatUp 0.4s forwards;
            z-index: 1000;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-50px); }
        }
        .flash-red {
            animation: redFlash 0.12s linear 2;
        }
        @keyframes redFlash {
            0% { background: #2a2a1cdd; }
            50% { background: #b44a4aee; }
            100% { background: #2a2a1cdd; }
        }
    </style>
</head>
<body>
<div class="game">
    <div class="status-bar">
        <div class="status-item">🍺 <span id="gold">250</span></div>
        <div class="status-item">⚔️ <span id="atk">0</span></div>
        <div class="status-item">❤️ <span id="hp">0</span>/<span id="maxHp">0</span></div>
        <div class="status-item">💙 <span id="ap">100</span>/<span id="maxAp">100</span></div>
        <div class="status-item">🌟 lvl <span id="level">1</span></div>
        <div class="status-item">🏔️ этаж <span id="floor">1</span></div>
    </div>

    <!-- ПИКСЕЛЬНЫЙ ГОРОД (домики) -->
    <div class="pixel-town">
        <div class="houses">
            <div class="house" data-loc="tavern">🍺<div>ТАВЕРНА</div></div>
            <div class="house" data-loc="smith">⚒️<div>КУЗНЕЦ</div></div>
            <div class="house" data-loc="gate">🚪<div>ВОРОТА</div></div>
        </div>
    </div>

    <!-- ГЛАВНЫЙ ЭКРАН (герой + информация) -->
    <div id="mainPanel"></div>

    <div class="log-area" id="logArea"></div>
</div>

<script>
    // ---------- ДРУЗЬЯ (с аватарками) ----------
    const FRIENDS = [
        { name: "Алина", avatar: "avatars/алина.jpg", emoji: "👩", str: 1, int: 3, agi: 2, vit: 2 },
        { name: "Бень", avatar: "avatars/бень.jpg", emoji: "🐻", str: 4, int: 1, agi: 1, vit: 4 },
        { name: "Богдан", avatar: "avatars/богдан.jpg", emoji: "💪", str: 3, int: 2, agi: 2, vit: 3 },
        { name: "Ваня", avatar: "avatars/ваня.jpg", emoji: "🧢", str: 2, int: 2, agi: 3, vit: 3 },
        { name: "Егор", avatar: "avatars/егор.jpg", emoji: "⚡", str: 3, int: 1, agi: 3, vit: 2 },
        { name: "Илюха", avatar: "avatars/илюха.jpg", emoji: "🛡️", str: 2, int: 1, agi: 1, vit: 5 },
        { name: "Капрал", avatar: "avatars/капрал.jpg", emoji: "🎖️", str: 5, int: 1, agi: 2, vit: 3 },
        { name: "Кирилл", avatar: "avatars/кирилл.jpg", emoji: "👊", str: 3, int: 2, agi: 3, vit: 2 },
        { name: "Лера", avatar: "avatars/лера.jpg", emoji: "🌸", str: 1, int: 3, agi: 3, vit: 2 },
        { name: "Никитос", avatar: "avatars/никитос.jpg", emoji: "👊", str: 3, int: 2, agi: 3, vit: 2 },
        { name: "Полина", avatar: "avatars/полина.jpg", emoji: "✨", str: 1, int: 4, agi: 2, vit: 2 },
        { name: "Рома", avatar: "avatars/рома.jpg", emoji: "⚔️", str: 4, int: 1, agi: 2, vit: 3 },
        { name: "Саша", avatar: "avatars/саша.jpg", emoji: "⚔️", str: 4, int: 1, agi: 2, vit: 4 },
        { name: "Серега", avatar: "avatars/серега.jpg", emoji: "💣", str: 3, int: 2, agi: 2, vit: 3 },
        { name: "Таня", avatar: "avatars/таня.jpg", emoji: "🍀", str: 2, int: 3, agi: 2, vit: 3 },
        { name: "Юра", avatar: "avatars/юра.jpg", emoji: "🌪️", str: 3, int: 2, agi: 3, vit: 2 }
    ];

    let game = {
        gold: 350, level: 1, exp: 0, xpNext: 100, skillPoints: 0,
        strength: 10, intelligence: 10, agility: 10, vitality: 10,
        hp: 100, maxHp: 100,
        ap: 100, maxAp: 100,
        floor: 1,
        className: null, classLocked: false,
        friend: null,
        weapon: null, armor: null, helmet: null
    };
    let currentEnemy = null;
    let waitingAction = true;
    let logs = [];
    let inDungeon = false;
    let currentMenu = "hero";

    function addLog(m) { logs.unshift(`🍺 ${m}`); if(logs.length>6) logs.pop(); document.getElementById('logArea').innerHTML = logs.join('<br>'); }
    function totalAtk() { let w = game.weapon?.atk || 0; return game.strength + w + (game.className==='warrior'? Math.floor(game.strength*0.2):0); }
    function totalMaxHp() { return 80 + game.vitality*5 + (game.armor?.hp||0) + (game.helmet?.hp||0); }
    function calcDamage() { return Math.floor(totalAtk() + Math.random()*8); }
    function updateUI() {
        document.getElementById('gold').innerText = Math.floor(game.gold);
        document.getElementById('atk').innerText = calcDamage();
        let mhp = totalMaxHp();
        document.getElementById('maxHp').innerText = mhp;
        document.getElementById('hp').innerText = game.hp;
        document.getElementById('ap').innerText = game.ap;
        document.getElementById('maxAp').innerText = game.maxAp;
        document.getElementById('level').innerText = game.level;
        document.getElementById('floor').innerText = game.floor;
        if(currentEnemy && document.getElementById('enemyFill')) {
            let per = (currentEnemy.hp/currentEnemy.maxHp)*100;
            document.getElementById('enemyFill').style.width = `${Math.max(0,per)}%`;
            document.getElementById('enemyHpText').innerHTML = `❤️ ${Math.floor(currentEnemy.hp)}/${currentEnemy.maxHp}`;
        }
        if(!inDungeon) drawHeroScreen();
    }
    function saveGame() { localStorage.setItem('pisokFinalSave', JSON.stringify(game)); }
    function loadGame() { let s = localStorage.getItem('pisokFinalSave'); if(s) { let d=JSON.parse(s); for(let k in d) game[k]=d[k]; } game.hp = Math.min(game.hp, totalMaxHp()); }

    // ---------- ГЛАВНЫЙ ЭКРАН С ГЕРОЕМ ----------
    function drawHeroScreen() {
        let friend = game.friend || { name: "Игрок", avatar: "", emoji: "🍺" };
        let avatarHtml = friend.avatar ? `<img src="${friend.avatar}" style="width:100%; height:100%; object-fit:cover;">` : friend.emoji;
        let classStr = game.className ? game.className.toUpperCase() : "НЕТ";
        document.getElementById('mainPanel').innerHTML = `
            <div class="hero-screen">
                <div class="hero-pixel">${avatarHtml}</div>
                <div class="hero-info">
                    <div class="hero-name">${friend.name}</div>
                    <div class="hero-class">${classStr}</div>
                    <div class="stat-buttons">
                        <div class="pixel-btn" id="toInvBtn">🎒 ИНВЕНТАРЬ</div>
                        <div class="pixel-btn" id="toEquipBtn">⚔️ СНАРЯЖЕНИЕ</div>
                    </div>
                </div>
            </div>
            <div class="stat-buttons" style="margin-top:6px;">
                <div class="pixel-btn" id="upgradeBtn">📈 ПРОКАЧКА</div>
                <div class="pixel-btn" id="townBtn">🏠 В ГОРОД</div>
            </div>
        `;
        document.getElementById('toInvBtn').onclick = () => showInventory();
        document.getElementById('toEquipBtn').onclick = () => showEquipment();
        document.getElementById('upgradeBtn').onclick = () => showUpgrade();
        document.getElementById('townBtn').onclick = () => { if(!inDungeon) showTown("tavern"); else addLog(`Сначала закончи бой!`); };
    }

    function showInventory() {
        let items = [];
        if(game.weapon) items.push(`🗡️ ${game.weapon.name} (+${game.weapon.atk}⚔️)`);
        if(game.armor) items.push(`🛡️ ${game.armor.name} (+${game.armor.hp}❤️)`);
        if(game.helmet) items.push(`🧢 ${game.helmet.name} (+${game.helmet.hp}❤️)`);
        let html = `<div class="grid-items">`;
        if(items.length===0) html += `<div class="item-row">🎒 Пусто</div>`;
        else items.forEach(it=>{ html += `<div class="item-row">${it}</div>`; });
        html += `<div class="pixel-btn" id="backHeroBtn">🔙 НАЗАД</div></div>`;
        document.getElementById('mainPanel').innerHTML = html;
        document.getElementById('backHeroBtn').onclick = drawHeroScreen;
    }

    function showEquipment() {
        let weaponEquip = game.weapon ? game.weapon.name : "---";
        let armorEquip = game.armor ? game.armor.name : "---";
        let helmetEquip = game.helmet ? game.helmet.name : "---";
        document.getElementById('mainPanel').innerHTML = `
            <div class="equip-slot">🗡️ ОРУЖИЕ: ${weaponEquip} <button class="btn-small" id="uneqW">Снять</button></div>
            <div class="equip-slot">🛡️ БРОНЯ: ${armorEquip} <button class="btn-small" id="uneqA">Снять</button></div>
            <div class="equip-slot">🧢 ШЛЕМ: ${helmetEquip} <button class="btn-small" id="uneqH">Снять</button></div>
            <div class="pixel-btn" id="backEquipBtn">🔙 НАЗАД</div>
        `;
        document.getElementById('uneqW')?.addEventListener('click',()=>{ game.weapon=null; saveGame(); showEquipment(); updateUI(); });
        document.getElementById('uneqA')?.addEventListener('click',()=>{ game.armor=null; saveGame(); showEquipment(); updateUI(); });
        document.getElementById('uneqH')?.addEventListener('click',()=>{ game.helmet=null; saveGame(); showEquipment(); updateUI(); });
        document.getElementById('backEquipBtn').onclick = drawHeroScreen;
    }

    function showUpgrade() {
        let sp = game.skillPoints;
        document.getElementById('mainPanel').innerHTML = `
            <div class="grid-items">
                <div class="item-row">✨ ОЧКИ НАВЫКОВ: ${sp}</div>
                <div class="item-row">💪 СИЛА (урон) <button class="btn-small" id="upStr">+1</button></div>
                <div class="item-row">🧠 ИНТЕЛЛЕКТ <button class="btn-small" id="upInt">+1</button></div>
                <div class="item-row">🏃‍♂️ ЛОВКОСТЬ <button class="btn-small" id="upAgi">+1</button></div>
                <div class="item-row">❤️ ЗДОРОВЬЕ <button class="btn-small" id="upVit">+1</button></div>
                <div class="pixel-btn" id="backUpBtn">🔙 НАЗАД</div>
            </div>
        `;
        document.getElementById('upStr')?.addEventListener('click',()=>{ if(sp>0){ game.skillPoints--; game.strength++; addLog(`💪 Сила +1`); saveGame(); showUpgrade(); updateUI(); } else addLog(`❌ Нет очков`); });
        document.getElementById('upInt')?.addEventListener('click',()=>{ if(sp>0){ game.skillPoints--; game.intelligence++; addLog(`🧠 Интеллект +1`); saveGame(); showUpgrade(); updateUI(); } else addLog(`❌ Нет очков`); });
        document.getElementById('upAgi')?.addEventListener('click',()=>{ if(sp>0){ game.skillPoints--; game.agility++; addLog(`🏃 Ловкость +1`); saveGame(); showUpgrade(); updateUI(); } else addLog(`❌ Нет очков`); });
        document.getElementById('upVit')?.addEventListener('click',()=>{ if(sp>0){ game.skillPoints--; game.vitality++; addLog(`❤️ Здоровье +1`); saveGame(); showUpgrade(); updateUI(); } else addLog(`❌ Нет очков`); });
        document.getElementById('backUpBtn').onclick = drawHeroScreen;
    }

    // ---------- ГОРОД (домики) ----------
    function showTown(loc) {
        inDungeon = false;
        if(loc === 'tavern') {
            document.getElementById('mainPanel').innerHTML = `
                <div class="pixel-btn" id="healBtn">💚 ЛЕЧЕНИЕ (30🍺)</div>
                <div class="pixel-btn" id="backTownBtn">🏠 К ГЕРОЮ</div>
            `;
            document.getElementById('healBtn')?.addEventListener('click',()=>{ if(game.gold>=30){ game.gold-=30; game.hp=totalMaxHp(); game.ap=game.maxAp; addLog(`💚 Вылечен!`); saveGame(); updateUI(); } else addLog(`❌ Мало золота`); });
            document.getElementById('backTownBtn').onclick = drawHeroScreen;
        }
        else if(loc === 'smith') {
            document.getElementById('mainPanel').innerHTML = `
                <div class="item-row">🗡️ ДУБИНА (+5 силы) 150🍺 <button class="btn-small" id="buyClub">Купить</button></div>
                <div class="item-row">🛡️ КОЖАНАЯ БРОНЯ (+15 HP) 120🍺 <button class="btn-small" id="buyArmor">Купить</button></div>
                <div class="item-row">🧢 ШЛЕМ ПИВОВАРА (+10 HP) 100🍺 <button class="btn-small" id="buyHelm">Купить</button></div>
                <div class="pixel-btn" id="backTownBtn2">🔙 НАЗАД</div>
            `;
            document.getElementById('buyClub')?.addEventListener('click',()=>{ if(game.gold>=150 && !game.weapon){ game.gold-=150; game.weapon={name:"Дубина", atk:5}; addLog(`🗡️ Куплена дубина!`); saveGame(); showTown('smith'); updateUI(); } else addLog(`❌ Не хватает или уже есть`); });
            document.getElementById('buyArmor')?.addEventListener('click',()=>{ if(game.gold>=120 && !game.armor){ game.gold-=120; game.armor={name:"Кожанка", hp:15}; game.hp+=15; addLog(`🛡️ Куплена броня!`); saveGame(); showTown('smith'); updateUI(); } else addLog(`❌ Ошибка`); });
            document.getElementById('buyHelm')?.addEventListener('click',()=>{ if(game.gold>=100 && !game.helmet){ game.gold-=100; game.helmet={name:"Шлем", hp:10}; game.hp+=10; addLog(`🧢 Куплен шлем!`); saveGame(); showTown('smith'); updateUI(); } else addLog(`❌ Не хватает`); });
            document.getElementById('backTownBtn2').onclick = drawHeroScreen;
        }
        else if(loc === 'gate') {
            document.getElementById('mainPanel').innerHTML = `<div class="pixel-btn" id="startDungeonBtn">🍺 НАЧАТЬ ЗАБЕГ</div><div class="pixel-btn" id="backGateBtn">🔙 НАЗАД</div>`;
            document.getElementById('startDungeonBtn').onclick = startBattle;
            document.getElementById('backGateBtn').onclick = drawHeroScreen;
        }
        updateUI();
    }

    // ---------- БОЙ ----------
    function startBattle() {
        inDungeon = true;
        let enemies = [
            { name: "🍺 Пиво", emoji: "🍺", hp: 55, maxHp:55, dmg:8, gold:30, exp:35 },
            { name: "🛢️ Бочка", emoji: "🛢️", hp: 80, maxHp:80, dmg:10, gold:45, exp:45 },
            { name: "💪 Вышибала", emoji: "💪", hp: 110, maxHp:110, dmg:13, gold:65, exp:60 }
        ];
        let isBoss = (game.floor % 5 === 0);
        if(isBoss) currentEnemy = { name: "👑 БОСС", emoji: "👑", hp: 180, maxHp:180, dmg:18, gold:150, exp:120 };
        else { let idx = Math.floor(Math.random()*enemies.length); currentEnemy = { ...enemies[idx], hp: enemies[idx].hp, maxHp: enemies[idx].hp }; }
        waitingAction = true;
        addLog(`⚔️ Бой: ${currentEnemy.name}`);
        renderBattle();
    }
    function renderBattle() {
        document.getElementById('mainPanel').innerHTML = `
            <div class="hero-screen" style="flex-direction:column;" id="battleCard">
                <div style="font-size:60px;">${currentEnemy.emoji}</div>
                <div class="hero-name">${currentEnemy.name}</div>
                <div class="hp-bar" style="background:#5a3e24; border-radius:20px; height:10px; width:100%;"><div id="enemyFill" style="height:100%; width:100%; background:#d44c2f; border-radius:20px;"></div></div>
                <div id="enemyHpText">❤️ ${currentEnemy.hp}/${currentEnemy.maxHp}</div>
            </div>
            <div class="stat-buttons" style="margin-top:8px;">
                <div class="pixel-btn" id="atkBtn">⚔️ АТАКА</div>
                <div class="pixel-btn" id="skillBtn">✨ УМЕНИЕ</div>
                <div class="pixel-btn" id="restBtn">😴 ОТДЫХ</div>
                <div class="pixel-btn" id="runBattleBtn">🏃‍♂️ СДАЧА</div>
            </div>
        `;
        document.getElementById('atkBtn').onclick = attack;
        document.getElementById('skillBtn').onclick = useSkill;
        document.getElementById('restBtn').onclick = () => { if(waitingAction){ game.ap=Math.min(game.maxAp,game.ap+20); addLog(`😴 +20 AP`); waitingAction=false; updateUI(); setTimeout(enemyTurn,600); } };
        document.getElementById('runBattleBtn').onclick = () => { inDungeon=false; drawHeroScreen(); addLog(`Вы сбежали в город`); };
        updateUI();
    }
    function damageAnim(isPlayer) {
        let card = document.getElementById('battleCard');
        if(card) card.style.animation = 'none'; card.offsetHeight; card.style.animation = 'shakeAnim 0.2s ease 2';
        if(isPlayer) document.getElementById('mainPanel').classList.add('flash-red');
        setTimeout(()=>document.getElementById('mainPanel')?.classList.remove('flash-red'),300);
        let d = document.createElement('div'); d.className = 'damage-number'; d.innerText = '-УДАР!';
        d.style.left = '45%'; d.style.top = '30%'; document.body.appendChild(d); setTimeout(()=>d.remove(),400);
    }
    function victory() {
        game.gold += currentEnemy.gold;
        game.exp += currentEnemy.exp;
        addLog(`🏆 ПОБЕДА! +${currentEnemy.gold}🍺 +${currentEnemy.exp} XP`);
        if(game.exp >= game.xpNext) {
            game.level++; game.exp -= game.xpNext; game.xpNext = Math.floor(game.xpNext*1.2); game.skillPoints+=3;
            addLog(`🎉 УРОВЕНЬ ${game.level}! +3 очка навыков! 🎉`);
        }
        game.floor++;
        saveGame();
        startBattle();
        updateUI();
    }
    function attack() {
        if(!waitingAction) return;
        if(game.ap < 15) { addLog(`❌ Нет AP`); return; }
        game.ap -= 15;
        let dmg = calcDamage();
        if(game.className==='rogue' && Math.random()<0.2) { dmg = Math.floor(dmg*1.5); addLog(`🗡️ КРИТ!`); }
        currentEnemy.hp -= dmg;
        addLog(`⚔️ Удар ${dmg}`);
        damageAnim(false);
        if(currentEnemy.hp <= 0) { victory(); updateUI(); return; }
        waitingAction = false; updateUI(); setTimeout(enemyTurn,700);
    }
    function useSkill() {
        if(!waitingAction) return;
        if(game.ap < 30) { addLog(`❌ Нужно 30 AP`); return; }
        game.ap -= 30;
        let dmg = calcDamage() + 15;
        if(game.className==='mage') { dmg += game.intelligence; addLog(`🧙 Огненный шар! ${dmg}`); }
        else if(game.className==='warrior') { dmg = Math.floor(dmg*1.4); addLog(`⚔️ Сокрушитель! ${dmg}`); }
        else { dmg = Math.floor(dmg*1.3); addLog(`🗡️ Танец клинков! ${dmg}`); }
        currentEnemy.hp -= dmg;
        damageAnim(false);
        if(currentEnemy.hp <= 0) { victory(); updateUI(); return; }
        waitingAction = false; updateUI(); setTimeout(enemyTurn,600);
    }
    function enemyTurn() {
        if(currentEnemy.hp <= 0) return;
        let dmg = currentEnemy.dmg;
        game.hp -= dmg;
        addLog(`😖 ${currentEnemy.name} атакует! -${dmg} HP`);
        damageAnim(true);
        if(game.hp <= 0) {
            addLog(`💀 ПОРАЖЕНИЕ! -30 золота`);
            game.gold = Math.max(0, game.gold-30);
            game.hp = totalMaxHp(); game.ap = game.maxAp;
            inDungeon=false; drawHeroScreen();
            return;
        }
        waitingAction = true; updateUI(); saveGame();
    }

    // ---------- ВЫБОР СТАРТОВОГО ПЕРСОНАЖА И КЛАССА ----------
    function startSelection() {
        document.getElementById('mainPanel').innerHTML = `<div class="hero-name" style="text-align:center;">ВЫБЕРИ ДРУГА</div><div id="friendStartGrid" style="display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-top:12px;"></div><div id="classStartArea"></div>`;
        let grid = document.getElementById('friendStartGrid');
        FRIENDS.forEach(f=>{
            let card = document.createElement('div'); card.className = 'friend-card'; card.style.background='#8b6946'; card.style.padding='6px'; card.style.borderRadius='24px'; card.style.width='75px'; card.style.textAlign='center'; card.style.cursor='pointer';
            card.innerHTML = `<div style="width:50px; height:50px; margin:0 auto; background:#5e3e1e; border-radius:50%; overflow:hidden;"><img src="${f.avatar}" onerror="this.style.display='none'; this.parentElement.innerHTML='${f.emoji}'" style="width:100%; height:100%; object-fit:cover;"></div><div>${f.name}</div>`;
            card.onclick = () => {
                game.friend = f;
                game.strength = f.str; game.intelligence = f.int; game.agility = f.agi; game.vitality = f.vit;
                game.hp = totalMaxHp();
                document.getElementById('classStartArea').innerHTML = `<div style="display:flex; gap:8px; margin-top:16px; justify-content:center;"><div class="pixel-btn" data-class="warrior">⚔️ ВОИН</div><div class="pixel-btn" data-class="mage">🧙 МАГ</div><div class="pixel-btn" data-class="rogue">🗡️ ВОР</div></div>`;
                document.querySelectorAll('[data-class]').forEach(btn=>{
                    btn.onclick = () => {
                        game.className = btn.dataset.class; game.classLocked = true;
                        saveGame();
                        drawHeroScreen();
                    };
                });
            };
            grid.appendChild(card);
        });
    }

    // ---------- ПЕРЕКЛЮЧЕНИЕ ДОМИКОВ ----------
    document.querySelectorAll('.house').forEach(h=>{
        h.addEventListener('click',()=>{
            if(inDungeon) { addLog(`Сначала закончи бой!`); return; }
            showTown(h.dataset.loc);
        });
    });

    loadGame();
    if(!game.classLocked || !game.friend) startSelection();
    else drawHeroScreen();
    updateUI();
</script>
</body>
</html>
