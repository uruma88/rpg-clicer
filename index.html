<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PISOK RPG: Evolution</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0f0f13; --card: #1c1c24; --accent: #f1c40f;
            --text: #e0e0e0; --blue: #3498db; --red: #e74c3c;
            --common: #7f8c8d; --rare: #3498db; --epic: #9b59b6; --legend: #f1c40f;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .game-container { width: 100%; max-width: 450px; }
        .card { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid #333; margin-bottom: 15px; position: relative; }
        
        /* Стили классов */
        .class-select { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 20px; }
        .class-card { background: #2c3e50; padding: 10px; border-radius: 10px; text-align: center; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .class-card:hover { border-color: var(--accent); background: #34495e; }

        /* Слот-система */
        .slots-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .slot { background: rgba(0,0,0,0.3); border: 1px solid #444; border-radius: 10px; padding: 10px; text-align: center; cursor: pointer; }
        .slot-icon { font-size: 24px; display: block; margin-bottom: 5px; }
        
        .hp-bar { background: #333; height: 12px; border-radius: 6px; overflow: hidden; margin: 10px 0; border: 1px solid #000; }
        .hp-fill { background: linear-gradient(90deg, #c0392b, #e74c3c); height: 100%; transition: 0.3s; }
        
        .inventory-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; background: rgba(0,0,0,0.4); padding: 10px; border-radius: 10px; min-height: 60px; }
        .item { background: #2c3e50; border-radius: 6px; padding: 8px; text-align: center; cursor: pointer; border: 1px solid #444; font-size: 20px; }
        
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 8px; color: white; }
        .btn-red { background: var(--red); } .btn-blue { background: var(--blue); } .btn-gray { background: #444; }
        
        #chat-box, #leaderboard-list { height: 180px; overflow-y: auto; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px; margin-bottom: 10px; font-size: 13px; border: 1px solid #333; }
        
        .screen { display: none; }
        .active { display: block; }
        .stats-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: #444; vertical-align: middle; margin-left: 5px; }
    </style>
</head>
<body>

<div class="game-container">
    <!-- 1. ЭКРАН ВЫБОРА КЛАССА -->
    <div id="screen-setup" class="screen">
        <div class="card" style="text-align: center;">
            <h2>ВЫБЕРИ СВОЙ ПУТЬ</h2>
            <p>Класс определяет твои начальные бонусы</p>
            <div class="class-select">
                <div class="class-card" onclick="selectClass('Воин', 150, 10, 1.1)">
                    <span style="font-size: 30px;">⚔️</span><br><b>Воин</b><br><small>Много HP</small>
                </div>
                <div class="class-card" onclick="selectClass('Маг', 80, 25, 1.0)">
                    <span style="font-size: 30px;">🔮</span><br><b>Маг</b><br><small>Высокий урон</small>
                </div>
                <div class="class-card" onclick="selectClass('Плут', 100, 12, 1.5)">
                    <span style="font-size: 30px;">🗡️</span><br><b>Плут</b><br><small>Лучший лут</small>
                </div>
            </div>
        </div>
    </div>

    <!-- 2. ГЛАВНЫЙ ЭКРАН -->
    <div id="screen-main" class="screen">
        <div class="card">
            <div class="stats-header">
                <div>
                    <b id="p-name">ЮРА</b> <span id="p-class" class="badge">КЛАСС</span>
                </div>
                <div style="color:var(--accent)">POWER: <span id="p-power">10</span></div>
            </div>
            
            <div class="hp-bar"><div id="hp-fill" class="hp-fill" style="width: 100%"></div></div>
            <div style="font-size: 11px; text-align: center; margin-top: -8px; margin-bottom: 10px;">HP: <span id="p-hp-text">100/100</span></div>

            <div class="slots-grid">
                <div class="slot" onclick="unequip('weapon')"><span id="slot-weapon-icon" class="slot-icon">👊</span><small id="slot-weapon-name">Оружие</small></div>
                <div class="slot" onclick="unequip('armor')"><span id="slot-armor-icon" class="slot-icon">👕</span><small id="slot-armor-name">Торс</small></div>
                <div class="slot" onclick="unequip('helmet')"><span id="slot-helmet-icon" class="slot-icon">🪖</span><small id="slot-helmet-name">Шлем</small></div>
                <div class="slot" onclick="unequip('ring')"><span id="slot-ring-icon" class="slot-icon">💍</span><small id="slot-ring-name">Кольцо</small></div>
            </div>

            <div style="display: flex; justify-content: space-between; background: rgba(0,0,0,0.3); padding: 8px; border-radius: 5px;">
                <span>💰 Золото: <b id="p-gold">0</b></span>
                <span>📦 Сумка: <b id="p-inv-count">0</b>/20</span>
            </div>
        </div>

        <button class="btn btn-red" onclick="showScreen('screen-battle')">⚔️ ИДТИ В ПОДЗЕМЕЛЬЕ (<span id="cur-floor">1</span> ЭТ.)</button>
        <button class="btn btn-blue" onclick="showScreen('screen-chat'); loadHistory()">💬 ГЛОБАЛЬНЫЙ ЧАТ</button>
        <button class="btn btn-gray" onclick="showScreen('screen-leaderboard'); loadLeaderboard()">🏆 ТАБЛИЦА ЛИДЕРОВ</button>

        <h4 style="margin: 15px 0 5px; font-size: 13px;">ИНВЕНТАРЬ</h4>
        <div id="inventory-grid" class="inventory-grid"></div>
        <button onclick="resetGame()" style="background:none; border:none; color:#555; font-size:10px; margin-top:20px; cursor:pointer;">СБРОСИТЬ ПРОГРЕСС</button>
    </div>

    <!-- ЭКРАНЫ БОЯ, ЧАТА И ТОПА (оставляем логику) -->
    <div id="screen-battle" class="screen">
        <div class="card" style="text-align: center;">
            <h3 id="enemy-name">Монстр</h3>
            <div class="hp-bar"><div id="enemy-hp-fill" class="hp-fill"></div></div>
            <p id="battle-log" style="height: 40px; font-size: 14px;">Приготовься к удару!</p>
        </div>
        <button class="btn btn-red" onclick="doAttack()">НАНЕСТИ УДАР</button>
    </div>

    <div id="screen-chat" class="screen"><div class="card"><h3>ЧАТ</h3><div id="chat-box"></div><input type="text" id="chat-input" style="width:70%; padding:10px;"><button class="btn btn-blue" style="width:20%; display:inline; margin-left:5px;" onclick="sendMessage()">></button></div><button class="btn btn-gray" onclick="showScreen('screen-main')">НАЗАД</button></div>
    
    <div id="screen-leaderboard" class="screen"><div class="card"><h3>ТОП ИГРОКОВ</h3><div id="leaderboard-list"></div></div><button class="btn btn-gray" onclick="showScreen('screen-main')">НАЗАД</button></div>
</div>

<script>
const SUPABASE_URL = 'https://uvyapclbduzxuyxqnbvz.supabase.co';
const SUPABASE_KEY = 'sb_publishable_juj8gj9mZGfv_ltA4VH4pg_Vl4uPmy5';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let p = JSON.parse(localStorage.getItem('psk_rpg_diablo'));
let enemy = null;

// Если данных нет - отправляем на выбор персонажа
if (!p) {
    document.getElementById('screen-setup').classList.add('active');
} else {
    document.getElementById('screen-main').classList.add('active');
}

function selectClass(className, hp, power, luck) {
    p = {
        name: 'Юра', class: className, 
        hp: hp, max: hp, basePower: power, luck: luck,
        gold: 0, floor: 1,
        equipment: { weapon: null, armor: null, helmet: null, ring: null },
        inv: []
    };
    save();
    location.reload();
}

function save() { localStorage.setItem('psk_rpg_diablo', JSON.stringify(p)); }
function resetGame() { if(confirm('Удалить всё?')) { localStorage.clear(); location.reload(); } }

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if(id === 'screen-battle') spawnEnemy();
    updateUI();
}

// ПРЕДМЕТЫ С РАЗНОЙ РЕДКОСТЬЮ
const ITEMS_POOL = {
    weapon: [
        {n:'Ножик', s:5, r:'common', i:'🔪'}, 
        {n:'Катана', s:15, r:'rare', i:'⚔️'},
        {n:'Посох Хаоса', s:40, r:'legend', i:'🪄'}
    ],
    armor: [
        {n:'Куртка', s:3, r:'common', i:'🧥'}, 
        {n:'Доспех', s:12, r:'rare', i:'🛡️'}
    ],
    helmet: [{n:'Кепка', s:2, r:'common', i:'🧢'}, {n:'Корона', s:15, r:'epic', i:'👑'}],
    ring: [{n:'Кольцо', s:5, r:'rare', i:'💍'}, {n:'Перчатка Таноса', s:100, r:'legend', i:'🧤'}]
};

function updateUI() {
    if(!p) return;
    document.getElementById('p-name').innerText = p.name.toUpperCase();
    document.getElementById('p-class').innerText = p.class;
    document.getElementById('p-gold').innerText = p.gold;
    document.getElementById('cur-floor').innerText = p.floor;
    document.getElementById('p-inv-count').innerText = p.inv.length;
    document.getElementById('p-hp-text').innerText = `${p.hp}/${p.max}`;
    document.getElementById('hp-fill').style.width = (p.hp / p.max * 100) + '%';
    
    let totalPower = p.basePower;
    for (let type in p.equipment) {
        let item = p.equipment[type];
        document.getElementById(`slot-${type}-icon`).innerText = item ? item.i : getPlaceholder(type);
        document.getElementById(`slot-${type}-name`).innerText = item ? item.n : 'Пусто';
        document.getElementById(`slot-${type}-name`).style.color = item ? `var(--${item.r})` : '#777';
        if(item) totalPower += item.s;
    }
    document.getElementById('p-power').innerText = totalPower;
    p.currentPower = totalPower;

    const grid = document.getElementById('inventory-grid');
    grid.innerHTML = '';
    p.inv.forEach((item, idx) => {
        const div = document.createElement('div');
        div.className = 'item';
        div.style.borderColor = `var(--${item.r})`;
        div.innerText = item.i;
        div.onclick = () => equip(idx);
        grid.appendChild(div);
    });
}

function getPlaceholder(t) { return {weapon:'👊', armor:'👕', helmet:'🪖', ring:'💍'}[t]; }

function spawnEnemy() {
    enemy = { name: 'Страж Порога', hp: 30 + (p.floor * 15), max: 30 + (p.floor * 15) };
    document.getElementById('enemy-name').innerText = `${enemy.name} [Этаж ${p.floor}]`;
    document.getElementById('enemy-hp-fill').style.width = '100%';
}

function doAttack() {
    enemy.hp -= p.currentPower;
    if(enemy.hp <= 0) {
        let gold = 15 + p.floor * 7;
        p.gold += gold;
        p.floor++;
        let drop = null;
        if(Math.random() * p.luck > 0.6) {
            const types = ['weapon', 'armor', 'helmet', 'ring'];
            const type = types[Math.floor(Math.random()*types.length)];
            const pool = ITEMS_POOL[type];
            drop = {...pool[Math.floor(Math.random()*pool.length)], type: type};
            if(p.inv.length < 20) p.inv.push(drop);
        }
        document.getElementById('battle-log').innerText = `УБИТ! +${gold}💰 ${drop ? 'Нашел: '+drop.n : ''}`;
        save();
        syncProgress();
        setTimeout(() => showScreen('screen-main'), 1200);
    } else {
        p.hp -= 8;
        document.getElementById('battle-log').innerText = `Ты: -${p.currentPower} HP. Тебе: -8 HP.`;
        if(p.hp <= 0) { p.hp = p.max; showScreen('screen-main'); alert('Ты пал в бою! Здоровье восстановлено.'); }
    }
    document.getElementById('enemy-hp-fill').style.width = (enemy.hp / enemy.max * 100) + '%';
    updateUI();
}

function equip(idx) {
    const item = p.inv[idx];
    const old = p.equipment[item.type];
    if(old) p.inv.push(old);
    p.equipment[item.type] = item;
    p.inv.splice(idx, 1);
    save();
    updateUI();
}

function unequip(type) {
    if(p.equipment[type] && p.inv.length < 20) {
        p.inv.push(p.equipment[type]);
        p.equipment[type] = null;
        save();
        updateUI();
    }
}

// ГЛОБАЛЬНЫЕ ФУНКЦИИ (SUPABASE)
async function sendMessage() {
    const input = document.getElementById('chat-input');
    if(!input.value.trim()) return;
    await supabaseClient.from('messages').insert([{ username: p.name, text: input.value }]);
    input.value = '';
}

async function loadHistory() {
    const { data } = await supabaseClient.from('messages').select('*').order('created_at', { ascending: false }).limit(20);
    document.getElementById('chat-box').innerHTML = data.reverse().map(m => `<div><b>${m.username}:</b> ${m.text}</div>`).join('');
}

supabaseClient.channel('chat').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
    document.getElementById('chat-box').innerHTML += `<div><b>${payload.new.username}:</b> ${payload.new.text}</div>`;
}).subscribe();

async function syncProgress() {
    await supabaseClient.from('leaderboards').upsert({ username: p.name, floor: p.floor });
}

async function loadLeaderboard() {
    const { data } = await supabaseClient.from('leaderboards').select('*').order('floor', { ascending: false }).limit(10);
    document.getElementById('leaderboard-list').innerHTML = data.map((u, i) => `<div>${i+1}. ${u.username} — ${u.floor} эт.</div>`).join('');
}

if(p) updateUI();
</script>
</body>
</html>
