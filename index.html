<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>🍺 Писок Данжен · Пивная RPG</title>
    <style>
        body { margin: 0; background: #0f0a05; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        canvas { border-radius: 32px; box-shadow: 0 0 0 4px #f3b33d; }
        .info { position: fixed; bottom: 8px; left: 0; right: 0; text-align: center; font-size: 12px; color: #ffda99; background: #000000aa; width: fit-content; margin: 0 auto; padding: 4px 16px; border-radius: 60px; pointer-events: none; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
</head>
<body>
<div class="info">🍺 ПИСОК ДАНЖЕН • Кнопки внизу • Класс – в игре</div>
<script>
    (function(){
        let player = { gold:300, strength:12, hp:95, maxHp:95, ap:100, maxAp:100, level:1, floor:1, className:'warrior', weaponBonus:0, armorBonus:0 };
        let currentEnemy = null;
        let waitingForAction = true;
        let log = [];
        let gameScene = null;
        let shopActive = false;

        function addLog(msg){ log.unshift(msg); if(log.length>6)log.pop(); if(gameScene?.logText) gameScene.logText.setText(log.join('\n')); }
        function updateUI(){
            if(!gameScene)return;
            let totalStr = player.strength + player.weaponBonus;
            let totalHp = player.maxHp + player.armorBonus;
            gameScene.playerStats.setText([`🍺 ${Math.floor(player.gold)}   ⚔️ ${totalStr}`,`❤️ ${player.hp}/${totalHp}   💙 ${player.ap}/${player.maxAp}`,`📈 lvl ${player.level}   🏔️ этаж ${player.floor}`]);
            if(currentEnemy){
                let percent = (currentEnemy.hp/currentEnemy.maxHp)*100;
                gameScene.hpBar.width = 200*(percent/100);
                if(gameScene.hpBar.width<0) gameScene.hpBar.width=0;
                gameScene.enemyText.setText(`${currentEnemy.name}\n❤️ ${Math.floor(currentEnemy.hp)}/${currentEnemy.maxHp}`);
            }
            gameScene.apBar.width = 200*((player.ap/player.maxAp)/100);
        }
        function saveGame(){ localStorage.setItem('pisokSave',JSON.stringify({ gold:player.gold, strength:player.strength, hp:player.hp, maxHp:player.maxHp, ap:player.ap, maxAp:player.maxAp, level:player.level, floor:player.floor, className:player.className, weaponBonus:player.weaponBonus, armorBonus:player.armorBonus })); }
        function loadGame(){ let s=localStorage.getItem('pisokSave'); if(s){ let d=JSON.parse(s); for(let k in d) player[k]=d[k]; } startBattle(); updateUI(); }
        function startBattle(){
            let enemies = [{ name:"🍺 Пиво", hp:55, damage:8, gold:30 },{ name:"🛢️ Бочка", hp:80, damage:10, gold:45 },{ name:"💪 Вышибала", hp:110, damage:13, gold:65 }];
            let idx = Math.floor(Math.random()*enemies.length);
            let e = enemies[idx];
            let isBoss = (player.floor%5===0);
            currentEnemy = isBoss ? { name:"👑 БОСС", hp:180, maxHp:180, damage:18, gold:150 } : { name:e.name, hp:e.hp, maxHp:e.hp, damage:e.damage, gold:e.gold };
            waitingForAction = true;
            addLog(`Противник: ${currentEnemy.name}`);
            updateUI();
        }
        function victory(){
            player.gold += currentEnemy.gold;
            player.ap = Math.min(player.maxAp, player.ap+20);
            addLog(`🏆 ПОБЕДА! +${currentEnemy.gold}🍺 +20 AP`);
            player.floor++;
            startBattle();
            updateUI();
            saveGame();
        }
        function attack(){
            if(!waitingForAction){ addLog(`Дождись хода!`); return; }
            if(player.ap<15){ addLog(`❌ Нет AP`); return; }
            player.ap-=15;
            let total = player.strength+player.weaponBonus;
            let dmg = total + Math.floor(Math.random()*8);
            let msg = `⚔️ Удар! ${dmg} урона`;
            if(player.className==='warrior' && Math.random()<0.3){ dmg=Math.floor(dmg*1.6); msg=`💢 КРИТ ВОИНА! ${dmg} урона`; }
            if(player.className==='rogue'){ dmg=Math.floor(dmg*1.2+Math.random()*8); msg=`🗡️ Удар вора! ${dmg} урона`; }
            currentEnemy.hp -= dmg;
            addLog(msg);
            if(currentEnemy.hp<=0){ victory(); return; }
            waitingForAction=false;
            updateUI();
            setTimeout(enemyTurn,800);
        }
        function skill(){
            if(!waitingForAction){ addLog(`Дождись хода!`); return; }
            if(player.ap<30){ addLog(`❌ Нужно 30 AP`); return; }
            player.ap-=30;
            let total = player.strength+player.weaponBonus;
            let dmg = total + Math.floor(Math.random()*20)+15;
            let msg = `✨ ОСОБЫЙ УДАР! ${dmg} урона`;
            if(player.className==='mage') msg = `🧙 МАГ: Огненный шар — ${dmg} урона!`;
            if(player.className==='warrior') msg = `⚔️ ВОИН: Сокрушитель — ${dmg} урона!`;
            if(player.className==='rogue') msg = `🗡️ ВОР: Танец клинков — ${dmg} урона!`;
            currentEnemy.hp -= dmg;
            addLog(msg);
            if(currentEnemy.hp<=0){ victory(); return; }
            waitingForAction=false;
            updateUI();
            setTimeout(enemyTurn,600);
        }
        function enemyTurn(){
            if(currentEnemy.hp<=0) return;
            let dmg = currentEnemy.damage;
            player.hp -= dmg;
            addLog(`😖 ${currentEnemy.name} атакует! -${dmg} HP`);
            if(player.hp<=0){
                addLog(`💀 Поражение! -30 золота`);
                player.gold = Math.max(0, player.gold-30);
                player.hp = player.maxHp+player.armorBonus;
                player.ap = player.maxAp;
                startBattle();
            }
            waitingForAction=true;
            updateUI();
            saveGame();
        }
        function setClass(cls){ player.className=cls; saveGame(); addLog(`🎭 Класс изменён на ${cls==='mage'?'МАГ':cls==='warrior'?'ВОИН':'ВОР'}`); }
        function openShop(){ shopActive=true; addLog(`🛒 МАГАЗИН: W - оружие(+5силы 120🍺), A - броня(+20HP 100🍺). ESC - выход`); }
        function buyWeapon(){ if(player.gold>=120 && !player.weaponBonus){ player.gold-=120; player.weaponBonus=5; addLog(`✅ Куплено оружие! +5 силы`); saveGame(); updateUI(); } else addLog(`❌ Не хватает золота или уже есть`); }
        function buyArmor(){ if(player.gold>=100 && !player.armorBonus){ player.gold-=100; player.armorBonus=20; player.hp+=20; addLog(`✅ Куплена броня! +20 HP`); saveGame(); updateUI(); } else addLog(`❌ Не хватает золота или уже есть`); }
        
        const config = {
            type: Phaser.AUTO,
            width: 700,
            height: 700,
            backgroundColor: '#221c0e',
            scene: { preload(){}, create(){
                gameScene=this;
                this.playerStats = this.add.text(20,20,'',{fontSize:'14px', fill:'#ffeaad'});
                this.enemyText = this.add.text(350,160,'',{fontSize:'20px',fill:'#fff0cf'}).setOrigin(0.5);
                let hpBg = this.add.rectangle(350,250,200,12,0x895e32).setOrigin(0.5);
                this.hpBar = this.add.rectangle(350,250,200,10,0xe34d2b).setOrigin(0.5);
                let apBg = this.add.rectangle(350,275,200,10,0x6b4c2c).setOrigin(0.5);
                this.apBar = this.add.rectangle(350,275,200,8,0x4dabf7).setOrigin(0.5);
                this.logText = this.add.text(20,320,'',{fontSize:'12px',fill:'#ffeecc'});
                let attackZone = this.add.rectangle(140,620,160,50,0xe7a13a,0.9).setInteractive();
                let skillZone = this.add.rectangle(320,620,160,50,0xb57c34,0.9).setInteractive();
                let restZone = this.add.rectangle(500,620,160,50,0x8b5a2b,0.9).setInteractive();
                let shopZone = this.add.rectangle(80,620,100,40,0x4d7c3b,0.9).setInteractive();
                this.add.text(140,620,'⚔️ АТАКА',{fontSize:'16px',fill:'#2c1f0c'}).setOrigin(0.5);
                this.add.text(320,620,'✨ СПОСОБНОСТЬ',{fontSize:'14px',fill:'#2c1f0c'}).setOrigin(0.5);
                this.add.text(500,620,'😴 ОТДЫХ (+20 AP)',{fontSize:'14px',fill:'#2c1f0c'}).setOrigin(0.5);
                this.add.text(80,620,'🛒',{fontSize:'20px',fill:'#fff'}).setOrigin(0.5);
                attackZone.on('pointerdown',attack);
                skillZone.on('pointerdown',skill);
                restZone.on('pointerdown',()=>{
                    if(waitingForAction){ player.ap=Math.min(player.maxAp,player.ap+20); addLog(`😴 Отдых! +20 AP`); waitingForAction=false; updateUI(); setTimeout(enemyTurn,600); }
                    else addLog(`Сейчас нельзя отдыхать`);
                });
                shopZone.on('pointerdown',openShop);
                let btnW = this.add.rectangle(220,480,100,40,0xb57c34).setInteractive();
                let btnM = this.add.rectangle(350,480,100,40,0xb57c34).setInteractive();
                let btnR = this.add.rectangle(480,480,100,40,0xb57c34).setInteractive();
                this.add.text(220,480,'ВОИН',{fontSize:'16px',fill:'#2c1f0c'}).setOrigin(0.5);
                this.add.text(350,480,'МАГ',{fontSize:'16px',fill:'#2c1f0c'}).setOrigin(0.5);
                this.add.text(480,480,'ВОР',{fontSize:'16px',fill:'#2c1f0c'}).setOrigin(0.5);
                btnW.on('pointerdown',()=>setClass('warrior'));
                btnM.on('pointerdown',()=>setClass('mage'));
                btnR.on('pointerdown',()=>setClass('rogue'));
                loadGame();
                updateUI();
            }, update(){
                if(shopActive){
                    this.input.keyboard.once('keydown-W',()=>{ buyWeapon(); shopActive=false; });
                    this.input.keyboard.once('keydown-A',()=>{ buyArmor(); shopActive=false; });
                    this.input.keyboard.once('keydown-ESC',()=>{ shopActive=false; addLog(`Магазин закрыт`); });
                }
            } }
        };
        new Phaser.Game(config);
    })();
</script>
</body>
</html>
