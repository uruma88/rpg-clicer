<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pisok RPG: Craft & Loot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #121212; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; user-select: none; }
        #game-container { max-width: 500px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; background: #000; border-left: 1px solid #333; border-right: 1px solid #333; }
        .screen { display: none; flex-direction: column; align-items: center; padding: 15px; width: 100%; box-sizing: border-box; }
        .active { display: flex; }

        /* Профиль игрока */
        .player-header { display: flex; align-items: center; width: 95%; background: #1a1a1a; padding: 10px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #333; }
        #city-avatar { width: 60px; height: 60px; border-radius: 12px; border: 2px solid #f1c40f; object-fit: cover; margin-right: 15px; }
        
        /* Характеристики */
        .stats-panel { background: #1a1a1a; padding: 12px; border-radius: 12px; width: 95%; margin: 5px 0; border: 1px solid #333; }
        .stat-row { display: flex; justify-content: space-between; margin: 4px 0; font-size: 14px; }
        .stat-btn { background: #f1c40f; border: none; color: #000; width: 22px; height: 22px; border-radius: 4px; font-weight: bold; cursor: pointer; }

        /* Инвентарь и Ресурсы */
        .resources { display: flex; gap: 10px; margin: 5px 0; font-size: 12px; color: #aaa; }
        #inventory-list { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; background: #0a0a0a; padding: 10px; border-radius: 12px; width: 95%; min-height: 80px; border: 1px solid #222; }
        .item-slot { width: 100%; aspect-ratio: 1; background: #1e1e1e; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; border: 1px solid #333; cursor: pointer; position: relative; }
        .item-rarity-rare { border-color: #3498db; box-shadow: inset 0 0 5px #3498db; }
        .item-rarity-epic { border-color: #9b59b6; box-shadow: inset 0 0 5px #9b59b6; }

        /* Слоты */
        .equip-area { display: flex; gap: 15px; margin: 15px 0; }
        .slot { width: 55px; height: 55px; background: #1a1a1a; border: 2px solid #333; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; position: relative; }
        .slot-label { font-size: 8px; position: absolute; bottom: -12px; color: #666; }

        /* Полоски */
        .bar { width: 100%; height: 20px; background: #222; border-radius: 6px; position: relative; overflow: hidden; margin: 4px 0; }
        #hp-fill { background: linear-gradient(90deg, #c0392b, #e74c3c); height: 100%; transition: 0.3s; }
        #xp-fill { background: linear-gradient(90deg, #27ae60, #2ecc71); height: 100%; width: 0%; transition: 0.3s; }
        .bar-text { position: absolute; width: 100%; text-align: center; top: 0; font-size: 11px; line-height: 20px; font-weight: bold; color: #fff; text-shadow: 1px 1px 1px #000; }

        button { padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; width: 95%; margin: 5px 0; color: #fff; }
        .btn-battle { background: #e67e22; }
        .btn-craft { background: #2980b9; }
        .btn-rest { background: #27ae60; }
        
        #battle-log { background: #0a0a0a; border: 1px solid #222; border-radius: 8px; width: 95%; height: 60px; font-size: 11px; padding: 8px; margin-top: 10px; color: #888; overflow-y: auto; text-align: left; }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- SETUP -->
        <div id="screen-setup" class="screen">
            <h2>ВЫБЕРИ ГЕРОЯ</h2>
            <div id="friends-list" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:10px; margin-bottom:20px;"></div>
            <button class="btn-battle" onclick="confirmHero()">НАЧАТЬ ПРИКЛЮЧЕНИЕ</button>
        </div>

        <!-- CITY -->
        <div id="screen-city" class="screen">
            <div class="player-header">
                <img id="city-avatar" src="">
                <div style="flex-grow: 1;">
                    <b id="char-name" style="color:#f1c40f">?</b> <small id="char-lvl">УР 1</small>
                    <div class="bar" style="height: 12px;"><div id="xp-fill"></div></div>
                    <div class="bar"><div id="hp-fill"></div><div class="bar-text" id="hp-text">100/100</div></div>
                </div>
            </div>

            <div class="resources">
                <span>💰 <span id="res-gold">0</span></span>
                <span>🐺 Шкуры: <span id="res-skins">0</span></span>
                <span>⛓️ Руда: <span id="res-ore">0</span></span>
            </div>

            <div class="stats-panel">
                <div class="stat-row">⚔️ СИЛА: <span id="stat-str">10</span> <button class="stat-btn" onclick="upStat('str')">+</button></div>
                <div class="stat-row">🛡️ ЗАЩИТА: <span id="stat-def">5</span> <button class="stat-btn" onclick="upStat('def')">+</button></div>
                <div class="stat-row">ОЧКИ ПРОКАЧКИ: <span id="stat-points" style="color:#f1c40f">0</span></div>
            </div>

            <div class="equip-area">
                <div class="slot" id="slot-weapon">👊<div class="slot-label">ОРУЖИЕ</div></div>
                <div class="slot" id="slot-armor">👕<div class="slot-label">БРОНЯ</div></div>
            </div>

            <button class="btn-battle" onclick="showScreen('screen-battle'); startBattle();">⚔️ В ДАНЖ</button>
            <button class="btn-craft" onclick="craftArmor()">⚒️ УЛУЧШИТЬ БРОНЮ (5 Шкур + 50💰)</button>
            <button class="btn-rest" onclick="rest()">🍺 ТАВЕРНА (ОТДЫХ)</button>
            
            <h5 style="margin: 10px 0 5px 5px; width: 95%; text-align: left;">СУМКА</h5>
            <div id="inventory-list"></div>
        </div>

        <!-- BATTLE -->
        <div id="screen-battle" class="screen">
            <div id="enemy-icon" style="font-size: 60px; margin-top: 20px;">👾</div>
            <h3 id="enemy-name" style="margin: 5px 0;">МОНСТР</h3>
            <div class="bar" style="width: 80%; height: 25px;"><div id="enemy-hp-fill" style="background:#8e44ad;"></div><div class="bar-text" id="enemy-hp-text">100/100</div></div>
            
            <div style="margin-top: 40px; width: 100%; display: flex; flex-direction: column; align-items: center;">
                <div id="player-battle-name" style="color:#f1c40f; margin-bottom: 5px;">ТЫ</div>
                <button id="atk-btn" onclick="playerAttack()" style="height: 70px; font-size: 24px; background: #c0392b; box-shadow: 0 4px 0 #7b241c;">УДАРИТЬ!</button>
            </div>
            <div id="battle-log"></div>
        </div>
    </div>

    <script>
        const friends = ['алина', 'бень', 'богдан', 'ваня', 'егор', 'илюха', 'капрал', 'кирилл', 'лера', 'никитос', 'полина', 'рома', 'саша', 'серега', 'таня', 'юра'];
        let gameState = JSON.parse(localStorage.getItem('pisok_rpg_v3')) || null;
        let enemy = null;

        function init() {
            if (!gameState) {
                showScreen('screen-setup');
                const list = document.getElementById('friends-list');
                friends.forEach(f => {
                    list.innerHTML += `<div class="avatar-card" id="card-${f}" onclick="selectHero('${f}')" style="cursor:pointer; text-align:center;"><img src="avatars/${f}.jpg" onerror="this.src='https://ui-avatars.com/api/?name=${f}'" style="width:100%; border-radius:8px; border:2px solid #333;"><br><small>${f}</small></div>`;
                });
            } else {
                showScreen('screen-city');
                updateUI();
            }
        }

        function selectHero(f) {
            gameState = {
                name: f, lvl: 1, xp: 0, nextLvl: 100, points: 0,
                str: 10, def: 5, vit: 10, hp: 100, maxHp: 100,
                gold: 50, skins: 0, ore: 0,
                weapon: null, armor: null, inv: []
            };
            document.querySelectorAll('.avatar-card img').forEach(img => img.style.borderColor = '#333');
            document.querySelector(`#card-${f} img`).style.borderColor = '#f1c40f';
        }

        function confirmHero() { if(gameState) { save(); showScreen('screen-city'); updateUI(); } }

        function updateUI() {
            document.getElementById('city-avatar').src = `avatars/${gameState.name}.jpg`;
            document.getElementById('char-name').innerText = gameState.name.toUpperCase();
            document.getElementById('char-lvl').innerText = `УР ${gameState.lvl}`;
            document.getElementById('stat-str').innerText = gameState.str;
            document.getElementById('stat-def').innerText = gameState.def;
            document.getElementById('stat-points').innerText = gameState.points;
            
            // Ресурсы
            document.getElementById('res-gold').innerText = gameState.gold;
            document.getElementById('res-skins').innerText = gameState.skins;
            document.getElementById('res-ore').innerText = gameState.ore;

            // HP & XP
            gameState.maxHp = gameState.vit * 10;
            document.getElementById('hp-text').innerText = `${gameState.hp}/${gameState.maxHp}`;
            document.getElementById('hp-fill').style.width = (gameState.hp / gameState.maxHp * 100) + '%';
            document.getElementById('xp-fill').style.width = (gameState.xp / gameState.nextLvl * 100) + '%';

            // Equip
            document.getElementById('slot-weapon').innerHTML = gameState.weapon ? gameState.weapon.icon : '👊';
            document.getElementById('slot-armor').innerHTML = gameState.armor ? gameState.armor.icon : '👕';

            // Inv
            const inv = document.getElementById('inventory-list');
            inv.innerHTML = "";
            gameState.inv.forEach((item, i) => {
                const s = document.createElement('div');
                s.className = `item-slot item-rarity-${item.rarity}`;
                s.innerHTML = item.icon;
                s.onclick = () => useItem(i);
                inv.appendChild(s);
            });
        }

        function useItem(i) {
            const item = gameState.inv[i];
            if(item.type === 'weapon') {
                if(gameState.weapon) gameState.inv.push(gameState.weapon);
                gameState.weapon = item;
            } else {
                if(gameState.armor) gameState.inv.push(gameState.armor);
                gameState.armor = item;
            }
            gameState.inv.splice(i, 1);
            save(); updateUI();
        }

        function craftArmor() {
            if(gameState.skins >= 5 && gameState.gold >= 50) {
                gameState.skins -= 5;
                gameState.gold -= 50;
                gameState.def += 2;
                alert("Кузнец улучшил твою защиту! +2 к Дефу");
                save(); updateUI();
            } else {
                alert("Недостаточно материалов! Нужно 5 шкур и 50 золота.");
            }
        }

        function startBattle() {
            enemy = { name: "Лесной Волк", hp: 40 + (gameState.lvl * 15), maxHp: 40 + (gameState.lvl * 15), icon: "🐺" };
            document.getElementById('enemy-name').innerText = enemy.name;
            document.getElementById('enemy-icon').innerText = enemy.icon;
            document.getElementById('player-battle-name').innerText = gameState.name.toUpperCase();
            updateBattleUI();
        }

        function playerAttack() {
            let pDmg = gameState.str + (gameState.weapon ? gameState.weapon.power : 0);
            enemy.hp -= pDmg;
            log(`Ты нанес ${pDmg} урона!`);
            
            if (enemy.hp <= 0) { win(); } 
            else {
                let eDmg = Math.max(1, 8 - gameState.def);
                gameState.hp -= eDmg;
                if (gameState.hp <= 0) { alert("Ты проиграл! Отдыхай в таверне."); gameState.hp = 1; showScreen('screen-city'); }
            }
            updateBattleUI();
        }

        function win() {
            let xp = 30 + (gameState.lvl * 5);
            let gold = 15 + Math.floor(Math.random() * 20);
            let skins = Math.random() > 0.4 ? 1 : 0;
            
            gameState.xp += xp;
            gameState.gold += gold;
            gameState.skins += skins;
            
            log(`Победа! +${xp}XP, +${gold}💰` + (skins ? ", +1 Шкура 🐺" : ""));

            // Шанс на редкий лут
            if(Math.random() > 0.8) {
                const rarities = ['common', 'rare', 'epic'];
                const r = rarities[Math.floor(Math.random() * 3)];
                gameState.inv.push({ type: 'weapon', name: 'Меч', icon: '⚔️', power: gameState.lvl * 3, rarity: r });
            }

            if(gameState.xp >= gameState.nextLvl) {
                gameState.lvl++; gameState.xp = 0; gameState.points += 3;
                gameState.nextLvl = Math.floor(gameState.nextLvl * 1.6);
                alert("УРОВЕНЬ ПОВЫШЕН!");
            }
            save();
            setTimeout(() => { showScreen('screen-city'); updateUI(); }, 1500);
        }

        function upStat(s) { if(gameState.points > 0) { gameState[s]++; gameState.points--; save(); updateUI(); } }
        function rest() { gameState.hp = gameState.maxHp; save(); updateUI(); alert("Здоровье восстановлено!"); }
        function log(m) { document.getElementById('battle-log').innerHTML = m; }
        function updateBattleUI() {
            document.getElementById('enemy-hp-fill').style.width = (enemy.hp / enemy.maxHp * 100) + '%';
            document.getElementById('enemy-hp-text').innerText = `${enemy.hp}/${enemy.maxHp}`;
        }
        function save() { localStorage.setItem('pisok_rpg_v3', JSON.stringify(gameState)); }
        function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        
        init();
    </script>
</body>
</html>
