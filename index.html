<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JRPG: Pisok Chronicles</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --rarity-common: #95a5a6; --rarity-rare: #3498db; --rarity-epic: #9b59b6; --warrior: #e74c3c; --mage: #3498db; --assassin: #2ecc71; }
        body { margin: 0; background: #0a0a0a; color: #eee; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        #game-container { max-width: 500px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; background: #111; }
        .screen { display: none; flex-direction: column; align-items: center; padding: 15px; width: 100%; box-sizing: border-box; }
        .active { display: flex; }

        /* Стиль выбора класса */
        .class-select { display: flex; gap: 10px; margin-top: 15px; }
        .class-card { border: 2px solid #333; padding: 10px; border-radius: 8px; cursor: pointer; flex: 1; text-align: center; font-size: 12px; }
        .class-card.selected { border-color: #f1c40f; background: #222; }

        /* Профиль и Статы */
        .player-card { width: 95%; background: #1a1a1a; border-radius: 15px; padding: 15px; margin-bottom: 10px; border: 1px solid #333; }
        .header-top { display: flex; align-items: center; gap: 15px; }
        #city-avatar { width: 70px; height: 70px; border-radius: 12px; border: 2px solid #f1c40f; object-fit: cover; }
        
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; background: #000; padding: 10px; border-radius: 10px; }
        .stat-item { display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
        .stat-val { color: #f1c40f; font-weight: bold; }
        .plus-btn { background: #f1c40f; border: none; width: 20px; height: 20px; border-radius: 4px; cursor: pointer; font-weight: bold; }

        /* Экипировка и Сумка */
        .equip-box { display: flex; gap: 20px; margin: 20px 0; }
        .slot { width: 60px; height: 60px; background: #222; border: 2px solid #444; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 28px; position: relative; }
        .slot::after { content: attr(data-label); position: absolute; bottom: -15px; font-size: 9px; color: #666; }

        #inventory-list { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 95%; margin-top: 10px; }
        .item { aspect-ratio: 1; background: #1a1a1a; border: 2px solid #333; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; }
        .item.rare { border-color: var(--rarity-rare); }
        .item.epic { border-color: var(--rarity-epic); }

        /* Полоски */
        .bar-wrap { width: 100%; height: 18px; background: #333; border-radius: 10px; overflow: hidden; position: relative; margin-top: 5px; }
        .bar-fill { height: 100%; transition: 0.4s; }
        .bar-text { position: absolute; width: 100%; text-align: center; font-size: 10px; font-weight: bold; line-height: 18px; color: #fff; z-index: 2; }

        button { width: 95%; padding: 14px; border-radius: 12px; border: none; font-weight: bold; margin: 5px 0; cursor: pointer; color: #fff; }
        .btn-main { background: linear-gradient(135deg, #e67e22, #d35400); }
        .btn-sec { background: #2c3e50; }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- ЭКРАН СОЗДАНИЯ -->
        <div id="screen-setup" class="screen">
            <h2>СОЗДАНИЕ ГЕРОЯ</h2>
            <div id="friends-list" style="display:grid; grid-template-columns:repeat(4,1fr); gap:10px;"></div>
            
            <h3 style="margin-top:20px">ВЫБЕРИ КЛАСС</h3>
            <div class="class-select">
                <div class="class-card" onclick="selectClass('Воин', '⚔️')"><b>Воин</b><br>HP+ / DEF+</div>
                <div class="class-card" onclick="selectClass('Маг', '🔮')"><b>Маг</b><br>ATK++ / HP-</div>
                <div class="class-card" onclick="selectClass('Вор', '🗡️')"><b>Вор</b><br>Luck / Crit</div>
            </div>
            <button class="btn-main" style="margin-top:20px" onclick="startGame()">НАЧАТЬ ПУТЕШЕСТВИЕ</button>
        </div>

        <!-- ГОРОД -->
        <div id="screen-city" class="screen">
            <div class="player-card">
                <div class="header-top">
                    <img id="city-avatar" src="">
                    <div style="flex:1">
                        <b id="char-name">ГЕРОЙ</b> <small id="char-class" style="color:#aaa"></small>
                        <div class="bar-wrap"><div id="hp-fill" class="bar-fill" style="background:#e74c3c"></div><div class="bar-text" id="hp-text"></div></div>
                        <div class="bar-wrap" style="height:8px"><div id="xp-fill" class="bar-fill" style="background:#2ecc71"></div></div>
                    </div>
                </div>

                <div class="stat-grid">
                    <div class="stat-item">STR (Сила): <span class="stat-val" id="s-str">0</span> <button class="plus-btn" onclick="addStat('str')">+</button></div>
                    <div class="stat-item">DEF (Броня): <span class="stat-val" id="s-def">0</span> <button class="plus-btn" onclick="addStat('def')">+</button></div>
                    <div class="stat-item">LCK (Удача): <span class="stat-val" id="s-lck">0</span> <button class="plus-btn" onclick="addStat('lck')">+</button></div>
                    <div class="stat-item">PTS (Очки): <span class="stat-val" id="s-pts">0</span></div>
                </div>
            </div>

            <div style="font-size:12px; margin-bottom:10px">💰 <span id="r-gold">0</span> | 🐺 <span id="r-skins">0</span></div>

            <div class="equip-box">
                <div class="slot" id="sl-weapon" data-label="ОРУЖИЕ">👊</div>
                <div class="slot" id="sl-armor" data-label="БРОНЯ">👕</div>
            </div>

            <button class="btn-main" onclick="showScreen('screen-battle'); startBattle();">⚔️ В ТЕМНОЕ ПОДЗЕМЕЛЬЕ</button>
            <button class="btn-sec" onclick="craft()">⚒️ КУЗНИЦА (5 Шкур + 100💰)</button>
            <button class="btn-sec" style="background:#27ae60" onclick="rest()">🍺 ОТДЫХ В ТАВЕРНЕ</button>

            <h4 style="width:95%; text-align:left; margin:15px 0 5px 0">ИНВЕНТАРЬ</h4>
            <div id="inventory-list"></div>
        </div>

        <!-- БОЙ -->
        <div id="screen-battle" class="screen">
            <div id="battle-enemy" style="font-size:80px; margin-top:30px">👾</div>
            <h3 id="battle-enemy-name">МОНСТР</h3>
            <div class="bar-wrap" style="width:80%; height:25px"><div id="e-hp-fill" class="bar-fill" style="background:#9b59b6"></div><div class="bar-text" id="e-hp-text"></div></div>
            
            <div style="margin-top:auto; width:100%; padding-bottom:40px">
                <button id="atk-btn" onclick="doAttack()" style="background:#c0392b; height:80px; font-size:24px; box-shadow:0 6px #7b241c">УДАРИТЬ ⚔️</button>
                <div id="log" style="font-size:12px; color:#888; margin-top:10px; height:40px"></div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const friends = ['алина', 'бень', 'богдан', 'ваня', 'егор', 'илюха', 'капрал', 'кирилл', 'лера', 'никитос', 'полина', 'рома', 'саша', 'серега', 'таня', 'юра'];
        let state = JSON.parse(localStorage.getItem('jrpg_v1')) || null;
        let enemy = null;

        function init() {
            if (!state) {
                showScreen('screen-setup');
                const list = document.getElementById('friends-list');
                friends.forEach(f => {
                    list.innerHTML += `<img src="avatars/${f}.jpg" onclick="selectHero('${f}')" id="av-${f}" style="width:100%; border-radius:5px; border:2px solid #333; cursor:pointer" onerror="this.src='https://ui-avatars.com/api/?name=${f}'">`;
                });
            } else { showScreen('screen-city'); updateUI(); }
        }

        function selectHero(f) {
            state = { name: f, class: '', icon: '', lvl: 1, xp: 0, next: 100, gold: 100, skins: 0, str: 5, def: 5, lck: 5, pts: 0, hp: 100, max: 100, weapon: null, armor: null, inv: [] };
            document.querySelectorAll('#friends-list img').forEach(i => i.style.borderColor = '#333');
            document.getElementById(`av-${f}`).style.borderColor = '#f1c40f';
        }

        function selectClass(c, i) {
            if(!state) return alert('Сначала выбери персонажа!');
            state.class = c; state.icon = i;
            if(c === 'Воин') { state.max = 150; state.hp = 150; state.def = 8; }
            if(c === 'Маг') { state.str = 12; state.max = 80; state.hp = 80; }
            if(c === 'Вор') { state.lck = 15; }
            document.querySelectorAll('.class-card').forEach(d => d.classList.remove('selected'));
            event.currentTarget.classList.add('selected');
        }

        function startGame() { if(state && state.class) { save(); showScreen('screen-city'); updateUI(); } else alert('Выбери класс!'); }

        function updateUI() {
            document.getElementById('city-avatar').src = `avatars/${state.name}.jpg`;
            document.getElementById('char-name').innerText = state.name.toUpperCase();
            document.getElementById('char-class').innerText = `${state.icon} ${state.class} (УР ${state.lvl})`;
            
            document.getElementById('s-str').innerText = state.str;
            document.getElementById('s-def').innerText = state.def;
            document.getElementById('s-lck').innerText = state.lck;
            document.getElementById('s-pts').innerText = state.pts;
            document.getElementById('r-gold').innerText = state.gold;
            document.getElementById('r-skins').innerText = state.skins;

            document.getElementById('hp-text').innerText = `${state.hp} / ${state.max}`;
            document.getElementById('hp-fill').style.width = (state.hp/state.max*100)+'%';
            document.getElementById('xp-fill').style.width = (state.xp/state.next*100)+'%';

            document.getElementById('sl-weapon').innerHTML = state.weapon ? state.weapon.icon : '👊';
            document.getElementById('sl-armor').innerHTML = state.armor ? state.armor.icon : '👕';

            const inv = document.getElementById('inventory-list');
            inv.innerHTML = "";
            state.inv.forEach((item, idx) => {
                const d = document.createElement('div');
                d.className = `item ${item.rarity}`;
                d.innerHTML = item.icon;
                d.onclick = () => equip(idx);
                inv.appendChild(d);
            });
        }

        function equip(idx) {
            const item = state.inv[idx];
            // Логика классов
            if(item.req && item.req !== state.class) return alert(`Это только для класса ${item.req}!`);

            if(item.type === 'weapon') {
                if(state.weapon) state.inv.push(state.weapon);
                state.weapon = item;
            } else {
                if(state.armor) state.inv.push(state.armor);
                state.armor = item;
            }
            state.inv.splice(idx, 1);
            save(); updateUI();
        }

        function startBattle() {
            enemy = { name: "Тёмный Слизень", hp: 50 + (state.lvl*20), max: 50 + (state.lvl*20), icon: "👾" };
            document.getElementById('battle-enemy-name').innerText = enemy.name;
            updateBattleUI();
        }

        function doAttack() {
            // Критический удар
            let isCrit = Math.random() * 100 < state.lck;
            let dmg = state.str + (state.weapon ? state.weapon.pwr : 0);
            if(isCrit) { dmg *= 2; log("КРИТИЧЕСКИЙ УДАР! 💥"); }

            enemy.hp -= dmg;
            if(enemy.hp <= 0) return win();

            // Ответ врага
            let eDmg = Math.max(1, 10 - state.def);
            state.hp -= eDmg;
            if(state.hp <= 0) { state.hp = 1; alert("Поражение..."); showScreen('screen-city'); }
            updateBattleUI();
        }

        function win() {
            let gold = 20 + Math.floor(Math.random()*20);
            let xp = 40;
            state.gold += gold; state.xp += xp;
            
            // Генерация шмота
            if(Math.random() > 0.7) {
                const types = ['weapon', 'armor'];
                const t = types[Math.floor(Math.random()*2)];
                const rar = Math.random() > 0.8 ? 'epic' : 'rare';
                const reqs = ['Воин', 'Маг', 'Вор', ''];
                const req = reqs[Math.floor(Math.random()*4)];
                
                state.inv.push({ 
                    type: t, 
                    icon: t === 'weapon' ? '🗡️' : '🛡️', 
                    pwr: state.lvl * 3, 
                    rarity: rar,
                    req: req
                });
                alert(`Найдено: ${rar} предмет!`);
            }

            if(state.xp >= state.next) {
                state.lvl++; state.xp = 0; state.pts += 5; state.next *= 1.5;
                alert("УРОВЕНЬ ПОВЫШЕН! +5 очков статов.");
            }
            save(); updateUI(); showScreen('screen-city');
        }

        function addStat(s) {
            if(state.pts > 0) {
                state[s]++; state.pts--;
                if(s === 'str') state.max += 5; 
                save(); updateUI();
            }
        }

        function rest() { state.hp = state.max; save(); updateUI(); alert("Здоровье восстановлено!"); }
        function craft() {
            if(state.skins >= 5 && state.gold >= 100) {
                state.skins -= 5; state.gold -= 100; state.def += 3;
                save(); updateUI(); alert("Броня улучшена!");
            } else alert("Не хватает ресурсов!");
        }

        function log(m) { document.getElementById('log').innerText = m; }
        function updateBattleUI() {
            document.getElementById('e-hp-fill').style.width = (enemy.hp/enemy.max*100)+'%';
            document.getElementById('e-hp-text').innerText = `${enemy.hp} / ${enemy.max}`;
        }
        function save() { localStorage.setItem('jrpg_v1', JSON.stringify(state)); }
        function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

        init();
    </script>
</body>
</html>
