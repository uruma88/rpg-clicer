<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PISOK RPG: HARDCORE</title>
    <style>
        :root { --bg: #0b0b0e; --card: #15151a; --accent: #f1c40f; --text: #e0e0e0; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        #game-container { max-width: 500px; margin: 0 auto; min-height: 100vh; padding-bottom: 20px; }
        
        .screen { display: none; flex-direction: column; align-items: center; padding: 15px; }
        .active { display: flex; }

        /* Рейтинг и Статус */
        .power-rank { background: linear-gradient(90deg, #444, #222); padding: 5px 15px; border-radius: 20px; font-size: 12px; border: 1px solid var(--accent); margin-top: 5px; }
        
        /* Карточка героя */
        .hero-card { background: var(--card); border-radius: 24px; width: 100%; padding: 20px; border: 1px solid #222; box-sizing: border-box; }
        .avatar { width: 90px; height: 90px; border-radius: 20px; border: 3px solid var(--accent); box-shadow: 0 0 20px rgba(241, 196, 15, 0.2); }
        
        /* Слоты экипировки */
        .equip-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; margin: 20px 0; }
        .slot { background: #1a1a20; border: 2px dashed #333; border-radius: 15px; height: 70px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .slot.equipped { border-style: solid; border-color: var(--accent); background: #222; }
        .slot-val { font-size: 10px; color: var(--accent); font-weight: bold; }

        /* Инвентарь */
        .inv-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; width: 100%; background: #000; padding: 12px; border-radius: 15px; min-height: 100px; }
        .item { aspect-ratio: 1; background: #1a1a1a; border-radius: 10px; border: 1px solid #333; display: flex; align-items: center; justify-content: center; font-size: 24px; position: relative; cursor: pointer; }
        .item.rare { border-color: #3498db; box-shadow: inset 0 0 5px #3498db; }
        .item.epic { border-color: #9b59b6; box-shadow: inset 0 0 5px #9b59b6; }
        .item-lvl { position: absolute; bottom: 2px; right: 4px; font-size: 9px; color: #fff; font-weight: bold; }

        /* Кнопки */
        .btn { width: 100%; padding: 16px; border-radius: 15px; border: none; font-weight: bold; margin: 6px 0; cursor: pointer; color: white; transition: 0.2s; }
        .btn-fight { background: linear-gradient(135deg, #c0392b, #e74c3c); box-shadow: 0 4px 15px rgba(192, 57, 43, 0.4); }
        .btn-rest { background: #27ae60; }
        
        /* Полоски */
        .bar { width: 100%; height: 14px; background: #222; border-radius: 7px; overflow: hidden; margin: 5px 0; position: relative; }
        .fill { height: 100%; transition: 0.3s; }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- ГОРОД -->
        <div id="screen-city" class="screen active">
            <div class="hero-card">
                <div style="display:flex; gap:20px; align-items:center;">
                    <img id="p-img" class="avatar" src="">
                    <div style="flex:1">
                        <h2 id="p-name" style="margin:0">ГЕРОЙ</h2>
                        <div id="p-rank" class="power-rank">ОБЩАЯ СИЛА: 0</div>
                        <div class="bar" style="margin-top:10px;"><div id="hp-fill" class="fill" style="background:#e74c3c"></div></div>
                    </div>
                </div>

                <div class="equip-grid">
                    <div class="slot" id="sl-weapon" onclick="unequip('weapon')">
                        <span id="sl-weapon-icon">👊</span>
                        <span class="slot-val" id="sl-weapon-stat">+0 ATK</span>
                        <small style="font-size:8px; color:#555">ОРУЖИЕ</small>
                    </div>
                    <div class="slot" id="sl-armor" onclick="unequip('armor')">
                        <span id="sl-armor-icon">👕</span>
                        <span class="slot-val" id="sl-armor-stat">+0 DEF</span>
                        <small style="font-size:8px; color:#555">БРОНЯ</small>
                    </div>
                </div>
                
                <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px; font-size:12px; text-align:center;">
                    <div style="background:#000; padding:10px; border-radius:10px;">⚔️ STR<br><b id="p-str">10</b></div>
                    <div style="background:#000; padding:10px; border-radius:10px;">🛡️ DEF<br><b id="p-def">10</b></div>
                    <div style="background:#000; padding:10px; border-radius:10px;">💰 GOLD<br><b id="p-gold">0</b></div>
                </div>
            </div>

            <button class="btn btn-fight" style="margin-top:20px" onclick="showScreen('screen-battle'); startBattle()">⚔️ ОТПРАВИТЬСЯ В ДАНЖ</button>
            <button class="btn btn-rest" onclick="rest()">🍺 ТАВЕРНА (ВОССТАНОВЛЕНИЕ)</button>

            <h4 style="width:100%; text-align:left; margin:15px 0 10px 0;">СУМКА (ЖМИ НА ВЕЩЬ, ЧТОБЫ НАДЕТЬ)</h4>
            <div id="inventory" class="inv-container"></div>
        </div>

        <!-- БИТВА -->
        <div id="screen-battle" class="screen">
            <div style="font-size:80px; margin:40px 0" id="e-icon">👾</div>
            <h3 id="e-name">МОНСТР</h3>
            <div class="bar" style="width:80%; height:20px"><div id="e-hp-fill" class="fill" style="background:#9b59b6"></div></div>
            <div id="battle-log" style="height:100px; font-size:12px; color:#777; margin-top:20px; overflow-y:auto; width:100%"></div>
            <button class="btn btn-fight" id="atk-btn" onclick="attack()">УДАРИТЬ!</button>
        </div>
    </div>

    <script>
        let p = JSON.parse(localStorage.getItem('psk_hc_v1')) || {
            name: 'Юра', lvl: 1, xp: 0, gold: 100, str: 10, def: 5, lck: 5, 
            hp: 100, max: 100, weapon: null, armor: null, inv: []
        };
        let enemy = null;

        function updateUI() {
            document.getElementById('p-img').src = `avatars/${p.name}.jpg`;
            document.getElementById('p-name').innerText = `${p.name} [${p.lvl} LVL]`;
            document.getElementById('p-str').innerText = p.str;
            document.getElementById('p-def').innerText = p.def;
            document.getElementById('p-gold').innerText = p.gold;
            
            // Расчет силы
            let bonusAtk = p.weapon ? p.weapon.stat : 0;
            let bonusDef = p.armor ? p.armor.stat : 0;
            let power = (p.str + bonusAtk + p.def + bonusDef) * p.lvl;
            document.getElementById('p-rank').innerText = `ОБЩАЯ СИЛА: ${power}`;
            
            // HP
            document.getElementById('hp-fill').style.width = (p.hp/p.max*100)+'%';

            // Equip Slots
            document.getElementById('sl-weapon-icon').innerText = p.weapon ? p.weapon.icon : '👊';
            document.getElementById('sl-weapon-stat').innerText = `+${bonusAtk} ATK`;
            document.getElementById('sl-armor-icon').innerText = p.armor ? p.armor.icon : '👕';
            document.getElementById('sl-armor-stat').innerText = `+${bonusDef} DEF`;

            // Inventory
            const invDiv = document.getElementById('inventory');
            invDiv.innerHTML = '';
            p.inv.forEach((item, i) => {
                const d = document.createElement('div');
                d.className = `item ${item.rarity}`;
                d.innerHTML = `${item.icon}<span class="item-lvl">${item.stat}</span>`;
                d.onclick = () => equip(i);
                invDiv.appendChild(d);
            });
            save();
        }

        function startBattle() {
            let eLvl = p.lvl + Math.floor(Math.random() * 2);
            enemy = { name: "Орк-Налётчик", hp: 50 + (eLvl * 20), max: 50 + (eLvl * 20), icon: "👹", str: 5 + eLvl*2 };
            document.getElementById('e-icon').innerText = enemy.icon;
            document.getElementById('e-name').innerText = `${enemy.name} (УР. ${eLvl})`;
            document.getElementById('battle-log').innerHTML = "Враг заметил тебя!";
            updateBattleUI();
        }

        function attack() {
            let myAtk = p.str + (p.weapon ? p.weapon.stat : 0);
            let dmg = Math.max(5, myAtk - (enemy.str/2));
            enemy.hp -= dmg;
            log(`Ты нанес ${dmg} урона!`);

            if(enemy.hp <= 0) return win();

            let eDmg = Math.max(1, enemy.str - (p.def + (p.armor ? p.armor.stat : 0)));
            p.hp -= eDmg;
            log(`Враг ударил тебя на ${eDmg}!`);
            
            if(p.hp <= 0) { p.hp = 1; alert("Ты проиграл и сбежал в город!"); showScreen('screen-city'); }
            updateBattleUI();
            updateUI();
        }

        function win() {
            let g = 20 + (p.lvl * 10);
            p.gold += g;
            log(`Победа! Найдено ${g} золота.`);
            
            // Шанс на шмот 40%
            if(Math.random() < 0.4) {
                const isWep = Math.random() > 0.5;
                const rareRoll = Math.random();
                let rarity = 'common';
                let statBonus = p.lvl * 2;
                if(rareRoll > 0.9) { rarity = 'epic'; statBonus *= 3; }
                else if(rareRoll > 0.7) { rarity = 'rare'; statBonus *= 1.5; }

                const newItem = {
                    type: isWep ? 'weapon' : 'armor',
                    icon: isWep ? '⚔️' : '🛡️',
                    stat: Math.floor(statBonus),
                    rarity: rarity
                };
                p.inv.push(newItem);
                log(`ВЫБИТ ПРЕДМЕТ: ${newItem.icon} (+${newItem.stat})`);
            }
            setTimeout(() => { showScreen('screen-city'); updateUI(); }, 1500);
        }

        function equip(i) {
            const item = p.inv[i];
            const old = p[item.type];
            p[item.type] = item;
            p.inv.splice(i, 1);
            if(old) p.inv.push(old);
            updateUI();
        }

        function unequip(type) {
            if(p[type]) { p.inv.push(p[type]); p[type] = null; updateUI(); }
        }

        function rest() { p.hp = p.max; updateUI(); alert("Здоровье восстановлено!"); }
        function save() { localStorage.setItem('psk_hc_v1', JSON.stringify(p)); }
        function log(m) { const l = document.getElementById('battle-log'); l.innerHTML = m + "<br>" + l.innerHTML; }
        function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function updateBattleUI() {
            document.getElementById('e-hp-fill').style.width = (enemy.hp/enemy.max*100)+'%';
        }

        updateUI();
    </script>
</body>
</html>
