<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>🍺 ПИСОК ЗДЕСЬ 🍺</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background: linear-gradient(135deg, #1a472a 0%, #0d2818 100%); min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: white; padding: 12px; }
        .header { text-align: center; font-size: 20px; font-weight: bold; margin-bottom: 5px; background: rgba(0,0,0,0.6); border-radius: 20px; padding: 8px; text-shadow: 0 0 10px #ffd700; }
        .zone-indicator { text-align: center; font-size: 12px; margin-bottom: 8px; padding: 4px; background: rgba(0,0,0,0.5); border-radius: 15px; }
        .stats { background: rgba(0,0,0,0.6); border-radius: 15px; padding: 10px; margin-bottom: 12px; display: flex; flex-wrap: wrap; gap: 8px; justify-content: space-between; }
        .stat { text-align: center; flex: 1; min-width: 55px; }
        .stat-value { font-size: 14px; font-weight: bold; color: #ffd700; }
        .stat-label { font-size: 7px; opacity: 0.7; }
        .combat-area { background: rgba(0,0,0,0.6); border-radius: 20px; padding: 15px; margin-bottom: 12px; }
        .enemy-box { text-align: center; padding: 10px; background: rgba(0,0,0,0.4); border-radius: 15px; margin-bottom: 15px; }
        .enemy-emoji { font-size: 60px; }
        .enemy-name { font-size: 16px; font-weight: bold; }
        .hp-bar { background: rgba(0,0,0,0.5); border-radius: 10px; height: 8px; width: 150px; margin: 8px auto; overflow: hidden; }
        .hp-fill { background: linear-gradient(90deg, #e74c3c, #ff6b6b); width: 100%; height: 100%; transition: width 0.2s; }
        .player-box { display: flex; gap: 12px; padding: 10px; background: rgba(0,0,0,0.4); border-radius: 15px; margin-bottom: 15px; }
        .player-avatar { width: 55px; height: 55px; border-radius: 28px; background: rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; font-size: 30px; overflow: hidden; }
        .player-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .player-info { flex: 1; }
        .player-name { font-size: 14px; font-weight: bold; }
        .actions { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 12px; }
        .action-btn { background: rgba(0,0,0,0.7); border: 1px solid rgba(255,215,0,0.5); border-radius: 12px; padding: 10px; font-size: 11px; font-weight: bold; color: #ffd700; cursor: pointer; }
        .action-btn:active { transform: scale(0.96); }
        .action-btn:disabled { opacity: 0.5; }
        .skill-btn { border-color: #9b59b6; color: #c39bd3; }
        .log-area { background: rgba(0,0,0,0.5); border-radius: 12px; padding: 8px; height: 90px; overflow-y: auto; font-size: 9px; font-family: monospace; }
        .log-line { padding: 2px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .log-damage { color: #ff6b6b; }
        .log-heal { color: #6bff6b; }
        .log-skill { color: #c39bd3; }
        .log-win { color: #ffd700; }
        .tabs { display: flex; gap: 5px; margin-bottom: 12px; flex-wrap: wrap; }
        .tab { flex: 1; background: rgba(0,0,0,0.5); border: none; padding: 6px; border-radius: 20px; color: white; font-size: 9px; cursor: pointer; }
        .tab.active { background: #e67e22; }
        .panel { background: rgba(0,0,0,0.5); border-radius: 15px; padding: 12px; display: none; }
        .panel.active { display: block; }
        .chars-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(65px, 1fr)); gap: 6px; max-height: 350px; overflow-y: auto; }
        .char-card { background: rgba(255,255,255,0.1); border-radius: 10px; padding: 6px; text-align: center; cursor: pointer; }
        .char-card.selected { background: #e67e22; }
        .char-avatar { width: 45px; height: 45px; border-radius: 22px; margin: 0 auto; background: rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; font-size: 22px; overflow: hidden; }
        .char-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .char-name { font-size: 8px; margin-top: 4px; }
        .char-stats { font-size: 7px; opacity: 0.7; }
        .upgrade-item { background: rgba(255,255,255,0.1); border-radius: 10px; padding: 8px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; font-size: 11px; }
        .upgrade-btn { background: #ffd700; border: none; padding: 4px 10px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .shop-item { background: rgba(255,255,255,0.1); border-radius: 10px; padding: 8px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
        .shop-buy { background: #ffd700; border: none; padding: 4px 12px; border-radius: 12px; font-weight: bold; cursor: pointer; color: #1a1a2e; }
        .slave-list { background: rgba(0,0,0,0.3); border-radius: 10px; padding: 8px; margin-top: 10px; max-height: 150px; overflow-y: auto; }
        .slave-item { display: flex; justify-content: space-between; padding: 5px; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 10px; }
        .leaderboard-item { display: flex; justify-content: space-between; padding: 6px; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 9px; }
        .pvp-opponent { background: rgba(255,255,255,0.1); border-radius: 15px; padding: 12px; margin: 10px 0; text-align: center; }
        .pvp-btn { background: linear-gradient(135deg, #e74c3c, #c0392b); border: none; border-radius: 25px; padding: 10px; font-size: 14px; font-weight: bold; color: white; width: 100%; cursor: pointer; margin-top: 10px; }
        .loading { text-align: center; padding: 20px; color: #ffd700; font-size: 11px; }
    </style>
</head>
<body>
    <div class="header">🍺 ПИСОК ЗДЕСЬ 🍺</div>
    <div class="zone-indicator" id="zoneIndicator">🌳 ЭТАЖ 1</div>

    <div class="stats">
        <div class="stat"><div class="stat-value" id="gold">300</div><div class="stat-label">🍺 ЗОЛОТО</div></div>
        <div class="stat"><div class="stat-value" id="level">1</div><div class="stat-label">🌟 УРОВЕНЬ</div></div>
        <div class="stat"><div class="stat-value" id="power">0</div><div class="stat-label">⚡ СИЛА</div></div>
        <div class="stat"><div class="stat-value" id="ap">100</div><div class="stat-label">💥 AP</div></div>
        <div class="stat"><div class="stat-value" id="floor">1</div><div class="stat-label">🏔️ ЭТАЖ</div></div>
        <div class="stat"><div class="stat-value" id="slaveCount">0</div><div class="stat-label">👥 РАБЫ</div></div>
    </div>

    <div class="tabs">
        <button class="tab active" data-tab="fight">⚔️ БОЙ</button>
        <button class="tab" data-tab="chars">🎭 ПЕРСОНАЖИ</button>
        <button class="tab" data-tab="shop">🛒 МАГАЗИН</button>
        <button class="tab" data-tab="upgrade">📊 ПРОКАЧКА</button>
        <button class="tab" data-tab="slaves">👥 РАБЫ</button>
        <button class="tab" data-tab="pvp">⚔️ PVP</button>
        <button class="tab" data-tab="rating">🏆 РЕЙТИНГ</button>
    </div>

    <div id="fight-panel" class="panel active">
        <div class="combat-area">
            <div class="enemy-box">
                <div class="enemy-emoji" id="enemyEmoji">🍺</div>
                <div class="enemy-name" id="enemyName">Пиво</div>
                <div class="hp-bar"><div class="hp-fill" id="enemyHpFill" style="width: 100%"></div></div>
                <div id="enemyHpText">❤️ 100/100</div>
            </div>
            <div class="player-box">
                <div class="player-avatar" id="playerAvatar">🍺</div>
                <div class="player-info">
                    <div class="player-name" id="playerName">Игрок</div>
                    <div id="playerHp">❤️ 100/100</div>
                    <div id="playerAp">💥 AP: 100/100</div>
                </div>
            </div>
            <div class="actions">
                <button class="action-btn" id="attackBtn">🔫 АТАКА (20 AP)</button>
                <button class="action-btn skill-btn" id="skillBtn">✨ СПОСОБНОСТЬ (40 AP)</button>
                <button class="action-btn" id="healBtn">💚 ЛЕЧЕНИЕ (30 AP)</button>
                <button class="action-btn" id="waitBtn">⏳ ЖДАТЬ (+15 AP)</button>
            </div>
            <div class="log-area" id="logArea"></div>
        </div>
    </div>

    <div id="chars-panel" class="panel"><div class="chars-grid" id="charsGrid"></div><div id="charInfo" style="margin-top:10px;text-align:center;padding:8px;background:rgba(0,0,0,0.3);border-radius:10px;"></div></div>
    <div id="shop-panel" class="panel"><div id="shopList"></div></div>
    <div id="upgrade-panel" class="panel">
        <div class="upgrade-item"><div><b>💪 СИЛА</b><br>+5 урона</div><button class="upgrade-btn" data-upgrade="str">+</button></div>
        <div class="upgrade-item"><div><b>❤️ ЗДОРОВЬЕ</b><br>+20 HP</div><button class="upgrade-btn" data-upgrade="hp">+</button></div>
        <div class="upgrade-item"><div><b>⚡ AP</b><br>+10 AP</div><button class="upgrade-btn" data-upgrade="ap">+</button></div>
        <div class="upgrade-item"><div><b>👥 КОМАНДА</b><br>+1💰/сек</div><button class="upgrade-btn" data-upgrade="worker">+</button></div>
    </div>
    <div id="slaves-panel" class="panel"><div id="masterInfo" style="background:rgba(0,0,0,0.3);border-radius:10px;padding:10px;margin-bottom:10px;"></div><div id="slavesList" class="slave-list"></div><div id="revoltInfo"></div></div>
    <div id="pvp-panel" class="panel">
        <div style="display:flex;justify-content:space-around;margin-bottom:10px;"><div>🏆 ПОБЕД: <span id="pvpWins">0</span></div><div>💀 ПОРАЖЕНИЙ: <span id="pvpLosses">0</span></div></div>
        <div class="pvp-opponent" id="pvpOpponent"><span id="pvpStatus">🔍 Поиск соперников...</span></div>
        <button class="pvp-btn" id="pvpFindBtn">⚔️ НАЙТИ ПРОТИВНИКА ⚔️</button>
        <div id="pvpResult" style="margin-top:10px;text-align:center;"></div>
    </div>
    <div id="rating-panel" class="panel"><div id="ratingList" class="loading">Загрузка рейтинга...</div></div>

    <script>
        const tg = window.Telegram.WebApp;
        if (tg) { tg.ready(); tg.expand(); }
        
        const tgUser = (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) ? tg.initDataUnsafe.user : null;
        const userId = tgUser ? tgUser.id : Math.floor(Math.random() * 1000000);
        const userName = tgUser ? (tgUser.first_name + (tgUser.last_name ? " " + tgUser.last_name : "")) : "Гость";

        // ПЕРСОНАЖИ
        const FRIENDS = [
            { name: "Алина", photo: "avatars/алина.jpg", strength: 1, hp: 95, skillName: "Ледяной взгляд" },
            { name: "Бень", photo: "avatars/бень.jpg", strength: 16, hp: 130, skillName: "Медвежья сила" },
            { name: "Богдан", photo: "avatars/богдан.jpg", strength: 8, hp: 90, skillName: "Магический щит" },
            { name: "Ваня", photo: "avatars/ваня.jpg", strength: 14, hp: 105, skillName: "Двойной удар" },
            { name: "Егор", photo: "avatars/егор.jpg", strength: 17, hp: 115, skillName: "Ярость" },
            { name: "Илюха", photo: "avatars/илюха.jpg", strength: 15, hp: 100, skillName: "Исцеление" },
            { name: "Капрал", photo: "avatars/капрал.jpg", strength: 20, hp: 130, skillName: "Приказ" },
            { name: "Кирилл", photo: "avatars/кирилл.jpg", strength: 13, hp: 100, skillName: "Теневой удар" },
            { name: "Лера", photo: "avatars/лера.jpg", strength: 10, hp: 90, skillName: "Ослепление" },
            { name: "Никитос", photo: "avatars/никитос.jpg", strength: 16, hp: 110, skillName: "Ускорение" },
            { name: "Полина", photo: "avatars/полина.jpg", strength: 11, hp: 95, skillName: "Вампиризм" },
            { name: "Рома", photo: "avatars/рома.jpg", strength: 19, hp: 125, skillName: "Сокрушитель" },
            { name: "Саша", photo: "avatars/саша.jpg", strength: 18, hp: 130, skillName: "Боевой клич" },
            { name: "Серега", photo: "avatars/серега.jpg", strength: 17, hp: 115, skillName: "Адреналин" },
            { name: "Таня", photo: "avatars/таня.jpg", strength: 12, hp: 100, skillName: "Точный выстрел" },
            { name: "Юра", photo: "avatars/юра.jpg", strength: 16, hp: 110, skillName: "Контратака" }
        ];

        const ITEMS = [
            { id: "sword", name: "🗡️ Стальной меч", price: 300, bonus: { strength: 10 }, desc: "+10 силы" },
            { id: "greatsword", name: "⚔️ Двуручный меч", price: 600, bonus: { strength: 20 }, desc: "+20 силы" },
            { id: "staff", name: "🔮 Посох", price: 350, bonus: { strength: 8 }, desc: "+8 силы" },
            { id: "leather", name: "🛡️ Кожаная броня", price: 250, bonus: { hp: 30 }, desc: "+30 HP" },
            { id: "plate", name: "⚔️ Латы", price: 500, bonus: { hp: 60 }, desc: "+60 HP" },
            { id: "potion", name: "💊 Зелье AP", price: 80, bonus: { ap: 30 }, desc: "+30 AP" }
        ];

        let game = {
            gold: 300, level: 1, exp: 0, strength: 15, maxHp: 100, hp: 100, maxAp: 100, ap: 100,
            workers: 0, floor: 1, character: null, weapon: null, armor: null, slaves: [], master: null,
            pvpWins: 0, pvpLosses: 0, skillCooldown: 0
        };
        let currentEnemy = null, logs = [], waitingForTurn = true, enemyFrozen = false;

        function addLog(msg, type = "") {
            let cls = type === "damage" ? "log-damage" : type === "heal" ? "log-heal" : type === "skill" ? "log-skill" : type === "win" ? "log-win" : "";
            logs.unshift(`<div class="log-line ${cls}">${msg}</div>`);
            if (logs.length > 20) logs.pop();
            document.getElementById('logArea').innerHTML = logs.join('');
        }

        function getEnemy() {
            let isBoss = game.floor % 5 === 0;
            if (isBoss) return { name: `👑 БОСС ЭТАЖА ${game.floor}`, emoji: "👑", hp: 150 + game.floor * 10, maxHp: 150 + game.floor * 10, damage: 15 + Math.floor(game.floor / 2), gold: 100 + game.floor * 10, exp: 80 + game.floor * 5 };
            let enemies = ["🍺 Пиво", "🍻 Кружка", "😵 Похмелье", "🧟 Зомби", "👮 Контролёр"];
            let name = enemies[Math.floor(Math.random() * enemies.length)];
            return { name: name, emoji: name[0], hp: 50 + game.floor * 5, maxHp: 50 + game.floor * 5, damage: 8 + Math.floor(game.floor / 2), gold: 20 + game.floor * 3, exp: 15 + game.floor * 2 };
        }

        function startBattle() { currentEnemy = getEnemy(); waitingForTurn = true; enemyFrozen = false; game.hp = Math.min(game.maxHp, game.hp); game.ap = Math.min(game.maxAp, game.ap); updateUI(); addLog(`⚔️ Попался ${currentEnemy.name}!`, "win"); }

        function calcPower() { return Math.floor(game.level * 10 + game.strength * 2 + game.maxHp / 10 + game.workers * 20 + game.floor * 5 + game.pvpWins * 10 + game.slaves.length * 20); }

        function updateUI() {
            document.getElementById('gold').innerText = Math.floor(game.gold);
            document.getElementById('level').innerText = game.level;
            document.getElementById('power').innerText = calcPower();
            document.getElementById('ap').innerText = Math.floor(game.ap);
            document.getElementById('floor').innerText = game.floor;
            document.getElementById('slaveCount').innerText = game.slaves.length;
            if (currentEnemy) { let p = (currentEnemy.hp / currentEnemy.maxHp) * 100; document.getElementById('enemyHpFill').style.width = `${Math.max(0, p)}%`; document.getElementById('enemyHpText').innerHTML = `❤️ ${Math.max(0, Math.floor(currentEnemy.hp))}/${currentEnemy.maxHp}`; document.getElementById('enemyName').innerText = currentEnemy.name; document.getElementById('enemyEmoji').innerText = currentEnemy.emoji; }
            document.getElementById('playerName').innerText = game.character?.name || "Игрок";
            document.getElementById('playerHp').innerHTML = `❤️ ${Math.floor(game.hp)}/${game.maxHp}`;
            document.getElementById('playerAp').innerHTML = `💥 AP: ${Math.floor(game.ap)}/${game.maxAp}`;
            let avatar = document.getElementById('playerAvatar');
            if (avatar && game.character) avatar.innerHTML = game.character.photo ? `<img src="${game.character.photo}" onerror="this.style.display='none';this.parentElement.innerHTML='🍺'">` : "🍺";
            let skillBtn = document.getElementById('skillBtn');
            if (skillBtn && game.character) skillBtn.innerHTML = `✨ ${game.character.skillName} (40 AP) ✨`;
            let masterDiv = document.getElementById('masterInfo');
            if (masterDiv) masterDiv.innerHTML = game.master ? `⚠️ ТЫ РАБ ${game.master.name}!` : `👑 ТЫ ПРЕДВОДИТЕЛЬ! ${game.slaves.length} рабов дают +${game.slaves.length}🍺/сек`;
            let slavesDiv = document.getElementById('slavesList');
            if (slavesDiv) {
                if (game.slaves.length === 0) slavesDiv.innerHTML = '<div class="slave-item">😴 Нет рабов. Побеждай в PVP!</div>';
                else { slavesDiv.innerHTML = '<div style="font-weight:bold;">ТВОИ РАБЫ:</div>'; game.slaves.forEach(s => { slavesDiv.innerHTML += `<div class="slave-item"><span>👤 ${s.name}</span><span>⚡${s.power} силы</span></div>`; }); }
            }
            let revoltDiv = document.getElementById('revoltInfo');
            if (revoltDiv) revoltDiv.innerHTML = game.master ? `<button class="action-btn" id="revoltBtn" style="background:#e74c3c;">🔥 ВОССТАНИЕ!</button>` : "";
            document.getElementById('revoltBtn')?.addEventListener('click', revolt);
        }

        // СПОСОБНОСТИ ПЕРСОНАЖЕЙ
        function useSkill() {
            if (!waitingForTurn) { addLog("⏳ Не твой ход!"); return; }
            if (!game.character) { addLog("❌ Сначала выбери персонажа!"); return; }
            if (enemyFrozen) { addLog("❌ Враг заморожен! Атакуй!"); return; }
            if (game.ap < 40) { addLog(`❌ Нужно 40 AP!`); return; }
            game.ap -= 40;
            let char = game.character;
            let effect = "";
            let dmg = game.strength + Math.floor(Math.random() * 15) + (game.weapon?.bonus?.strength || 0);
            
            switch (char.name) {
                case "Алина": enemyFrozen = true; effect = `❄️ Ледяной взгляд! Враг заморожен!`; break;
                case "Бень": game.buff = { dmgBonus: 20, turns: 2 }; effect = `🐻 Медвежья сила! +20 к урону на 2 хода!`; break;
                case "Богдан": game.buff = { defBonus: 50, turns: 1 }; effect = `🛡️ Магический щит! -50% урона на 1 ход!`; break;
                case "Ваня": currentEnemy.hp -= dmg * 2; effect = `⚡ Двойной удар! ${dmg * 2} урона!`; break;
                case "Егор": currentEnemy.hp -= Math.floor(dmg * 1.5); effect = `😤 Ярость! ${Math.floor(dmg * 1.5)} урона!`; break;
                case "Илюха": let heal = 50; game.hp = Math.min(game.maxHp, game.hp + heal); effect = `💚 Исцеление! +${heal} HP!`; break;
                case "Кирилл": currentEnemy.hp -= dmg + 15; effect = `🌑 Теневой удар! ${dmg + 15} урона!`; break;
                case "Лера": enemyFrozen = true; effect = `✨ Ослепление! Враг пропускает ход!`; break;
                case "Никитос": game.ap = Math.min(game.maxAp, game.ap + 25); effect = `⚡ Ускорение! +25 AP!`; break;
                case "Полина": currentEnemy.hp -= dmg; let vampHeal = Math.floor(dmg / 2); game.hp = Math.min(game.maxHp, game.hp + vampHeal); effect = `🧛 Вампиризм! ${dmg} урона, +${vampHeal} HP!`; break;
                case "Рома": currentEnemy.hp -= Math.floor(dmg * 1.3); effect = `💪 Сокрушитель! ${Math.floor(dmg * 1.3)} урона!`; break;
                case "Саша": game.strength += 10; effect = `📢 Боевой клич! +10 силы навсегда!`; break;
                case "Серега": game.ap = Math.min(game.maxAp, game.ap + 30); effect = `💊 Адреналин! +30 AP!`; break;
                case "Таня": currentEnemy.hp -= dmg + 20; effect = `🎯 Точный выстрел! ${dmg + 20} урона!`; break;
                default: currentEnemy.hp -= dmg; effect = `✨ ${char.skillName}! ${dmg} урона!`;
            }
            addLog(`✨ ${effect}`, "skill");
            if (currentEnemy.hp <= 0) { victory(); return; }
            if (!enemyFrozen) { waitingForTurn = false; updateUI(); save(); setTimeout(() => { enemyTurn(); }, 800); }
            else { enemyFrozen = false; addLog("❄️ Враг пропускает ход!", "skill"); waitingForTurn = true; game.ap = Math.min(game.maxAp, game.ap + 15); updateUI(); save(); }
        }

        function victory() {
            game.gold += currentEnemy.gold; game.exp += currentEnemy.exp;
            addLog(`✅ Победа! +${currentEnemy.gold}🍺 +${currentEnemy.exp} XP!`, "win");
            let needExp = game.level * 100;
            while (game.exp >= needExp) { game.level++; game.exp -= needExp; game.strength += 5; game.maxHp += 20; game.maxAp += 10; game.hp = game.maxHp; game.ap = game.maxAp; needExp = game.level * 100; addLog(`🎉 УРОВЕНЬ ${game.level}!`, "win"); }
            game.floor++; updateZoneUI(); save(); startBattle(); updateRating();
        }

        function attack() {
            if (!waitingForTurn) { addLog("⏳ Не твой ход!"); return; }
            if (game.ap < 20) { addLog(`❌ Нужно 20 AP!`); return; }
            game.ap -= 20;
            let dmg = game.strength + Math.floor(Math.random() * 10) + (game.weapon?.bonus?.strength || 0);
            if (game.buff?.dmgBonus) { dmg += game.buff.dmgBonus; game.buff.turns--; if (game.buff.turns <= 0) game.buff = null; }
            currentEnemy.hp -= dmg;
            addLog(`🔫 Атака! ${dmg} урона!`, "damage");
            if (currentEnemy.hp <= 0) { victory(); return; }
            waitingForTurn = false; updateUI(); save(); setTimeout(() => { enemyTurn(); }, 800);
        }

        function heal() {
            if (!waitingForTurn) { addLog("⏳ Не твой ход!"); return; }
            if (game.ap < 30) { addLog(`❌ Нужно 30 AP!`); return; }
            game.ap -= 30;
            let healAmt = 40 + (game.armor?.bonus?.hp / 2 || 0);
            game.hp = Math.min(game.maxHp, game.hp + healAmt);
            addLog(`💚 Лечение! +${healAmt} HP!`, "heal");
            waitingForTurn = false; updateUI(); save(); setTimeout(() => { enemyTurn(); }, 800);
        }

        function wait() {
            if (!waitingForTurn) { addLog("⏳ Не твой ход!"); return; }
            game.ap = Math.min(game.maxAp, game.ap + 15);
            addLog(`⚡ Ждём... +15 AP (${Math.floor(game.ap)}/${game.maxAp})`);
            waitingForTurn = false; updateUI(); save(); setTimeout(() => { enemyTurn(); }, 800);
        }

        function enemyTurn() {
            if (currentEnemy.hp <= 0) return;
            let dmg = currentEnemy.damage;
            if (game.buff?.defBonus) { dmg = Math.floor(dmg * (100 - game.buff.defBonus) / 100); addLog(`🛡️ Защита снизила урон до ${dmg}!`); game.buff.turns--; if (game.buff.turns <= 0) game.buff = null; }
            game.hp -= dmg;
            addLog(`💥 ${currentEnemy.name} наносит ${dmg} урона!`, "damage");
            if (game.hp <= 0) {
                let penalty = Math.floor(game.gold * 0.2);
                game.gold = Math.max(0, game.gold - penalty);
                addLog(`💀 ТЫ ПОГИБ! -${penalty}🍺!`, "damage");
                game.hp = Math.floor(game.maxHp / 2);
                game.ap = Math.floor(game.maxAp / 2);
                startBattle();
                return;
            }
            waitingForTurn = true; game.ap = Math.min(game.maxAp, game.ap + 20); updateUI(); save();
        }

        function selectCharacter(char) {
            game.character = char;
            game.strength = char.strength;
            game.maxHp = char.hp;
            game.hp = char.hp;
            save(); addLog(`🎭 Выбран ${char.name}! ⚔️${char.strength} ❤️${char.hp}`, "win");
            document.getElementById('charInfo').innerHTML = `✅ Выбран ${char.name}! ⚔️${char.strength} ❤️${char.hp} | ✨${char.skillName}`;
            updateUI();
        }

        function buyItem(itemId) {
            let item = ITEMS.find(i => i.id === itemId);
            if (!item) return;
            if (game.gold < item.price) { addLog(`❌ Нужно ${item.price}🍺!`); return; }
            game.gold -= item.price;
            if (item.id === "sword" || item.id === "greatsword" || item.id === "staff") { game.weapon = item; addLog(`✅ Куплен ${item.name}! +${item.bonus.strength} силы!`); }
            else if (item.id === "leather" || item.id === "plate") { game.armor = item; game.maxHp += item.bonus.hp; game.hp += item.bonus.hp; addLog(`✅ Куплена ${item.name}! +${item.bonus.hp} HP!`); }
            else if (item.id === "potion") { game.ap = Math.min(game.maxAp, game.ap + item.bonus.ap); addLog(`✅ ${item.name}! +${item.bonus.ap} AP!`); }
            save(); updateUI();
        }

        function upgrade(type) {
            let cost = 0;
            if (type === 'str') { let lvl = Math.floor(game.strength / 5); cost = Math.floor(50 * Math.pow(1.5, lvl)); if (game.gold >= cost) { game.gold -= cost; game.strength += 5; addLog(`✅ СИЛА +5!`); } else { addLog(`❌ Нужно ${cost}🍺!`); return; } }
            else if (type === 'hp') { let lvl = Math.floor(game.maxHp / 20); cost = Math.floor(60 * Math.pow(1.5, lvl)); if (game.gold >= cost) { game.gold -= cost; game.maxHp += 20; game.hp += 20; addLog(`✅ HP +20!`); } else { addLog(`❌ Нужно ${cost}🍺!`); return; } }
            else if (type === 'ap') { let lvl = Math.floor(game.maxAp / 10); cost = Math.floor(70 * Math.pow(1.5, lvl)); if (game.gold >= cost) { game.gold -= cost; game.maxAp += 10; game.ap += 10; addLog(`✅ AP +10!`); } else { addLog(`❌ Нужно ${cost}🍺!`); return; } }
            else if (type === 'worker') { let lvl = game.workers; cost = Math.floor(100 * Math.pow(1.8, lvl)); if (game.gold >= cost) { game.gold -= cost; game.workers += 1; addLog(`✅ Нанят работник! +1🍺/сек!`); } else { addLog(`❌ Нужно ${cost}🍺!`); return; } }
            updateUI(); save();
        }

        function updateZoneUI() { let zoneNum = Math.min(Math.ceil(game.floor / 5), 3); let zones = ["🌳 ЛЕС", "🕯️ ПОДЗЕМЕЛЬЕ", "⛏️ ШАХТЫ"]; document.getElementById('zoneIndicator').innerHTML = `${zones[zoneNum-1]} (ЭТАЖ ${game.floor})`; }

        // РЕЙТИНГ
        function updateRating() {
            let ratings = JSON.parse(localStorage.getItem('pisok_rating') || '[]');
            let power = calcPower();
            let existing = ratings.find(r => r.id === userId);
            if (existing) { existing.name = game.character?.name || userName; existing.level = game.level; existing.power = power; existing.pvpWins = game.pvpWins; existing.slaves = game.slaves.length; }
            else { ratings.push({ id: userId, name: game.character?.name || userName, level: game.level, power: power, pvpWins: game.pvpWins, slaves: game.slaves.length }); }
            ratings.sort((a, b) => b.power - a.power);
            ratings = ratings.slice(0, 50);
            localStorage.setItem('pisok_rating', JSON.stringify(ratings));
            let container = document.getElementById('ratingList');
            if (container) {
                container.innerHTML = '';
                if (ratings.length === 0) { container.innerHTML = '<div class="loading">Нет игроков</div>'; }
                else { ratings.slice(0, 10).forEach((r, i) => { let medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '•'; container.innerHTML += `<div class="leaderboard-item"><span>${medal} ${r.name}</span><span>⚡${r.power} | 🏆${r.level}ур | 👥${r.slaves || 0}раб</span></div>`; }); }
            }
        }

        // PVP с демо-игроками
        function findPvPOpponent() {
            let ratings = JSON.parse(localStorage.getItem('pisok_rating') || '[]');
            let DEMO_PLAYERS = [
                { id: 9991, name: "🍺 Пивной Мастер", power: 500, level: 5, slaves: 2 },
                { id: 9992, name: "🍻 Бармен", power: 350, level: 3, slaves: 1 },
                { id: 9993, name: "👑 Король Кег", power: 800, level: 8, slaves: 5 }
            ];
            let realOpponents = ratings.filter(r => r.id !== userId);
            let allOpponents = [...realOpponents];
            for (let demo of DEMO_PLAYERS) { if (!ratings.find(r => r.id === demo.id)) { allOpponents.push(demo); } }
            if (allOpponents.length === 0) { document.getElementById('pvpStatus').innerHTML = '❌ Нет соперников!'; return null; }
            let opp = allOpponents[Math.floor(Math.random() * allOpponents.length)];
            document.getElementById('pvpStatus').innerHTML = `🎮 ${opp.name}<br>⚡ Сила: ${opp.power} | 👥 Рабов: ${opp.slaves || 0}<br>💰 Награда: ${100 + (opp.slaves || 0) * 20}🍺`;
            return opp;
        }

        function pvpFight() {
            let opponent = findPvPOpponent();
            if (!opponent) return;
            let myPower = calcPower();
            let reward = 100 + (opponent.slaves || 0) * 20;
            if (myPower > opponent.power) {
                game.pvpWins++; game.gold += reward;
                game.slaves.push({ id: opponent.id, name: opponent.name, power: opponent.power });
                addLog(`🏆 PVP ПОБЕДА! +${reward}🍺! ${opponent.name} стал рабом!`, "win");
                document.getElementById('pvpResult').innerHTML = `🎉 ПОБЕДА! +${reward}🍺!`;
            } else {
                game.pvpLosses++; game.gold = Math.max(0, game.gold - 50);
                addLog(`💀 ПОРАЖЕНИЕ! -50🍺`, "damage");
                document.getElementById('pvpResult').innerHTML = `💀 ПОРАЖЕНИЕ! -50🍺`;
            }
            document.getElementById('pvpWins').innerText = game.pvpWins;
            document.getElementById('pvpLosses').innerText = game.pvpLosses;
            save(); updateUI(); updateRating();
            setTimeout(() => { document.getElementById('pvpResult').innerHTML = ''; }, 3000);
        }

        function revolt() {
            if (!game.master) { addLog("👑 Ты свободен!"); return; }
            let myPower = calcPower();
            if (myPower > (game.master.power || 500)) {
                addLog(`🎉 ОСВОБОЖДЕНИЕ! Ты победил ${game.master.name}!`, "win");
                game.master = null; game.gold += 200;
            } else { addLog(`💀 НЕУДАЧА! ${game.master.name} наказывает тебя!`, "damage"); game.hp = Math.floor(game.hp * 0.7); game.gold = Math.floor(game.gold * 0.8); }
            save(); updateUI();
        }

        function save() {
            let toSave = { ...game };
            delete toSave.character;
            localStorage.setItem(`pisok_game_${userId}`, JSON.stringify(toSave));
            if (game.character) localStorage.setItem(`pisok_char_${userId}`, JSON.stringify(game.character));
            updateRating();
        }

        function load() {
            let saved = localStorage.getItem(`pisok_game_${userId}`);
            if (saved) { let data = JSON.parse(saved); game = { ...game, ...data }; }
            let savedChar = localStorage.getItem(`pisok_char_${userId}`);
            if (savedChar) game.character = JSON.parse(savedChar);
            startBattle(); updateUI(); updateRating();
            document.getElementById('pvpWins').innerText = game.pvpWins;
            document.getElementById('pvpLosses').innerText = game.pvpLosses;
            let grid = document.getElementById('charsGrid');
            if (grid) {
                grid.innerHTML = '';
                FRIENDS.forEach(f => {
                    let selected = game.character?.name === f.name;
                    grid.innerHTML += `<div class="char-card ${selected ? 'selected' : ''}" data-name="${f.name}"><div class="char-avatar"><img src="${f.photo}" onerror="this.style.display='none';this.parentElement.innerHTML='${f.name.charAt(0)}'"></div><div class="char-name">${f.name}</div><div class="char-stats">⚔️${f.strength} ❤️${f.hp}</div></div>`;
                });
                document.querySelectorAll('.char-card').forEach(card => {
                    let name = card.dataset.name;
                    let friend = FRIENDS.find(f => f.name === name);
                    card.addEventListener('click', () => selectCharacter(friend));
                });
            }
            let shopDiv = document.getElementById('shopList');
            if (shopDiv) {
                shopDiv.innerHTML = '';
                ITEMS.forEach(item => {
                    shopDiv.innerHTML += `<div class="shop-item"><div><b>${item.name}</b><br>${item.desc}<br><span style="color:#ffd700;">💰 ${item.price} золота</span></div><button class="shop-buy" data-id="${item.id}">Купить</button></div>`;
                });
                document.querySelectorAll('.shop-buy').forEach(btn => btn.addEventListener('click', () => buyItem(btn.dataset.id)));
            }
            findPvPOpponent();
        }

        setInterval(() => { let income = game.workers + game.slaves.length; if (income > 0) { game.gold += income; updateUI(); save(); } }, 1000);
        
        document.getElementById('attackBtn')?.addEventListener('click', attack);
        document.getElementById('skillBtn')?.addEventListener('click', useSkill);
        document.getElementById('healBtn')?.addEventListener('click', heal);
        document.getElementById('waitBtn')?.addEventListener('click', wait);
        document.getElementById('pvpFindBtn')?.addEventListener('click', pvpFight);
        document.querySelectorAll('[data-upgrade]').forEach(btn => btn.addEventListener('click', () => upgrade(btn.dataset.upgrade)));
        
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(`${tab.dataset.tab}-panel`).classList.add('active');
                if (tab.dataset.tab === 'rating') updateRating();
                if (tab.dataset.tab === 'pvp') findPvPOpponent();
                if (tab.dataset.tab === 'slaves') updateUI();
            });
        });
        
        load();
        addLog(`🍻 Добро пожаловать, ${userName}!`, "win");
    </script>
</body>
</html>
