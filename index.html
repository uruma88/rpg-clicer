<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>🍺 Писок Данжен · Пиксельный город</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            margin: 0;
            padding: 0;
        }
        body {
            background: #0a0f0a;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }
        .game {
            max-width: 600px;
            width: 100%;
            background: #1a2015;
            border-radius: 32px;
            padding: 16px;
            border: 3px solid #8b5a2b;
            box-shadow: 0 10px 25px black;
        }
        /* Пиксельная панель статуса */
        .stats {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            background: #2c261a;
            padding: 8px 12px;
            border-radius: 60px;
            margin-bottom: 16px;
            font-weight: bold;
            color: #ffd966;
            font-size: 12px;
        }
        .stat {
            background: #00000066;
            padding: 4px 8px;
            border-radius: 30px;
        }
        /* ПИКСЕЛЬНЫЙ ГОРОД (кнопки-здания) */
        .pixel-city {
            background: #4a6b3a;
            border-radius: 32px;
            padding: 20px 12px;
            margin-bottom: 16px;
            border: 2px solid #c2a15b;
            box-shadow: inset 0 0 0 2px #2c3a1f, 0 4px 8px black;
        }
        .city-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }
        .building {
            background: #8b6946;
            width: 100px;
            text-align: center;
            padding: 8px;
            border-radius: 16px;
            cursor: pointer;
            border-bottom: 4px solid #5a3e24;
            transition: 0.05s linear;
            font-weight: bold;
            color: #ffecb3;
        }
        .building:active {
            transform: translateY(2px);
            border-bottom-width: 2px;
        }
        .building-emoji { font-size: 42px; }
        /* Боевая карточка */
        .battle-card {
            background: #2c261acc;
            border-radius: 32px;
            padding: 16px;
            text-align: center;
            margin-top: 12px;
        }
        .enemy-name {
            background: #00000099;
            display: inline-block;
            padding: 4px 16px;
            border-radius: 40px;
            margin: 8px 0;
        }
        .hp-bar {
            background: #5a3e24;
            border-radius: 20px;
            height: 12px;
            width: 100%;
            margin: 6px 0;
        }
        .hp-fill {
            background: #d44c2f;
            width: 100%;
            height: 100%;
            border-radius: 20px;
            transition: width 0.2s;
        }
        .actions {
            display: flex;
            gap: 10px;
            margin: 16px 0;
        }
        .btn {
            background: #d9a13b;
            flex: 1;
            text-align: center;
            padding: 10px;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 3px 0 #6b3f1c;
        }
        .btn:active { transform: translateY(2px); box-shadow: none; }
        .log {
            background: #0e0c08;
            border-radius: 24px;
            padding: 10px;
            height: 80px;
            overflow-y: auto;
            font-size: 10px;
            color: #ecb176;
            margin-top: 12px;
        }
        .friend-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            max-height: 220px;
            overflow-y: auto;
            margin: 12px 0;
        }
        .friend-card {
            background: #997b4c;
            border-radius: 24px;
            padding: 8px;
            text-align: center;
            width: 80px;
            cursor: pointer;
        }
        .friend-avatar {
            width: 56px;
            height: 56px;
            margin: 0 auto;
            background: #4d3a24;
            border-radius: 28px;
            overflow: hidden;
        }
        .friend-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .damage-number {
            position: fixed;
            font-size: 26px;
            font-weight: bold;
            color: #ffaa44;
            text-shadow: 0 0 3px black;
            pointer-events: none;
            z-index: 1000;
            animation: floatUp 0.4s ease-out forwards;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0px); }
            100% { opacity: 0; transform: translateY(-50px); }
        }
        .flash-red {
            animation: redFlash 0.1s linear 2;
        }
        @keyframes redFlash {
            0% { background: #2c261acc; }
            50% { background: #aa4444cc; }
            100% { background: #2c261acc; }
        }
    </style>
</head>
<body>
<div class="game">
    <div class="stats">
        <div class="stat">🍺 <span id="gold">250</span></div>
        <div class="stat">⚔️ <span id="atk">0</span></div>
        <div class="stat">❤️ <span id="hp">0</span>/<span id="maxHp">0</span></div>
        <div class="stat">💙 <span id="ap">100</span>/<span id="maxAp">100</span></div>
        <div class="stat">🌟 lvl <span id="level">1</span></div>
        <div class="stat">🏔️ <span id="floor">1</span></div>
    </div>

    <!-- ПИКСЕЛЬНЫЙ ГОРОД -->
    <div class="pixel-city">
        <div class="city-grid">
            <div class="building" data-loc="tavern">🍺<div>ТАВЕРНА</div></div>
            <div class="building" data-loc="smith">⚒️<div>КУЗНЕЦ</div></div>
            <div class="building" data-loc="guild">👥<div>ГИЛЬДИЯ</div></div>
            <div class="building" data-loc="gate">🚪<div>ВОРОТА</div></div>
        </div>
    </div>

    <div id="mainPanel"></div>
    <div class="log" id="logArea"></div>
</div>

<script>
    // ---------- ДРУЗЬЯ (с аватарками) ----------
    const FRIENDS = [
        { name: "Алина", avatar: "avatars/алина.jpg", emoji: "👩", str: 1, int: 3, agi: 2, vit: 2 },
        { name: "Бень", avatar: "avatars/бень.jpg", emoji: "🐻", str: 4, int: 1, agi: 1, vit: 4 },
        { name: "Богдан", avatar: "avatars/богдан.jpg", emoji: "💪", str: 3, int: 2, agi: 2, vit: 3 },
        { name: "Ваня", avatar: "avatars/ваня.jpg", emoji: "🧢", str: 2, int: 2, agi: 3, vit: 3 },
        { name: "Егор", avatar: "avatars/егор.jpg", emoji: "⚡", str: 3, int: 1, agi: 3, vit: 2 },
        { name: "Илюха", avatar: "avatars/илюха.jpg", emoji: "🛡️", str: 2, int: 1, agi: 1, vit: 5 },
        { name: "Капрал", avatar: "avatars/капрал.jpg", emoji: "🎖️", str: 5, int: 1, agi: 2, vit: 3 },
        { name: "Кирилл", avatar: "avatars/кирилл.jpg", emoji: "👊", str: 3, int: 2, agi: 3, vit: 2 },
        { name: "Лера", avatar: "avatars/лера.jpg", emoji: "🌸", str: 1, int: 3, agi: 3, vit: 2 },
        { name: "Никитос", avatar: "avatars/никитос.jpg", emoji: "👊", str: 3, int: 2, agi: 3, vit: 2 },
        { name: "Полина", avatar: "avatars/полина.jpg", emoji: "✨", str: 1, int: 4, agi: 2, vit: 2 },
        { name: "Рома", avatar: "avatars/рома.jpg", emoji: "⚔️", str: 4, int: 1, agi: 2, vit: 3 },
        { name: "Саша", avatar: "avatars/саша.jpg", emoji: "⚔️", str: 4, int: 1, agi: 2, vit: 4 },
        { name: "Серега", avatar: "avatars/серега.jpg", emoji: "💣", str: 3, int: 2, agi: 2, vit: 3 },
        { name: "Таня", avatar: "avatars/таня.jpg", emoji: "🍀", str: 2, int: 3, agi: 2, vit: 3 },
        { name: "Юра", avatar: "avatars/юра.jpg", emoji: "🌪️", str: 3, int: 2, agi: 3, vit: 2 }
    ];

    let game = {
        gold: 300, level: 1, exp: 0, xpNext: 100, skillPoints: 0,
        strength: 10, intelligence: 10, agility: 10, vitality: 10,
        hp: 100, maxHp: 100,
        ap: 100, maxAp: 100,
        floor: 1,
        className: null, classLocked: false,
        friend: null,
        weapon: null, armor: null
    };
    let currentEnemy = null;
    let waitingAction = true;
    let log = [];
    let inDungeon = false;

    function addLog(msg) { log.unshift(`🍺 ${msg}`); if(log.length>6) log.pop(); document.getElementById('logArea').innerHTML = log.join('<br>'); }
    function totalAtk() { let w = game.weapon?.atk || 0; return game.strength + w + (game.className==='warrior'? Math.floor(game.strength*0.2):0); }
    function totalMaxHp() { return 80 + game.vitality*5 + (game.armor?.hp||0); }
    function calcDamage() { return Math.floor(totalAtk() + Math.random()*8); }
    function updateUI() {
        document.getElementById('gold').innerText = Math.floor(game.gold);
        document.getElementById('atk').innerText = calcDamage();
        let mhp = totalMaxHp();
        document.getElementById('maxHp').innerText = mhp;
        document.getElementById('hp').innerText = game.hp;
        document.getElementById('ap').innerText = game.ap;
        document.getElementById('maxAp').innerText = game.maxAp;
        document.getElementById('level').innerText = game.level;
        document.getElementById('floor').innerText = game.floor;
        if(currentEnemy && document.getElementById('enemyFill')) {
            let percent = (currentEnemy.hp/currentEnemy.maxHp)*100;
            document.getElementById('enemyFill').style.width = `${Math.max(0,percent)}%`;
            document.getElementById('enemyHpText').innerHTML = `❤️ ${Math.floor(currentEnemy.hp)}/${currentEnemy.maxHp}`;
        }
    }
    function saveGame() { localStorage.setItem('pisokPixel', JSON.stringify(game)); }
    function loadGame() { let s = localStorage.getItem('pisokPixel'); if(s) { let d=JSON.parse(s); for(let k in d) game[k]=d[k]; } game.hp = Math.min(game.hp, totalMaxHp()); updateUI(); }

    // БОЙ
    function startBattle() {
        inDungeon = true;
        let enemies = [
            { name: "🍺 Пиво", emoji: "🍺", hp: 55, maxHp:55, dmg:8, gold:30, exp:35 },
            { name: "🛢️ Бочка", emoji: "🛢️", hp: 80, maxHp:80, dmg:10, gold:45, exp:45 },
            { name: "💪 Вышибала", emoji: "💪", hp: 110, maxHp:110, dmg:13, gold:65, exp:60 }
        ];
        let isBoss = (game.floor % 5 === 0);
        if(isBoss) currentEnemy = { name: "👑 БОСС", emoji: "👑", hp: 180, maxHp:180, dmg:18, gold:150, exp:120 };
        else { let idx = Math.floor(Math.random()*enemies.length); currentEnemy = { ...enemies[idx], hp: enemies[idx].hp, maxHp: enemies[idx].hp }; }
        waitingAction = true;
        addLog(`⚔️ Бой: ${currentEnemy.name}`);
        renderBattle();
    }
    function renderBattle() {
        let div = document.getElementById('mainPanel');
        div.innerHTML = `
            <div class="battle-card" id="battleCard">
                <div style="font-size:60px;">${currentEnemy.emoji}</div>
                <div class="enemy-name">${currentEnemy.name}</div>
                <div class="hp-bar"><div class="hp-fill" id="enemyFill" style="width:100%"></div></div>
                <div id="enemyHpText">❤️ ${currentEnemy.hp}/${currentEnemy.maxHp}</div>
            </div>
            <div class="actions">
                <div class="btn" id="atkBtn">⚔️ АТАКА</div>
                <div class="btn" id="skillBtn">✨ УМЕНИЕ</div>
                <div class="btn" id="restBtn">😴 ОТДЫХ</div>
                <div class="btn" id="runBtn">🏃‍♂️ В ГОРОД</div>
            </div>
        `;
        document.getElementById('atkBtn').onclick = attack;
        document.getElementById('skillBtn').onclick = useSkill;
        document.getElementById('restBtn').onclick = () => { if(waitingAction){ game.ap=Math.min(game.maxAp,game.ap+20); addLog(`😴 +20 AP`); waitingAction=false; updateUI(); setTimeout(enemyTurn,600); } };
        document.getElementById('runBtn').onclick = () => { inDungeon=false; showTown("tavern"); addLog(`Вы вернулись в город`); };
        updateUI();
    }
    function applyDamageAnim(isPlayer) {
        let card = document.getElementById('battleCard');
        if(card) card.style.animation = 'none'; card.offsetHeight; card.style.animation = 'shakeAnim 0.2s ease 2';
        if(isPlayer) document.getElementById('mainPanel').classList.add('flash-red');
        setTimeout(()=>{ document.getElementById('mainPanel')?.classList.remove('flash-red'); },300);
        let d = document.createElement('div'); d.className = 'damage-number'; d.innerText = '-УДАР!';
        d.style.left = '45%'; d.style.top = '30%'; document.body.appendChild(d); setTimeout(()=>d.remove(),400);
    }
    function victory() {
        game.gold += currentEnemy.gold;
        game.exp += currentEnemy.exp;
        addLog(`🏆 ПОБЕДА! +${currentEnemy.gold}🍺 +${currentEnemy.exp} XP`);
        if(game.exp >= game.xpNext) {
            game.level++; game.exp -= game.xpNext; game.xpNext = Math.floor(game.xpNext*1.2); game.skillPoints+=3;
            addLog(`🎉 УРОВЕНЬ ${game.level}! +3 очка навыков! 🎉`);
        }
        game.floor++;
        saveGame();
        startBattle();
        updateUI();
    }
    function attack() {
        if(!waitingAction) return;
        if(game.ap < 15) { addLog(`❌ Нет AP`); return; }
        game.ap -= 15;
        let dmg = calcDamage();
        if(game.className==='rogue' && Math.random()<0.2) { dmg = Math.floor(dmg*1.5); addLog(`🗡️ КРИТ!`); }
        currentEnemy.hp -= dmg;
        addLog(`⚔️ Удар ${dmg}`);
        applyDamageAnim(false);
        if(currentEnemy.hp <= 0) { victory(); updateUI(); return; }
        waitingAction = false; updateUI(); setTimeout(enemyTurn,700);
    }
    function useSkill() {
        if(!waitingAction) return;
        if(game.ap < 30) { addLog(`❌ Нужно 30 AP`); return; }
        game.ap -= 30;
        let dmg = calcDamage() + 15;
        if(game.className==='mage') { dmg += game.intelligence; addLog(`🧙 Огненный шар! ${dmg}`); }
        else if(game.className==='warrior') { dmg = Math.floor(dmg*1.4); addLog(`⚔️ Сокрушитель! ${dmg}`); }
        else { dmg = Math.floor(dmg*1.3); addLog(`🗡️ Танец клинков! ${dmg}`); }
        currentEnemy.hp -= dmg;
        applyDamageAnim(false);
        if(currentEnemy.hp <= 0) { victory(); updateUI(); return; }
        waitingAction = false; updateUI(); setTimeout(enemyTurn,600);
    }
    function enemyTurn() {
        if(currentEnemy.hp <= 0) return;
        let dmg = currentEnemy.dmg;
        game.hp -= dmg;
        addLog(`😖 ${currentEnemy.name} атакует! -${dmg} HP`);
        applyDamageAnim(true);
        if(game.hp <= 0) {
            addLog(`💀 ПОРАЖЕНИЕ! -30 золота`);
            game.gold = Math.max(0, game.gold-30);
            game.hp = totalMaxHp(); game.ap = game.maxAp;
            inDungeon=false; showTown("tavern");
            return;
        }
        waitingAction = true; updateUI(); saveGame();
    }

    // ---------- ГОРОД ----------
    function showTown(loc) {
        inDungeon = false;
        if(loc === 'tavern') {
            document.getElementById('mainPanel').innerHTML = `
                <div class="btn" id="healTown">💚 ЛЕЧЕНИЕ (30🍺)</div>
                <div class="btn" id="statsBtn">📊 СТАТЫ</div>
            `;
            document.getElementById('healTown')?.addEventListener('click', ()=>{
                if(game.gold>=30){ game.gold-=30; game.hp=totalMaxHp(); game.ap=game.maxAp; addLog(`💚 Полное лечение!`); saveGame(); updateUI(); }
                else addLog(`❌ Нужно 30 золота`);
            });
            document.getElementById('statsBtn')?.addEventListener('click', ()=>{
                addLog(`⚔️Сила:${totalAtk()} 🧠Инт:${game.intelligence} 🏃Ловк:${game.agility} ❤️Здор:${totalMaxHp()}`);
            });
        }
        else if(loc === 'smith') {
            document.getElementById('mainPanel').innerHTML = `
                <div class="btn" data-item="club">🗡️ ДУБИНА (+5 силы) 150🍺</div>
                <div class="btn" data-item="armor">🛡️ БРОНЯ (+15 HP) 120🍺</div>
            `;
            document.querySelectorAll('[data-item]').forEach(el=>{
                el.onclick = () => {
                    if(el.dataset.item==='club' && game.gold>=150) { game.gold-=150; game.weapon={atk:5}; addLog(`🗡️ Куплена дубина!`); saveGame(); showTown('smith'); updateUI(); }
                    else if(el.dataset.item==='armor' && game.gold>=120) { game.gold-=120; game.armor={hp:15}; game.hp+=15; addLog(`🛡️ Куплена броня!`); saveGame(); showTown('smith'); updateUI(); }
                    else addLog(`❌ Не хватает золота`);
                };
            });
        }
        else if(loc === 'guild') {
            let friendHtml = `<div class="friend-grid" id="friendGrid"></div><div id="classSection"></div><div class="btn" id="pvpBtn">⚔️ ВЫЗВАТЬ PVP ⚔️</div>`;
            document.getElementById('mainPanel').innerHTML = friendHtml;
            let grid = document.getElementById('friendGrid');
            FRIENDS.forEach(f=>{
                let div = document.createElement('div'); div.className = 'friend-card';
                div.innerHTML = `<div class="friend-avatar"><img src="${f.avatar}" onerror="this.style.display='none'; this.parentElement.innerHTML='${f.emoji}'"></div><div>${f.name}</div>`;
                div.onclick = () => {
                    game.friend = f;
                    game.strength = f.str; game.intelligence = f.int; game.agility = f.agi; game.vitality = f.vit;
                    game.hp = totalMaxHp();
                    addLog(`🍻 Друг: ${f.name}`);
                    saveGame(); showTown('guild'); updateUI();
                };
                grid.appendChild(div);
            });
            if(!game.classLocked) {
                document.getElementById('classSection').innerHTML = `<div style="display:flex; gap:8px; margin:12px 0;"><div class="btn" data-class="warrior">⚔️ ВОИН</div><div class="btn" data-class="mage">🧙 МАГ</div><div class="btn" data-class="rogue">🗡️ ВОР</div></div>`;
                document.querySelectorAll('[data-class]').forEach(c=>{
                    c.onclick = () => {
                        game.className = c.dataset.class; game.classLocked = true;
                        addLog(`🎭 Класс: ${game.className}`);
                        saveGame(); showTown('guild');
                    };
                });
            } else {
                document.getElementById('classSection').innerHTML = `<div>🎭 КЛАСС: ${game.className.toUpperCase()}</div>`;
            }
            document.getElementById('pvpBtn').onclick = () => {
                let leader = JSON.parse(localStorage.getItem('pvpLeader')||'[]');
                let opp = leader.filter(p=>p.id !== 1);
                if(opp.length===0) { addLog(`❌ Нет соперников`); return; }
                let target = opp[0];
                let myPower = game.level*10 + totalAtk()*2;
                if(myPower > target.power) { game.gold+=50; addLog(`🏆 PVP ПОБЕДА над ${target.name}! +50🍺`); }
                else addLog(`💀 ПОРАЖЕНИЕ`);
                saveGame(); updateUI();
            };
        }
        else if(loc === 'gate') {
            document.getElementById('mainPanel').innerHTML = `<div class="btn" id="startDungeon">🍺 НАЧАТЬ ЗАБЕГ</div>`;
            document.getElementById('startDungeon').onclick = startBattle;
        }
        updateUI();
    }

    // ---------- ПЕРЕКЛЮЧЕНИЕ ГОРОДА ----------
    document.querySelectorAll('.building').forEach(b=>{
        b.addEventListener('click',()=>{
            if(inDungeon) { addLog(`Сначала закончи бой!`); return; }
            showTown(b.dataset.loc);
        });
    });

    // ---------- СТАРТ ----------
    loadGame();
    if(!game.classLocked || !game.friend) {
        document.getElementById('mainPanel').innerHTML = `<div class="friend-grid" id="startFriend"></div><div id="startClass"></div>`;
        let grid = document.getElementById('startFriend');
        FRIENDS.forEach(f=>{
            let div = document.createElement('div'); div.className = 'friend-card';
            div.innerHTML = `<div class="friend-avatar"><img src="${f.avatar}" onerror="this.style.display='none'; this.parentElement.innerHTML='${f.emoji}'"></div><div>${f.name}</div>`;
            div.onclick = () => {
                game.friend = f;
                game.strength = f.str; game.intelligence = f.int; game.agility = f.agi; game.vitality = f.vit;
                game.hp = totalMaxHp();
                document.getElementById('startClass').innerHTML = `<div style="display:flex; gap:8px; margin-top:12px;"><div class="btn" data-class="warrior">⚔️ ВОИН</div><div class="btn" data-class="mage">🧙 МАГ</div><div class="btn" data-class="rogue">🗡️ ВОР</div></div>`;
                document.querySelectorAll('[data-class]').forEach(c=>{
                    c.onclick = () => {
                        game.className = c.dataset.class; game.classLocked = true;
                        saveGame();
                        showTown('tavern');
                    };
                });
            };
            grid.appendChild(div);
        });
    } else showTown('tavern');
    updateUI();
    // маленький фикс leaderboard
    let leader = JSON.parse(localStorage.getItem('pvpLeader')||'[]');
    if(!leader.find(p=>p.id===1)) leader.push({id:1, name:game.friend?.name||"Игрок", power:game.level*10+totalAtk()*2});
    localStorage.setItem('pvpLeader', JSON.stringify(leader));
</script>
</body>
</html>
