<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PISOK RPG: CLASS & BOSS UPDATE</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0d0d12; --card: #16161e; --accent: #f1c40f;
            --text: #e0e0e0; --red: #e74c3c; --blue: #3498db; --green: #2ecc71; --purp: #9b59b6;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 10px; margin: 0; }
        .game-container { width: 100%; max-width: 450px; position: relative; }
        .card { background: var(--card); border-radius: 15px; padding: 15px; border: 1px solid #2a2a3a; margin-bottom: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.5); }
        
        /* Характеристики */
        .stats-detail { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 13px; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px; border: 1px solid #333; }
        .stat-line { display: flex; justify-content: space-between; border-bottom: 1px solid #222; padding: 2px 0; }
        .val { color: var(--accent); font-weight: bold; }

        /* Персонаж */
        .char-row { display: flex; gap: 15px; align-items: center; margin-bottom: 15px; }
        .view-box { width: 90px; height: 90px; background: #000; border: 2px solid var(--accent); border-radius: 12px; overflow: hidden; position: relative; }
        .layer { position: absolute; width: 100%; height: 100%; object-fit: cover; }
        
        /* Инвентарь */
        .inv-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-top: 10px; }
        .item { aspect-ratio: 1; background: #1e1e26; border: 2px solid #333; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; position: relative; }
        .item.wrong-class { opacity: 0.5; border-color: #500; }
        .class-tag { position: absolute; bottom: 1px; font-size: 7px; background: rgba(0,0,0,0.7); padding: 1px 3px; border-radius: 3px; }

        /* Бой */
        .boss-title { color: var(--accent); font-weight: bold; text-shadow: 0 0 10px var(--red); animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.6; } }
        
        .bar { height: 16px; background: #222; border-radius: 8px; overflow: hidden; border: 1px solid #000; position: relative; margin: 5px 0; }
        .fill { height: 100%; transition: 0.3s; }
        .hp-fill { background: linear-gradient(90deg, #c0392b, #e74c3c); }
        .bar-txt { position: absolute; width: 100%; text-align: center; font-size: 10px; line-height: 16px; font-weight: bold; text-shadow: 1px 1px 1px #000; }

        .btn { padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; text-transform: uppercase; margin-top: 5px; color: white; }
        .btn-red { background: linear-gradient(135deg, #e74c3c, #c0392b); }
        .btn-blue { background: linear-gradient(135deg, #3498db, #2980b9); }

        .screen { display: none; } .active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="game-container">
    <!-- ВЫБОР КЛАССА -->
    <div id="scr-setup" class="screen active">
        <div class="card" style="text-align:center">
            <h2>ВЫБЕРИ СВОЙ КЛАСС</h2>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:20px;">
                <button class="btn btn-red" onclick="selCls='Воин'">ВОИН<br><small>Высокий HP</small></button>
                <button class="btn btn-blue" onclick="selCls='Маг'">МАГ<br><small>Высокий Урон</small></button>
            </div>
            <div id="hero-list" style="display:grid; grid-template-columns: repeat(4, 1fr); gap:5px;"></div>
            <button class="btn btn-red" style="margin-top:20px" onclick="startGame()">НАЧАТЬ ИГРУ</button>
        </div>
    </div>

    <!-- ГЛАВНЫЙ ЭКРАН -->
    <div id="scr-main" class="screen">
        <div class="card">
            <div class="char-row">
                <div class="view-box">
                    <img id="l-base" class="layer">
                    <img id="l-armor" class="layer" style="display:none">
                    <img id="l-weapon" class="layer" style="display:none">
                </div>
                <div style="flex:1">
                    <div style="display:flex; justify-content:space-between">
                        <b id="ui-name">ГЕРОЙ</b>
                        <span id="ui-class" style="color:var(--accent); font-size:12px">КЛАСС</span>
                    </div>
                    <div class="bar"><div id="hp-f" class="fill hp-fill"></div><div id="hp-t" class="bar-txt"></div></div>
                    <div style="font-size:12px; margin-top:5px">Этаж: <span id="ui-floor" class="val">1</span> | Золото: <span id="ui-gold" class="val">0</span></div>
                </div>
            </div>

            <div class="stats-detail">
                <div class="stat-line">Сила: <span id="st-str" class="val">0</span></div>
                <div class="stat-line">Урон оружия: <span id="st-w" class="val">0</span></div>
                <div class="stat-line">Здоровье: <span id="st-vit" class="val">0</span></div>
                <div class="stat-line">Защита: <span id="st-def" class="val">0</span></div>
                <div class="stat-line" style="grid-column: span 2">ИТОГОВАЯ МОЩЬ: <span id="st-power" class="val">0</span></div>
            </div>
        </div>

        <button class="btn btn-red" style="font-size:18px" onclick="startBattle()">⚔️ В БОЙ</button>

        <div class="card" style="margin-top:15px">
            <div style="font-size:11px; margin-bottom:5px">ИНВЕНТАРЬ (Нажми на вещь):</div>
            <div class="inv-grid" id="ui-inv"></div>
        </div>
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
             <button class="btn" style="background:#333" onclick="unequip('w')">СНЯТЬ ОРУЖИЕ</button>
             <button class="btn" style="background:#333" onclick="unequip('a')">СНЯТЬ БРОНЮ</button>
        </div>
    </div>

    <!-- ЭКРАН БОЯ -->
    <div id="scr-battle" class="screen">
        <div class="card" style="text-align:center" id="bt-card">
            <h2 id="bt-en-name">МОНСТР</h2>
            <div class="bar"><div id="bt-en-hp-f" class="fill hp-fill"></div><div id="bt-en-hp-t" class="bar-txt"></div></div>
            <div style="margin:15px 0">⚔️</div>
            <div class="bar"><div id="bt-p-hp-f" class="fill hp-fill"></div><div id="bt-p-hp-t" class="bar-txt"></div></div>
            <div id="bt-log" style="height:80px; overflow-y:auto; font-size:12px; background:#000; padding:5px; text-align:left; border-radius:5px"></div>
            <button class="btn btn-red" style="margin-top:10px" onclick="doTurn()">УДАРИТЬ</button>
        </div>
    </div>
</div>

<script>
const AVAS = ['алина','бень','богдан','ваня','егор','илюха','капрал','кирилл','лера','никитос','полина','рома','саша','серега','таня','юра'];
let p = JSON.parse(localStorage.getItem('pisok_rpg_v8')) || null;
let selAva = 'юра';
let selCls = 'Воин';
let combat = null;

window.onload = () => {
    if(!p) {
        const list = document.getElementById('hero-list');
        AVAS.forEach(n => {
            const img = document.createElement('img');
            img.src = `avatars/${n}.jpg`;
            img.style = "width:100%; border-radius:5px; cursor:pointer; border:2px solid transparent";
            img.onclick = () => { selAva = n; document.querySelectorAll('#hero-list img').forEach(i=>i.style.borderColor='transparent'); img.style.borderColor='gold'; };
            list.appendChild(img);
        });
    } else { showMain(); }
};

function startGame() {
    p = {
        name: selAva, class: selCls, img: `avatars/${selAva}.jpg`,
        floor: 1, gold: 100,
        stats: { str: (selCls==='Маг'?20:10), vit: (selCls==='Воин'?150:100) },
        eq: { w: null, a: null },
        inv: []
    };
    save(); showMain();
}

function save() { 
    localStorage.setItem('pisok_rpg_v8', JSON.stringify(p)); 
    updateUI();
}

function updateUI() {
    if(!p) return;
    const wBonus = p.eq.w ? p.eq.w.val : 0;
    const aBonus = p.eq.a ? p.eq.a.val : 0;

    document.getElementById('l-base').src = p.img;
    document.getElementById('ui-name').innerText = p.name.toUpperCase();
    document.getElementById('ui-class').innerText = p.class;
    document.getElementById('st-str').innerText = p.stats.str;
    document.getElementById('st-w').innerText = wBonus;
    document.getElementById('st-vit').innerText = p.stats.vit + aBonus;
    document.getElementById('st-def').innerText = aBonus;
    document.getElementById('st-power').innerText = (p.stats.str + wBonus) + (p.stats.vit + aBonus);
    document.getElementById('ui-floor').innerText = p.floor;
    document.getElementById('ui-gold').innerText = p.gold;

    // Слои
    const lw = document.getElementById('l-weapon');
    if(p.eq.w) { lw.src = p.eq.w.img; lw.style.display='block'; } else lw.style.display='none';
    const la = document.getElementById('l-armor');
    if(p.eq.a) { la.src = p.eq.a.img; la.style.display='block'; } else la.style.display='none';

    document.getElementById('hp-f').style.width = '100%';
    document.getElementById('hp-t').innerText = (p.stats.vit + aBonus) + " HP";

    // Инвентарь
    const grid = document.getElementById('ui-inv');
    grid.innerHTML = '';
    p.inv.forEach((it, i) => {
        const d = document.createElement('div');
        const isWrong = it.reqClass !== p.class;
        d.className = `item ${isWrong ? 'wrong-class' : ''}`;
        d.innerHTML = `${it.i} <span class="class-tag">${it.reqClass[0]}</span>`;
        d.onclick = () => {
            if(isWrong) return alert("Этот предмет только для класса: " + it.reqClass);
            if(p.eq[it.type]) p.inv.push(p.eq[it.type]);
            p.eq[it.type] = it;
            p.inv.splice(i, 1);
            save();
        };
        grid.appendChild(d);
    });
}

function unequip(type) {
    if(!p.eq[type]) return;
    p.inv.push(p.eq[type]);
    p.eq[type] = null;
    save();
}

function showMain() {
    document.getElementById('scr-setup').classList.remove('active');
    document.getElementById('scr-main').classList.add('active');
    updateUI();
}

// ЛОГИКА БОЯ
function startBattle() {
    const isBoss = p.floor % 10 === 0;
    const multi = Math.pow(1.12, p.floor); // Скейлинг 12% за этаж
    
    combat = {
        p_hp: p.stats.vit + (p.eq.a ? p.eq.a.val : 0),
        p_max: p.stats.vit + (p.eq.a ? p.eq.a.val : 0),
        p_dmg: p.stats.str + (p.eq.w ? p.eq.w.val : 0),
        e_hp: Math.floor((50 + p.floor * 15) * multi * (isBoss ? 3 : 1)),
        e_max: Math.floor((50 + p.floor * 15) * multi * (isBoss ? 3 : 1)),
        e_dmg: Math.floor((5 + p.floor * 2) * multi * (isBoss ? 1.5 : 1)),
        isBoss: isBoss
    };

    document.getElementById('bt-en-name').innerText = isBoss ? "🔥 БОСС ЭТАЖА 🔥" : "МОНСТР";
    document.getElementById('bt-en-name').className = isBoss ? "boss-title" : "";
    document.getElementById('bt-log').innerHTML = "Бой начался!";
    updateBars();
    document.getElementById('scr-main').classList.remove('active');
    document.getElementById('scr-battle').classList.add('active');
}

function updateBars() {
    document.getElementById('bt-p-hp-f').style.width = (combat.p_hp / combat.p_max * 100) + '%';
    document.getElementById('bt-p-hp-t').innerText = combat.p_hp + " HP";
    document.getElementById('bt-en-hp-f').style.width = (combat.e_hp / combat.e_max * 100) + '%';
    document.getElementById('bt-en-hp-t').innerText = combat.e_hp + " HP";
}

function doTurn() {
    // Ты
    const d = Math.floor(combat.p_dmg * (0.9 + Math.random() * 0.2));
    combat.e_hp -= d;
    log(`Ты ударил на ${d}`);
    
    if(combat.e_hp <= 0) return win();

    // Враг
    setTimeout(() => {
        const ed = Math.floor(combat.e_dmg * (0.9 + Math.random() * 0.2));
        combat.p_hp -= ed;
        log(`Враг ударил на ${ed}`, 'red');
        if(combat.p_hp <= 0) return lose();
        updateBars();
    }, 300);
    updateBars();
}

function log(t, color) {
    const b = document.getElementById('bt-log');
    b.innerHTML += `<div style="color:${color||'#fff'}">${t}</div>`;
    b.scrollTop = b.scrollHeight;
}

function win() {
    alert(combat.isBoss ? "БОСС ПОВЕРЖЕН!" : "Победа!");
    p.gold += combat.isBoss ? 200 : 30;
    p.floor++;
    
    // Шанс дропа
    if(combat.isBoss || Math.random() > 0.7) {
        const classes = ['Воин', 'Маг'];
        const types = ['w', 'a'];
        const rCls = classes[Math.floor(Math.random()*2)];
        const rTyp = types[Math.floor(Math.random()*2)];
        
        p.inv.push({
            n: 'Предмет',
            i: rTyp === 'w' ? '⚔️' : '🛡️',
            type: rTyp,
            reqClass: rCls,
            val: p.floor * 5 * (combat.isBoss ? 2 : 1),
            img: rTyp === 'w' ? 'w_item.png' : 'a_item.png'
        });
        alert("Выпал предмет для класса: " + rCls);
    }
    
    end();
}

function lose() {
    alert("Смерть...");
    p.gold = Math.floor(p.gold / 2);
    end();
}

function end() {
    save();
    document.getElementById('scr-battle').classList.remove('active');
    document.getElementById('scr-main').classList.add('active');
}
</script>
</body>
</html>
