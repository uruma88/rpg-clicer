<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pisok RPG - Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #1a1a1a; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; }
        #game-container { max-width: 500px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; align-items: center; background: #000; }
        .screen { display: none; flex-direction: column; align-items: center; padding: 15px; width: 100%; box-sizing: border-box; }
        .active { display: flex; }

        /* Стиль характеристик */
        .stats-panel { background: #222; padding: 10px; border-radius: 10px; border: 1px solid #444; width: 90%; margin: 10px 0; }
        .stat-row { display: flex; justify-content: space-between; align-items: center; margin: 5px 0; }
        .stat-btn { background: #f1c40f; border: none; color: #000; width: 25px; height: 25px; border-radius: 50%; font-weight: bold; cursor: pointer; }

        /* Экипировка */
        .equip-slots { display: flex; gap: 20px; margin: 15px 0; }
        .slot { width: 60px; height: 60px; background: #333; border: 2px dashed #666; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 24px; position: relative; }
        .slot-label { font-size: 9px; color: #aaa; position: absolute; bottom: 2px; }

        /* Инвентарь */
        #inventory-list { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; background: #111; padding: 10px; border-radius: 10px; width: 90%; min-height: 100px; border: 1px solid #333; }
        .item-slot { width: 100%; aspect-ratio: 1; background: #2a2a2a; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; border: 1px solid #444; }

        /* Полоски */
        .progress-container { width: 100%; margin: 10px 0; }
        .hp-bar { width: 100%; height: 25px; background: #333; border: 2px solid #fff; position: relative; border-radius: 5px; overflow: hidden; }
        #hp-fill { background: #c0392b; height: 100%; width: 100%; transition: 0.3s; }
        #xp-fill { background: #27ae60; height: 100%; width: 0%; transition: 0.3s; }
        .bar-text { position: absolute; width: 100%; text-align: center; top: 50%; transform: translateY(-50%); font-size: 12px; font-weight: bold; text-shadow: 1px 1px 2px #000; }

        button { padding: 12px 20px; background: #2980b9; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 80%; margin: 5px 0; }
        .avatar-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 10px; }
        .avatar-card img { width: 80px; height: 80px; object-fit: cover; border-radius: 10px; border: 2px solid #444; }
        .selected img { border-color: #f1c40f; box-shadow: 0 0 10px #f1c40f; }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- ВЫБОР -->
        <div id="screen-setup" class="screen">
            <h2>СОЗДАЙ ГЕРОЯ</h2>
            <div class="avatar-grid" id="friends-list"></div>
            <button onclick="confirmHero()">НАЧАТЬ ПУТЬ</button>
        </div>

        <!-- ГОРОД -->
        <div id="screen-city" class="screen">
            <h3 id="char-name">ГЕРОЙ</h3>
            
            <div class="progress-container">
                <div style="font-size: 11px;">HP</div>
                <div class="hp-bar"><div id="hp-fill"></div><div class="bar-text" id="hp-text">100/100</div></div>
                <div style="font-size: 11px; margin-top: 5px;">XP (УР <span id="lvl">1</span>)</div>
                <div class="hp-bar" style="height: 10px; border: 1px solid #666;"><div id="xp-fill"></div></div>
            </div>

            <div class="stats-panel">
                <div class="stat-row">⚔️ СИЛА: <span id="stat-str">10</span> <button class="stat-btn" onclick="upStat('str')">+</button></div>
                <div class="stat-row">🛡️ ЗАЩИТА: <span id="stat-def">5</span> <button class="stat-btn" onclick="upStat('def')">+</button></div>
                <div class="stat-row">❤️ ХП: <span id="stat-vit">10</span> <button class="stat-btn" onclick="upStat('vit')">+</button></div>
                <div style="font-size: 10px; color: #f1c40f;">ОЧКОВ ПРОКАЧКИ: <span id="stat-points">0</span></div>
            </div>

            <div class="equip-slots">
                <div class="slot" id="slot-weapon">👊<div class="slot-label">ОРУЖИЕ</div></div>
                <div class="slot" id="slot-armor">👕<div class="slot-label">БРОНЯ</div></div>
            </div>

            <button onclick="showScreen('screen-battle'); startBattle();" style="background: #c0392b;">⚔️ В БОЙ (ДАНЖ)</button>
            <button onclick="rest()" style="background: #27ae60;">🍺 ТАВЕРНА (ОТДЫХ)</button>
            
            <h4 style="margin: 15px 0 5px 0;">СУМКА</h4>
            <div id="inventory-list"></div>
        </div>

        <!-- БОЙ -->
        <div id="screen-battle" class="screen">
            <h3 id="enemy-name">МОНСТР</h3>
            <div style="font-size: 50px;" id="enemy-icon">👾</div>
            <div class="hp-bar" style="width: 80%;"><div id="enemy-hp-fill" style="background: #8e44ad;"></div><div class="bar-text" id="enemy-hp-text">100/100</div></div>
            
            <hr style="width: 90%; margin: 20px 0; border: 0; border-top: 1px solid #333;">
            
            <img id="battle-hero-img" src="" style="width: 70px; height: 70px; border-radius: 50%; border: 2px solid #f1c40f;">
            <button id="atk-btn" onclick="playerAttack()" style="height: 60px; font-size: 20px;">⚔️ УДАРИТЬ!</button>
            <div id="battle-log" style="font-size: 12px; color: #aaa; margin-top: 10px; height: 60px; overflow: hidden;"></div>
        </div>
    </div>

    <script>
        const friends = ['алина', 'бень', 'богдан', 'ваня', 'егор', 'илюха', 'капрал', 'кирилл', 'лера', 'никитос', 'полина', 'рома', 'саша', 'серега', 'таня', 'юра'];
        let gameState = JSON.parse(localStorage.getItem('pisok_rpg_v2')) || null;
        let enemy = null;

        function init() {
            if (!gameState) {
                showScreen('screen-setup');
                const list = document.getElementById('friends-list');
                friends.forEach(f => {
                    list.innerHTML += `<div class="avatar-card" id="card-${f}" onclick="selectHero('${f}')"><img src="avatars/${f}.jpg" onerror="this.src='https://ui-avatars.com/api/?name=${f}'"></div>`;
                });
            } else {
                showScreen('screen-city');
                updateUI();
            }
        }

        function selectHero(f) {
            gameState = {
                name: f, lvl: 1, xp: 0, nextLvl: 100, points: 0,
                str: 10, def: 5, vit: 10,
                hp: 100, maxHp: 100,
                gold: 0,
                weapon: null, armor: null,
                inv: []
            };
            document.querySelectorAll('.avatar-card').forEach(c => c.classList.remove('selected'));
            document.getElementById('card-'+f).classList.add('selected');
        }

        function confirmHero() { if(gameState) { save(); showScreen('screen-city'); updateUI(); } }

        function updateUI() {
            document.getElementById('char-name').innerText = gameState.name.toUpperCase();
            document.getElementById('lvl').innerText = gameState.lvl;
            document.getElementById('stat-str').innerText = gameState.str;
            document.getElementById('stat-def').innerText = gameState.def;
            document.getElementById('stat-vit').innerText = gameState.vit;
            document.getElementById('stat-points').innerText = gameState.points;
            
            gameState.maxHp = gameState.vit * 10;
            document.getElementById('hp-text').innerText = `${gameState.hp}/${gameState.maxHp}`;
            document.getElementById('hp-fill').style.width = (gameState.hp / gameState.maxHp * 100) + '%';
            document.getElementById('xp-fill').style.width = (gameState.xp / gameState.nextLvl * 100) + '%';

            // Экипировка
            document.getElementById('slot-weapon').innerHTML = gameState.weapon ? gameState.weapon.icon : '👊';
            document.getElementById('slot-armor').innerHTML = gameState.armor ? gameState.armor.icon : '👕';

            // Сумка
            const inv = document.getElementById('inventory-list');
            inv.innerHTML = "";
            gameState.inv.forEach((item, index) => {
                const s = document.createElement('div');
                s.className = 'item-slot';
                s.innerHTML = item.icon;
                s.onclick = () => useItem(index);
                inv.appendChild(s);
            });
        }

        function upStat(s) {
            if (gameState.points > 0) {
                gameState[s]++;
                gameState.points--;
                if(s === 'vit') { gameState.maxHp = gameState.vit * 10; gameState.hp = gameState.maxHp; }
                save(); updateUI();
            }
        }

        function useItem(index) {
            const item = gameState.inv[index];
            if (item.type === 'weapon') {
                if(gameState.weapon) gameState.inv.push(gameState.weapon);
                gameState.weapon = item;
            } else {
                if(gameState.armor) gameState.inv.push(gameState.armor);
                gameState.armor = item;
            }
            gameState.inv.splice(index, 1);
            save(); updateUI();
        }

        function startBattle() {
            enemy = { name: "Тролль", hp: 50 + (gameState.lvl * 20), maxHp: 50 + (gameState.lvl * 20), icon: "👹" };
            document.getElementById('enemy-name').innerText = enemy.name;
            document.getElementById('battle-hero-img').src = `avatars/${gameState.name}.jpg`;
            updateBattleUI();
        }

        function playerAttack() {
            let pDmg = gameState.str + (gameState.weapon ? gameState.weapon.power : 0);
            enemy.hp -= pDmg;
            log(`Ты ударил на ${pDmg}!`);
            
            if (enemy.hp <= 0) {
                win();
            } else {
                let eDmg = Math.max(1, 10 - gameState.def);
                gameState.hp -= eDmg;
                updateBattleUI();
                if (gameState.hp <= 0) { alert("Ты погиб!"); location.reload(); }
            }
            updateBattleUI();
        }

        function win() {
            let xpGain = 40;
            gameState.xp += xpGain;
            log(`Победа! +${xpGain} опыта`);
            
            // Выпадение лута
            if (Math.random() > 0.5) {
                const loot = { type: 'weapon', name: 'Меч', icon: '⚔️', power: gameState.lvl * 2 };
                gameState.inv.push(loot);
                log(`Выпал предмет: ${loot.icon}`);
            }

            if (gameState.xp >= gameState.nextLvl) {
                gameState.lvl++;
                gameState.xp = 0;
                gameState.points += 3;
                gameState.nextLvl = Math.floor(gameState.nextLvl * 1.5);
                alert("НОВЫЙ УРОВЕНЬ!");
            }
            save();
            setTimeout(() => { showScreen('screen-city'); updateUI(); }, 1500);
        }

        function log(m) { document.getElementById('battle-log').innerHTML = m; }
        function updateBattleUI() {
            document.getElementById('enemy-hp-fill').style.width = (enemy.hp / enemy.maxHp * 100) + '%';
            document.getElementById('enemy-hp-text').innerText = `${enemy.hp}/${enemy.maxHp}`;
        }
        function rest() { gameState.hp = gameState.maxHp; save(); updateUI(); alert("Здоровье восстановлено!"); }
        function save() { localStorage.setItem('pisok_rpg_v2', JSON.stringify(gameState)); }
        function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        
        init();
    </script>
</body>
</html>
