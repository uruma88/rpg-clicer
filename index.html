<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Писок Данжен</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; color: #fff; font-family: 'Courier New', monospace; image-rendering: pixelated; }
        #game-container { max-width: 500px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; }
        .screen { display: none; flex-direction: column; align-items: center; padding: 10px; text-align: center; flex-grow: 1; }
        .active { display: flex; }

        /* Сетка персонажей */
        .avatar-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; max-height: 60vh; overflow-y: auto; padding: 10px; }
        .avatar-card { border: 2px solid #444; padding: 5px; cursor: pointer; background: #222; border-radius: 8px; }
        .avatar-card img { width: 70px; height: 70px; object-fit: cover; display: block; border-radius: 4px; margin-bottom: 5px; }
        .avatar-card.selected { border-color: #f1c40f; background: #443300; }

        /* Карта города */
        #city-map { width: 320px; height: 320px; background: #2d5a27; border: 4px solid #5d4037; position: relative; border-radius: 15px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .building { position: absolute; cursor: pointer; font-size: 40px; text-align: center; }
        
        /* Инвентарь */
        #inventory-list { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; margin-top: 10px; }
        .item-slot { width: 50px; height: 50px; background: #333; border: 1px solid #666; font-size: 20px; display: flex; align-items: center; justify-content: center; position: relative; }

        button { padding: 12px 20px; background: #5d4037; color: #fff; border: 3px solid #3e2723; cursor: pointer; font-family: inherit; margin: 5px; border-radius: 5px; }
        .hp-bar { width: 200px; height: 20px; background: #333; border: 2px solid #fff; position: relative; margin: 10px 0; }
        #hp-fill { background: #e74c3c; height: 100%; width: 100%; transition: 0.3s; }
        #battle-log { width: 90%; background: rgba(0,0,0,0.8); height: 80px; overflow-y: auto; font-size: 12px; padding: 10px; margin-top: 10px; border: 1px solid #444; }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- ВЫБОР ПЕРСОНАЖА -->
        <div id="screen-setup" class="screen">
            <h2>КТО ТЫ ИЗ БАНДЫ?</h2>
            <div class="avatar-grid" id="friends-list"></div>
            <h3>ВЫБЕРИ КЛАСС</h3>
            <div>
                <button onclick="selectClass('Воин')">⚔️ Воин</button>
                <button onclick="selectClass('Маг')">🧙 Маг</button>
                <button onclick="selectClass('Вор')">🗡️ Вор</button>
            </div>
        </div>

        <!-- ГОРОД -->
        <div id="screen-city" class="screen">
            <div id="header">
                <b id="display-name">?</b> [<span id="display-class">-</span>]<br>
                💰 <span id="gold">0</span> | ⭐ LVL: <span id="lvl">1</span>
            </div>
            <div id="city-map">
                <button onclick="sellAllLoot()" style="background: #27ae60; border-color: #2ecc71;">💰 Продать весь лут</button>
                <div class="building" style="top: 20px; left: 40px;" onclick="rest()">🍺<br><small style="font-size:10px">Таверна</small></div>
                <div class="building" style="top: 20px; right: 40px;" onclick="alert('Кузница закрыта')">⚒️<br><small style="font-size:10px">Кузница</small></div>
                <div class="building" style="top: 200px; left: 125px;" onclick="startDungeon()">🚪<br><small style="font-size:10px">В ДАНЖ</small></div>
            </div>
            <h4>ИНВЕНТАРЬ (Loot)</h4>
            <div id="inventory-list"></div>
        </div>

        <!-- БОЙ -->
        <div id="screen-battle" class="screen">
            <div id="enemy-area">
                <div style="font-size: 60px;">👾</div>
                <div class="hp-bar"><div id="enemy-hp-fill" style="background:#a29bfe; width:100%; height:100%;"></div></div>
            </div>
            <div class="player-status">
                <div class="hp-bar"><div id="hp-fill"></div></div>
                <p>HP: <span id="hp">100</span></p>
                <button onclick="attack()">⚔️ УДАР</button>
            </div>
            <div id="battle-log"></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Список из твоего скриншота
        const friends = [
            'алина', 'бень', 'богдан', 'ваня', 'егор', 'илюха', 
            'капрал', 'кирилл', 'лера', 'никитос', 'полина', 
            'рома', 'саша', 'серега', 'таня', 'юра'
        ];

        const prefixes = [
            { n: "Огненный", b: 5, s: "str", e: "🔥" },
            { n: "Ледяной", b: 3, s: "str", e: "❄️" },
            { n: "Древний", b: 15, s: "hp", e: "📜" },
            { n: "Быстрый", b: 2, s: "agi", e: "⚡" }
        ];

        let gameState = JSON.parse(localStorage.getItem('pisok_rpg_save')) || null;

        function init() {
            if (!gameState) {
                showScreen('screen-setup');
                const list = document.getElementById('friends-list');
                friends.forEach(f => {
                    list.innerHTML += `
                        <div class="avatar-card" onclick="selectFriend('${f}')">
                            <img src="avatars/${f}.jpg" onerror="this.src='https://ui-avatars.com/api/?name=${f}'">
                            <span style="font-size:12px">${f}</span>
                        </div>
                    `;
                });
            } else {
                showScreen('screen-city');
                updateUI();
            }
        }

        function selectFriend(name) {
            gameState = { friend: name, class: '', gold: 0, lvl: 1, hp: 100, maxHp: 100, str: 10, inv: [] };
            document.querySelectorAll('.avatar-card').forEach(c => c.classList.remove('selected'));
            event.currentTarget.classList.add('selected');
        }

        function selectClass(cl) {
            if (!gameState || !gameState.friend) return alert('Выбери себя!');
            gameState.class = cl;
            saveGame();
            showScreen('screen-city');
            updateUI();
        }

        function generateLoot() {
            const p = prefixes[Math.floor(Math.random() * prefixes.length)];
            const item = { name: p.n + " Меч", icon: p.e, bonus: p.b, stat: p.s };
            gameState.inv.push(item);
            if (p.s === 'str') gameState.str += p.b;
            if (p.s === 'hp') { gameState.maxHp += p.b; gameState.hp += p.b; }
            return item;
        }

        function attack() {
            let dmg = gameState.str + Math.floor(Math.random() * 5);
            let loot = generateLoot();
            log(`Ты нанес ${dmg} урона!`);
            log(`Выпало: ${loot.icon} ${loot.name}`);
            gameState.gold += 15;
            saveGame();
            setTimeout(() => { showScreen('screen-city'); updateUI(); }, 2000);
        }

        function rest() {
            gameState.hp = gameState.maxHp;
            alert("Здоровье восстановлено!");
            saveGame();
            updateUI();
        }

        // ОБНОВЛЕННАЯ ФУНКЦИЯ ИНТЕРФЕЙСА
        function updateUI() {
            if (!gameState) return;
            document.getElementById('display-name').innerText = gameState.friend.toUpperCase();
            document.getElementById('display-class').innerText = gameState.class;
            document.getElementById('gold').innerText = gameState.gold;
            document.getElementById('lvl').innerText = gameState.lvl;
            document.getElementById('hp').innerText = gameState.hp;
            document.getElementById('hp-fill').style.width = (gameState.hp / gameState.maxHp * 100) + '%';
            
            // Рисуем инвентарь (находим его на странице)
            const invDiv = document.getElementById('inventory-list');
            invDiv.innerHTML = "";
            
            // Показываем предметы (теперь на них можно нажимать)
            gameState.inv.slice(-12).forEach((item) => {
                const slot = document.createElement('div');
                slot.className = 'item-slot';
                slot.innerHTML = item.icon;
                // При клике на предмет показываем инфо
                slot.onclick = () => alert(`${item.name}\nБонус: +${item.bonus} к ${item.stat}`);
                invDiv.appendChild(slot);
            });
        }

        // КНОПКА ПРОДАЖИ (можно вызвать из консоли или добавить кнопку в HTML)
        function sellAllLoot() {
            if (gameState.inv.length === 0) return alert("Сумка пуста!");
            let profit = gameState.inv.length * 10;
            gameState.gold += profit;
            gameState.inv = []; // Очищаем инвентарь
            saveGame();
            updateUI();
            alert(`Весь хлам продан за ${profit} золота!`);
        }

        function log(m) { document.getElementById('battle-log').innerHTML += `> ${m}<br>`; }
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        function saveGame() { localStorage.setItem('pisok_rpg_save', JSON.stringify(gameState)); }
        function startDungeon() { document.getElementById('battle-log').innerHTML = ""; showScreen('screen-battle'); }

        init();
    </script>
</body>
</html>
