<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>🍺 Пивная RPG | писок крут</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: white;
            padding: 12px;
        }

        .header {
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
            background: rgba(0,0,0,0.6);
            border-radius: 20px;
            padding: 8px;
        }

        .stats {
            background: rgba(0,0,0,0.6);
            border-radius: 15px;
            padding: 10px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }

        .stat {
            text-align: center;
            flex: 1;
        }

        .stat-value {
            font-size: 16px;
            font-weight: bold;
            color: #ffd700;
        }

        .stat-label {
            font-size: 9px;
            opacity: 0.7;
        }

        /* БОЕВАЯ ЗОНА */
        .combat-area {
            background: rgba(0,0,0,0.6);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 12px;
        }

        .enemy-box {
            text-align: center;
            padding: 10px;
            background: rgba(0,0,0,0.4);
            border-radius: 15px;
            margin-bottom: 15px;
        }

        .enemy-emoji {
            font-size: 60px;
        }

        .enemy-name {
            font-size: 16px;
            font-weight: bold;
        }

        .hp-bar {
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            height: 8px;
            width: 150px;
            margin: 8px auto;
            overflow: hidden;
        }

        .hp-fill {
            background: linear-gradient(90deg, #e74c3c, #ff6b6b);
            width: 100%;
            height: 100%;
            transition: width 0.2s;
        }

        .player-box {
            display: flex;
            gap: 12px;
            padding: 10px;
            background: rgba(0,0,0,0.4);
            border-radius: 15px;
            margin-bottom: 15px;
        }

        .player-avatar {
            width: 55px;
            height: 55px;
            border-radius: 28px;
            background: rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            overflow: hidden;
        }

        .player-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .player-info {
            flex: 1;
        }

        .player-name {
            font-size: 14px;
            font-weight: bold;
        }

        /* КНОПКИ ДЕЙСТВИЙ */
        .actions {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }

        .action-btn {
            background: rgba(0,0,0,0.7);
            border: 1px solid rgba(255,215,0,0.5);
            border-radius: 12px;
            padding: 10px;
            font-size: 12px;
            font-weight: bold;
            color: #ffd700;
            cursor: pointer;
        }

        .action-btn:active {
            transform: scale(0.96);
        }

        .action-btn:disabled {
            opacity: 0.5;
        }

        .special {
            border-color: #9b59b6;
            color: #c39bd3;
        }

        /* ЛОГ */
        .log-area {
            background: rgba(0,0,0,0.5);
            border-radius: 12px;
            padding: 8px;
            height: 100px;
            overflow-y: auto;
            font-size: 10px;
            font-family: monospace;
        }

        .log-line {
            padding: 2px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        /* ТАБЫ */
        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 12px;
        }

        .tab {
            flex: 1;
            background: rgba(0,0,0,0.5);
            border: none;
            padding: 8px;
            border-radius: 20px;
            color: white;
            font-size: 11px;
            cursor: pointer;
        }

        .tab.active {
            background: #e67e22;
        }

        .panel {
            background: rgba(0,0,0,0.5);
            border-radius: 15px;
            padding: 12px;
            display: none;
        }

        .panel.active {
            display: block;
        }

        /* ВЫБОР ПЕРСОНАЖА */
        .chars-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
            gap: 8px;
            max-height: 350px;
            overflow-y: auto;
        }

        .char-card {
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 8px;
            text-align: center;
            cursor: pointer;
        }

        .char-card.selected {
            background: #e67e22;
        }

        .char-avatar {
            width: 50px;
            height: 50px;
            border-radius: 25px;
            margin: 0 auto;
            background: rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 25px;
            overflow: hidden;
        }

        .char-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .char-name {
            font-size: 9px;
            margin-top: 5px;
        }

        /* ПРОКАЧКА */
        .upgrade-item {
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .upgrade-btn {
            background: #ffd700;
            border: none;
            padding: 5px 12px;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 11px;
        }
    </style>
</head>
<body>
    <div class="header">🍺 ПИВНАЯ RPG 🍺</div>

    <div class="stats">
        <div class="stat"><div class="stat-value" id="gold">200</div><div class="stat-label">🍺 КЭПС</div></div>
        <div class="stat"><div class="stat-value" id="level">1</div><div class="stat-label">🌟 УРОВЕНЬ</div></div>
        <div class="stat"><div class="stat-value" id="power">0</div><div class="stat-label">⚡ СИЛА</div></div>
        <div class="stat"><div class="stat-value" id="ap">100</div><div class="stat-label">💥 AP</div></div>
    </div>

    <div class="tabs">
        <button class="tab active" data-tab="fight">⚔️ БОЙ</button>
        <button class="tab" data-tab="chars">👥 ДРУЗЬЯ</button>
        <button class="tab" data-tab="upgrade">📊 ПРОКАЧКА</button>
        <button class="tab" data-tab="rating">🏆 РЕЙТИНГ</button>
    </div>

    <!-- БОЙ -->
    <div id="fight-panel" class="panel active">
        <div class="combat-area">
            <div class="enemy-box">
                <div class="enemy-emoji" id="enemyEmoji">🍺</div>
                <div class="enemy-name" id="enemyName">Похмелье</div>
                <div class="hp-bar"><div class="hp-fill" id="enemyHpFill" style="width: 100%"></div></div>
                <div id="enemyHpText">❤️ 100/100</div>
            </div>

            <div class="player-box">
                <div class="player-avatar" id="playerAvatar">🍺</div>
                <div class="player-info">
                    <div class="player-name" id="playerName">Игрок</div>
                    <div id="playerHp">❤️ 100/100</div>
                    <div id="playerAp">💥 AP: 100/100</div>
                </div>
            </div>

            <div class="actions">
                <button class="action-btn" id="attackBtn">🔫 АТАКА (20 AP)</button>
                <button class="action-btn special" id="skillBtn">✨ СПОСОБНОСТЬ</button>
                <button class="action-btn" id="defendBtn">🛡️ ЗАЩИТА (15 AP)</button>
                <button class="action-btn" id="healBtn">💚 ЛЕЧЕНИЕ (30 AP)</button>
            </div>

            <div class="log-area" id="logArea">
                <div class="log-line">Добро пожаловать в Пивную RPG!</div>
                <div class="log-line">Выбери персонажа → ДРУЗЬЯ</div>
            </div>
        </div>
    </div>

    <!-- ВЫБОР ДРУЗЕЙ -->
    <div id="chars-panel" class="panel">
        <div class="chars-grid" id="charsGrid"></div>
        <div id="charInfo" style="margin-top: 10px; text-align: center; font-size: 11px;">Выбери персонажа! У каждого своя способность</div>
    </div>

    <!-- ПРОКАЧКА -->
    <div id="upgrade-panel" class="panel">
        <div class="upgrade-item"><div><b>💪 СИЛА</b><br>+5 урона</div><button class="upgrade-btn" data-upgrade="str">+</button></div>
        <div class="upgrade-item"><div><b>❤️ ЗДОРОВЬЕ</b><br>+20 HP</div><button class="upgrade-btn" data-upgrade="hp">+</button></div>
        <div class="upgrade-item"><div><b>⚡ AP</b><br>+10 AP</div><button class="upgrade-btn" data-upgrade="ap">+</button></div>
        <div class="upgrade-item"><div><b>👥 КОМАНДА</b><br>+1💰/сек</div><button class="upgrade-btn" data-upgrade="worker">+</button></div>
    </div>

    <!-- РЕЙТИНГ -->
    <div id="rating-panel" class="panel">
        <div id="ratingList"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        if (tg) { tg.ready(); tg.expand(); }

        const userId = (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) ? tg.initDataUnsafe.user.id : Math.floor(Math.random() * 1000000);
        const userName = (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) ? tg.initDataUnsafe.user.first_name : "Гость";

        // ДРУЗЬЯ
        const FRIENDS = [
            { name: "Алина", photo: "avatars/алина.jpg", strength: 1, hp: 95, skill: "Ледяной взгляд", skillEffect: "замораживает врага" },
            { name: "Бень", photo: "avatars/бень.jpg", strength: 16, hp: 130, skill: "Медвежья сила", skillEffect: "+20 урона на 2 хода" },
            { name: "Богдан", photo: "avatars/богдан.jpg", strength: 8, hp: 90, skill: "Магический щит", skillEffect: "-50% урона 1 ход" },
            { name: "Ваня", photo: "avatars/ваня.jpg", strength: 14, hp: 105, skill: "Двойной удар", skillEffect: "атакует дважды" },
            { name: "Егор", photo: "avatars/егор.jpg", strength: 17, hp: 115, skill: "Ярость", skillEffect: "+50% урона" },
            { name: "Илюха", photo: "avatars/илюха.jpg", strength: 15, hp: 100, skill: "Исцеление", skillEffect: "+40 HP" },
            { name: "Капрал", photo: "avatars/капрал.jpg", strength: 20, hp: 130, skill: "Приказ", skillEffect: "+15 урона команде" },
            { name: "Кирилл", photo: "avatars/кирилл.jpg", strength: 13, hp: 100, skill: "Теневой удар", skillEffect: "игнорирует защиту" },
            { name: "Лера", photo: "avatars/лера.jpg", strength: 10, hp: 90, skill: "Ослепление", skillEffect: "враг пропускает ход" },
            { name: "Никитос", photo: "avatars/никитос.jpg", strength: 16, hp: 110, skill: "Ускорение", skillEffect: "+15 AP" },
            { name: "Полина", photo: "avatars/полина.jpg", strength: 11, hp: 95, skill: "Вампиризм", skillEffect: "лечит 50% от урона" },
            { name: "Рома", photo: "avatars/рома.jpg", strength: 19, hp: 125, skill: "Сокрушитель", skillEffect: "+30% урона" },
            { name: "Саша", photo: "avatars/саша.jpg", strength: 18, hp: 130, skill: "Боевой клич", skillEffect: "+10 силы" },
            { name: "Серега", photo: "avatars/серега.jpg", strength: 17, hp: 115, skill: "Адреналин", skillEffect: "+30 AP" },
            { name: "Таня", photo: "avatars/таня.jpg", strength: 12, hp: 100, skill: "Точный выстрел", skillEffect: "100% попадание" },
            { name: "Юра", photo: "avatars/юра.jpg", strength: 16, hp: 110, skill: "Контратака", skillEffect: "ответный удар" }
        ];

        // ВРАГИ
        const ENEMIES = [
            { name: "🍺 Залежавшееся Пиво", emoji: "🍺", hp: 80, damage: 8, gold: 25, exp: 15, minLvl: 1 },
            { name: "🍻 Пустая Кружка", emoji: "🍻", hp: 100, damage: 10, gold: 35, exp: 20, minLvl: 1 },
            { name: "😵 Похмелье", emoji: "😵", hp: 120, damage: 12, gold: 50, exp: 30, minLvl: 1 },
            { name: "🧟 Пивной Зомби", emoji: "🧟", hp: 180, damage: 14, gold: 70, exp: 40, minLvl: 5 },
            { name: "💰 Бармен-Жмот", emoji: "💰", hp: 250, damage: 16, gold: 100, exp: 60, minLvl: 10 },
            { name: "🍺 Кега-Босс", emoji: "🍺", hp: 400, damage: 20, gold: 200, exp: 120, minLvl: 15 },
            { name: "🔥 Пятница 18:00", emoji: "🔥", hp: 600, damage: 25, gold: 300, exp: 200, minLvl: 20 }
        ];

        let game = {
            gold: 200,
            level: 1,
            exp: 0,
            strength: 15,
            maxHp: 100,
            hp: 100,
            maxAp: 100,
            ap: 100,
            workers: 0,
            character: null,
            buff: { dmgBonus: 0, defBonus: 0, turns: 0 }
        };

        let currentEnemy = null;
        let logs = [];
        let waitingForTurn = true;
        let enemyFrozen = false;

        function addLog(msg) {
            logs.unshift(msg);
            if (logs.length > 20) logs.pop();
            document.getElementById('logArea').innerHTML = logs.map(l => `<div class="log-line">${l}</div>`).join('');
        }

        function getEnemy() {
            let available = ENEMIES.filter(e => game.level >= e.minLvl);
            if (available.length === 0) available = ENEMIES;
            let template = available[Math.floor(Math.random() * available.length)];
            let mult = 1 + Math.floor((game.level - 1) / 5) * 0.2;
            return {
                name: template.name,
                emoji: template.emoji,
                hp: Math.floor(template.hp * mult),
                maxHp: Math.floor(template.hp * mult),
                damage: Math.floor(template.damage * mult),
                gold: Math.floor(template.gold * mult),
                exp: Math.floor(template.exp * mult)
            };
        }

        function startBattle() {
            currentEnemy = getEnemy();
            game.hp = Math.min(game.maxHp, game.hp);
            game.ap = Math.min(game.maxAp, game.ap);
            enemyFrozen = false;
            game.buff = { dmgBonus: 0, defBonus: 0, turns: 0 };
            waitingForTurn = true;
            updateUI();
            addLog(`☢️ Появился ${currentEnemy.name}! Твой ход!`);
        }

        function calcPower() {
            return Math.floor(game.level * 10 + game.strength * 2 + game.maxHp / 10 + game.workers * 20);
        }

        function updateUI() {
            document.getElementById('gold').innerText = Math.floor(game.gold);
            document.getElementById('level').innerText = game.level;
            document.getElementById('power').innerText = calcPower();
            document.getElementById('ap').innerText = Math.floor(game.ap);
            
            if (currentEnemy) {
                let percent = (currentEnemy.hp / currentEnemy.maxHp) * 100;
                document.getElementById('enemyHpFill').style.width = `${Math.max(0, percent)}%`;
                document.getElementById('enemyHpText').innerHTML = `❤️ ${Math.max(0, Math.floor(currentEnemy.hp))}/${currentEnemy.maxHp}`;
                document.getElementById('enemyName').innerText = currentEnemy.name;
                document.getElementById('enemyEmoji').innerText = currentEnemy.emoji;
            }
            
            document.getElementById('playerName').innerText = game.character ? game.character.name : "Игрок";
            document.getElementById('playerHp').innerHTML = `❤️ ${Math.floor(game.hp)}/${game.maxHp}`;
            document.getElementById('playerAp').innerHTML = `💥 AP: ${Math.floor(game.ap)}/${game.maxAp}`;
            
            let avatar = document.getElementById('playerAvatar');
            if (avatar && game.character) {
                if (game.character.photo) {
                    avatar.innerHTML = `<img src="${game.character.photo}" onerror="this.style.display='none'; this.parentElement.innerHTML='🍺'">`;
                } else {
                    avatar.innerHTML = "🍺";
                }
            }
            
            let skillBtn = document.getElementById('skillBtn');
            if (skillBtn && game.character) {
                skillBtn.innerHTML = `✨ ${game.character.skill} ✨`;
                skillBtn.disabled = !waitingForTurn || enemyFrozen;
            }
        }

        function enemyTurn() {
            if (currentEnemy.hp <= 0) return;
            
            let dmg = currentEnemy.damage;
            if (game.buff.defBonus > 0) {
                dmg = Math.floor(dmg * (100 - game.buff.defBonus) / 100);
                addLog(`🛡️ Защита снизила урон до ${dmg}!`);
                game.buff.turns--;
                if (game.buff.turns <= 0) game.buff = { dmgBonus: 0, defBonus: 0, turns: 0 };
            }
            
            game.hp -= dmg;
            addLog(`💥 ${currentEnemy.name} наносит ${dmg} урона!`);
            
            if (game.hp <= 0) {
                addLog("💀 Ты погиб! Возрождение...");
                game.hp = Math.floor(game.maxHp / 2);
                game.ap = Math.floor(game.maxAp / 2);
                startBattle();
            }
            
            waitingForTurn = true;
            updateUI();
            save();
        }

        function attack() {
            if (!waitingForTurn) return;
            if (game.ap < 20) { addLog("❌ Нет AP!"); return; }
            
            game.ap -= 20;
            let dmg = game.strength + Math.floor(Math.random() * 10);
            if (game.buff.dmgBonus > 0) dmg += game.buff.dmgBonus;
            
            currentEnemy.hp -= dmg;
            addLog(`🔫 Атака! ${dmg} урона!`);
            
            if (currentEnemy.hp <= 0) {
                game.gold += currentEnemy.gold;
                game.exp += currentEnemy.exp;
                addLog(`✅ Победа! +${currentEnemy.gold}🍺 +${currentEnemy.exp} XP!`);
                
                let needExp = game.level * 100;
                while (game.exp >= needExp) {
                    game.level++;
                    game.exp -= needExp;
                    game.strength += 5;
                    game.maxHp += 20;
                    game.maxAp += 10;
                    game.hp = game.maxHp;
                    game.ap = game.maxAp;
                    needExp = game.level * 100;
                    addLog(`🎉 УРОВЕНЬ ${game.level}! 🎉`);
                }
                
                save();
                startBattle();
                updateRating();
                return;
            }
            
            waitingForTurn = false;
            updateUI();
            save();
            setTimeout(enemyTurn, 800);
        }

        function useSkill() {
            if (!waitingForTurn) return;
            if (!game.character) { addLog("❌ Выбери персонажа!"); return; }
            if (enemyFrozen) { addLog("❌ Враг заморожен!"); return; }
            
            let skillCost = 40;
            if (game.ap < skillCost) { addLog(`❌ Нужно ${skillCost} AP!`); return; }
            
            game.ap -= skillCost;
            let effect = "";
            
            // Уникальные способности
            switch(game.character.name) {
                case "Алина":
                    enemyFrozen = true;
                    effect = "❄️ Враг заморожен и пропустит ход!";
                    break;
                case "Бень":
                    game.buff = { dmgBonus: 20, defBonus: 0, turns: 2 };
                    effect = "🐻 +20 к урону на 2 хода!";
                    break;
                case "Богдан":
                    game.buff = { dmgBonus: 0, defBonus: 50, turns: 1 };
                    effect = "🛡️ -50% урона на 1 ход!";
                    break;
                case "Ваня":
                    let dmg = (game.strength + Math.floor(Math.random() * 10)) * 2;
                    currentEnemy.hp -= dmg;
                    effect = `⚡ Двойная атака! ${dmg} урона!`;
                    break;
                case "Егор":
                    let rageDmg = Math.floor((game.strength + Math.random() * 10) * 1.5);
                    currentEnemy.hp -= rageDmg;
                    effect = `😤 Ярость! ${rageDmg} урона!`;
                    break;
                case "Илюха":
                    let heal = 40;
                    game.hp = Math.min(game.maxHp, game.hp + heal);
                    effect = `💚 Исцеление! +${heal} HP!`;
                    break;
                case "Капрал":
                    game.buff = { dmgBonus: 15, defBonus: 0, turns: 3 };
                    effect = "🎖️ +15 к урону на 3 хода!";
                    break;
                case "Кирилл":
                    let shadowDmg = game.strength + 15;
                    currentEnemy.hp -= shadowDmg;
                    effect = `🌑 Теневой удар! ${shadowDmg} урона!`;
                    break;
                case "Лера":
                    enemyFrozen = true;
                    effect = "✨ Враг ослеплён и пропустит ход!";
                    break;
                case "Никитос":
                    game.ap += 15;
                    effect = "⚡ +15 AP!";
                    break;
                case "Полина":
                    let vampDmg = game.strength + Math.floor(Math.random() * 10);
                    currentEnemy.hp -= vampDmg;
                    let vampHeal = Math.floor(vampDmg / 2);
                    game.hp = Math.min(game.maxHp, game.hp + vampHeal);
                    effect = `🧛 Вампиризм! ${vampDmg} урона, +${vampHeal} HP!`;
                    break;
                default:
                    let defDmg = game.strength + 15;
                    currentEnemy.hp -= defDmg;
                    effect = `✨ ${game.character.skill}! ${defDmg} урона!`;
            }
            
            addLog(`✨ ${game.character.skill}! ${effect}`);
            
            if (currentEnemy.hp <= 0) {
                game.gold += currentEnemy.gold;
                game.exp += currentEnemy.exp;
                addLog(`✅ Победа! +${currentEnemy.gold}🍺 +${currentEnemy.exp} XP!`);
                
                let needExp = game.level * 100;
                while (game.exp >= needExp) {
                    game.level++;
                    game.exp -= needExp;
                    game.strength += 5;
                    game.maxHp += 20;
                    game.maxAp += 10;
                    game.hp = game.maxHp;
                    game.ap = game.maxAp;
                    needExp = game.level * 100;
                    addLog(`🎉 УРОВЕНЬ ${game.level}! 🎉`);
                }
                
                save();
                startBattle();
                updateRating();
                return;
            }
            
            if (!enemyFrozen) {
                waitingForTurn = false;
                updateUI();
                save();
                setTimeout(enemyTurn, 800);
            } else {
                enemyFrozen = false;
                addLog("❄️ Враг пропускает ход!");
                waitingForTurn = true;
                updateUI();
                save();
            }
        }

        function defend() {
            if (!waitingForTurn) return;
            if (game.ap < 15) { addLog("❌ Нет AP!"); return; }
            
            game.ap -= 15;
            game.buff = { dmgBonus: 0, defBonus: 50, turns: 1 };
            addLog("🛡️ Защита! -50% урона в следующем ходу!");
            
            waitingForTurn = false;
            updateUI();
            save();
            setTimeout(enemyTurn, 800);
        }

        function heal() {
            if (!waitingForTurn) return;
            if (game.ap < 30) { addLog("❌ Нет AP!"); return; }
            
            game.ap -= 30;
            let healAmount = 40;
            game.hp = Math.min(game.maxHp, game.hp + healAmount);
            addLog(`💚 Лечение! +${healAmount} HP!`);
            
            waitingForTurn = false;
            updateUI();
            save();
            setTimeout(enemyTurn, 800);
        }

        function selectCharacter(char) {
            game.character = char;
            game.strength = char.strength;
            game.maxHp = char.hp;
            game.hp = char.hp;
            save();
            addLog(`🎭 Выбран ${char.name}! Сила: ${char.strength}, HP: ${char.hp}`);
            document.getElementById('charInfo').innerHTML = `✅ Выбран ${char.name}! ⚔️${char.strength} ❤️${char.hp}`;
            updateUI();
        }

        function upgrade(type) {
            let cost = 0;
            if (type === 'str') {
                let lvl = Math.floor(game.strength / 5);
                cost = Math.floor(50 * Math.pow(1.5, lvl));
                if (game.gold >= cost) {
                    game.gold -= cost;
                    game.strength += 5;
                    addLog(`✅ Сила +5!`);
                } else { addLog(`❌ Нужно ${cost}🍺`); return; }
            } else if (type === 'hp') {
                let lvl = Math.floor(game.maxHp / 20);
                cost = Math.floor(60 * Math.pow(1.5, lvl));
                if (game.gold >= cost) {
                    game.gold -= cost;
                    game.maxHp += 20;
                    game.hp += 20;
                    addLog(`✅ HP +20!`);
                } else { addLog(`❌ Нужно ${cost}🍺`); return; }
            } else if (type === 'ap') {
                let lvl = Math.floor(game.maxAp / 10);
                cost = Math.floor(70 * Math.pow(1.5, lvl));
                if (game.gold >= cost) {
                    game.gold -= cost;
                    game.maxAp += 10;
                    game.ap += 10;
                    addLog(`✅ AP +10!`);
                } else { addLog(`❌ Нужно ${cost}🍺`); return; }
            } else if (type === 'worker') {
                let lvl = game.workers;
                cost = Math.floor(100 * Math.pow(1.8, lvl));
                if (game.gold >= cost) {
                    game.gold -= cost;
                    game.workers += 1;
                    addLog(`✅ Нанят работник! +1🍺/сек!`);
                } else { addLog(`❌ Нужно ${cost}🍺`); return; }
            }
            updateUI();
            save();
        }

        function updateRating() {
            let ratings = JSON.parse(localStorage.getItem('beer_rating') || '[]');
            let power = calcPower();
            let existing = ratings.find(r => r.id === userId);
            if (existing) {
                existing.name = game.character?.name || userName;
                existing.level = game.level;
                existing.power = power;
            } else {
                ratings.push({ id: userId, name: game.character?.name || userName, level: game.level, power: power });
            }
            ratings.sort((a, b) => b.power - a.power);
            ratings = ratings.slice(0, 30);
            localStorage.setItem('beer_rating', JSON.stringify(ratings));
            
            let container = document.getElementById('ratingList');
            if (container) {
                container.innerHTML = '';
                ratings.slice(0, 10).forEach((r, i) => {
                    let medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '•';
                    container.innerHTML += `<div class="leaderboard-item"><span>${medal} ${r.name}</span><span>⚡${r.power} | 🏆${r.level}</span></div>`;
                });
            }
        }

        function save() {
            let toSave = { ...game };
            delete toSave.character;
            localStorage.setItem(`beer_game_${userId}`, JSON.stringify(toSave));
            if (game.character) localStorage.setItem(`beer_char_${userId}`, JSON.stringify(game.character));
            updateRating();
        }

        function load() {
            let saved = localStorage.getItem(`beer_game_${userId}`);
            if (saved) {
                let data = JSON.parse(saved);
                game = { ...game, ...data };
            }
            let savedChar = localStorage.getItem(`beer_char_${userId}`);
            if (savedChar) game.character = JSON.parse(savedChar);
            
            startBattle();
            updateUI();
            updateRating();
            
            let grid = document.getElementById('charsGrid');
            if (grid) {
                grid.innerHTML = '';
                FRIENDS.forEach(f => {
                    let selected = game.character?.name === f.name;
                    grid.innerHTML += `
                        <div class="char-card ${selected ? 'selected' : ''}" data-name="${f.name}">
                            <div class="char-avatar"><img src="${f.photo}" onerror="this.style.display='none'; this.parentElement.innerHTML='🍺'"></div>
                            <div class="char-name">${f.name}</div>
                            <div style="font-size:8px;">⚔️${f.strength} ❤️${f.hp}</div>
                        </div>
                    `;
                });
                document.querySelectorAll('.char-card').forEach(card => {
                    let name = card.dataset.name;
                    let friend = FRIENDS.find(f => f.name === name);
                    card.addEventListener('click', () => selectCharacter(friend));
                });
            }
        }

        // ПАССИВНЫЙ ДОХОД
        setInterval(() => {
            if (game.workers > 0) {
                game.gold += game.workers;
                updateUI();
                save();
            }
        }, 1000);

        // СОБЫТИЯ
        document.getElementById('attackBtn')?.addEventListener('click', attack);
        document.getElementById('skillBtn')?.addEventListener('click', useSkill);
        document.getElementById('defendBtn')?.addEventListener('click', defend);
        document.getElementById('healBtn')?.addEventListener('click', heal);
        document.querySelectorAll('[data-upgrade]').forEach(btn => btn.addEventListener('click', () => upgrade(btn.dataset.upgrade)));
        
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(`${tab.dataset.tab}-panel`).classList.add('active');
                if (tab.dataset.tab === 'rating') updateRating();
            });
        });

        load();
    </script>
</body>
</html>
