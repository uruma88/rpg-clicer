<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PISOK RPG: DIABLO EDITION</title>
    <!-- Библиотека для чата -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0a0a0c; --card: #16161e; --accent: #f1c40f; --win: #2ecc71; --loss: #e74c3c; --rarity2: #3498db; --rarity3: #9b59b6; }
        body { margin: 0; background: var(--bg); color: #eee; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        #game-container { max-width: 480px; margin: 0 auto; min-height: 100vh; padding: 15px; box-sizing: border-box; }
        
        .screen { display: none; flex-direction: column; }
        .active { display: flex; }

        /* Кукла героя (Paperdoll) */
        .paperdoll { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .slot { background: #1c1c24; border: 1px solid #333; border-radius: 12px; padding: 10px; display: flex; flex-direction: column; align-items: center; cursor: pointer; min-height: 60px; }
        .slot:hover { border-color: var(--accent); }
        .slot-name { font-size: 9px; color: #666; text-transform: uppercase; margin-bottom: 4px; }
        .slot-icon { font-size: 24px; }
        .item-info { font-size: 10px; text-align: center; font-weight: bold; }

        /* Редкость */
        .r1 { color: #fff; }
        .r2 { color: var(--rarity2); text-shadow: 0 0 5px rgba(52,152,219,0.5); }
        .r3 { color: var(--rarity3); text-shadow: 0 0 8px rgba(155,89,182,0.7); }

        /* Инвентарь */
        .inv-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 10px; border: 1px solid #222; }
        .inv-item { aspect-ratio: 1; background: #1c1c24; border: 1px solid #333; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; }

        /* Чат */
        .chat-box { height: 200px; background: #000; border-radius: 10px; overflow-y: auto; padding: 10px; font-size: 12px; border: 1px solid #333; margin-bottom: 10px; }
        .msg { margin-bottom: 5px; } .msg b { color: var(--accent); }

        /* Общие стили */
        .hero-panel { background: var(--card); border-radius: 20px; padding: 15px; border: 1px solid #333; }
        .hp-bar { width: 100%; height: 8px; background: #222; border-radius: 4px; overflow: hidden; margin: 5px 0; }
        .hp-fill { height: 100%; transition: 0.3s; background: var(--loss); }
        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: bold; margin-bottom: 8px; cursor: pointer; color: #fff; text-transform: uppercase; font-size: 12px; }
        .btn-battle { background: linear-gradient(135deg, #e74c3c, #c0392b); }
        .btn-blue { background: #3498db; }
    </style>
</head>
<body>

<div id="game-container">
    <!-- ГОРОД -->
    <div id="screen-city" class="screen active">
        <div class="hero-panel">
            <div style="display:flex; justify-content:space-between; align-items:center">
                <h3 id="p-name" style="margin:0">ЮРА</h3>
                <span style="color:var(--accent)">POWER: <span id="p-power">0</span></span>
            </div>
            <div class="hp-bar"><div id="hp-fill" class="hp-fill"></div></div>
            
            <div class="paperdoll">
                <div class="slot" onclick="unequip('weapon')">
                    <span class="slot-name">Оружие</span>
                    <span id="slot-weapon-icon" class="slot-icon">👊</span>
                    <span id="slot-weapon-name" class="item-info">Пусто</span>
                </div>
                <div class="slot" onclick="unequip('armor')">
                    <span class="slot-name">Торс</span>
                    <span id="slot-armor-icon" class="slot-icon">👕</span>
                    <span id="slot-armor-name" class="item-info">Пусто</span>
                </div>
                <div class="slot" onclick="unequip('helmet')">
                    <span class="slot-name">Шлем</span>
                    <span id="slot-helmet-icon" class="slot-icon">🪖</span>
                    <span id="slot-helmet-name" class="item-info">Пусто</span>
                </div>
                <div class="slot" onclick="unequip('ring')">
                    <span class="slot-name">Кольцо</span>
                    <span id="slot-ring-icon" class="slot-icon">💍</span>
                    <span id="slot-ring-name" class="item-info">Пусто</span>
                </div>
            </div>

            <div style="display:flex; justify-content:space-around; background:#000; padding:10px; border-radius:10px; font-size:12px;">
                <span>💰 <span id="p-gold">0</span></span>
                <span>📦 <span id="p-inv-count">0</span>/20</span>
            </div>
        </div>

        <div style="margin-top:15px">
            <button class="btn btn-battle" onclick="startBattle()">⚔️ В БОЙ (ЭТАЖ <span id="cur-floor">1</span>)</button>
            <button class="btn btn-blue" onclick="showScreen('screen-chat')">💬 ГЛОБАЛЬНЫЙ ЧАТ</button>
        </div>

        <h4 style="margin:10px 0; font-size:12px; color:#555">ИНВЕНТАРЬ</h4>
        <div id="inventory-grid" class="inv-grid"></div>
    </div>

    <!-- БОЙ -->
    <div id="screen-battle" class="screen">
        <div style="text-align:center; padding:40px 0">
            <div id="e-icon" style="font-size:70px">👹</div>
            <h2 id="e-name">МОНСТР</h2>
            <div class="hp-bar" style="max-width:200px; margin:10px auto"><div id="e-hp-fill" class="hp-fill" style="background:var(--win)"></div></div>
            <div id="battle-log" style="height:40px; font-size:12px; color:#888"></div>
        </div>
        <button class="btn btn-battle" onclick="doAttack()">НАНЕСТИ УДАР</button>
    </div>

    <!-- ЧАТ -->
    <div id="screen-chat" class="screen">
        <h3>ОНЛАЙН ЧАТ</h3>
        <div id="chat-box" class="chat-box"></div>
        <div style="display:flex; gap:5px">
            <input type="text" id="chat-input" style="flex:1; padding:10px; border-radius:8px; border:none; background:#222; color:#fff" placeholder="Сообщение...">
            <button class="btn btn-blue" style="width:60px; margin:0" onclick="sendMessage()">➤</button>
        </div>
        <button class="btn" style="background:#444; margin-top:10px" onclick="showScreen('screen-city')">НАЗАД</button>
    </div>
</div>

<script>
    // 1. Инициализация Supabase
    const SUPABASE_URL = 'https://uvyapclbduzxuyxqnbvz.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_juj8gj9mZGfv_ltA4VH4pg_Vl4uPmy5'; // Без S в конце!
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // --- ДАННЫЕ ИГРОКА ---
    let p = JSON.parse(localStorage.getItem('psk_rpg_diablo')) || {
        name: 'Юра', 
        gold: 100, 
        hp: 100, 
        max: 100, 
        floor: 1,
        equipment: { weapon: null, armor: null, helmet: null, ring: null },
        inv: []
    };
    
    let enemy = null;

    function save() { localStorage.setItem('psk_rpg_diablo', JSON.stringify(p)); }

    function updateUI() {
        document.getElementById('p-gold').innerText = p.gold;
        document.getElementById('cur-floor').innerText = p.floor;
        document.getElementById('hp-fill').style.width = (p.hp/p.max*100) + '%';
        document.getElementById('p-inv-count').innerText = p.inv.length;

        // Обновление куклы
        let power = 5;
        for (let type in p.equipment) {
            const item = p.equipment[type];
            const iconEl = document.getElementById(`slot-${type}-icon`);
            const nameEl = document.getElementById(`slot-${type}-name`);
            if (item) {
                iconEl.innerText = item.icon;
                nameEl.innerText = `+${item.stat}`;
                nameEl.className = `item-info r${item.rarity}`;
                power += item.stat;
            } else {
                iconEl.innerText = getPlaceholder(type);
                nameEl.innerText = 'Пусто';
                nameEl.className = 'item-info';
            }
        }
        p.power = power;
        document.getElementById('p-power').innerText = power;

        // Рендер инвентаря
        const grid = document.getElementById('inventory-grid');
        grid.innerHTML = '';
        p.inv.forEach((item, idx) => {
            const div = document.createElement('div');
            div.className = `inv-item r${item.rarity}`;
            div.innerHTML = item.icon;
            div.onclick = () => equipItem(idx);
            grid.appendChild(div);
        });
        save();
    }

    function getPlaceholder(t) {
        const icons = { weapon: '👊', armor: '👕', helmet: '🪖', ring: '💍' };
        return icons[t];
    }

    // --- ЛОГИКА ПРЕДМЕТОВ ---
    function equipItem(idx) {
        const item = p.inv[idx];
        const type = item.type;
        if (p.equipment[type]) p.inv.push(p.equipment[type]);
        p.equipment[type] = item;
        p.inv.splice(idx, 1);
        updateUI();
    }

    function unequip(type) {
        if (p.equipment[type] && p.inv.length < 20) {
            p.inv.push(p.equipment[type]);
            p.equipment[type] = null;
            updateUI();
        }
    }

    function dropLoot() {
        const types = [
            {t:'weapon', i:'⚔️', n:'Меч'}, {t:'armor', i:'🛡️', n:'Доспех'},
            {t:'helmet', i:'🪖', n:'Шлем'}, {t:'ring', i:'💍', n:'Кольцо'}
        ];
        const type = types[Math.floor(Math.random()*types.length)];
        const rarity = Math.random() > 0.9 ? 3 : (Math.random() > 0.7 ? 2 : 1);
        const newItem = {
            type: type.t, icon: type.i, rarity: rarity,
            stat: (rarity * 5) + Math.floor(Math.random() * p.floor)
        };
        if (p.inv.length < 20) p.inv.push(newItem);
    }

    // --- БОЕВАЯ СИСТЕМА ---
    function startBattle() {
        enemy = { 
            hp: 20 + (p.floor * 10), max: 20 + (p.floor * 10), 
            atk: 3 + p.floor, icon: p.floor % 5 === 0 ? '🐉' : '👹' 
        };
        document.getElementById('e-hp-fill').style.width = '100%';
        document.getElementById('e-icon').innerText = enemy.icon;
        document.getElementById('battle-log').innerText = "Бой начался!";
        showScreen('screen-battle');
    }

    function doAttack() {
        // Игрок бьет
        enemy.hp -= p.power;
        if (enemy.hp <= 0) {
            p.gold += 20 + p.floor;
            p.floor++;
            if(Math.random() > 0.5) dropLoot();
            alert("Победа!");
            showScreen('screen-city');
            updateUI();
            return;
        }
        // Враг бьет
        p.hp -= enemy.atk;
        document.getElementById('e-hp-fill').style.width = (enemy.hp/enemy.max*100) + '%';
        if (p.hp <= 0) { p.hp = p.max; p.floor = Math.max(1, p.floor - 1); alert("Ты проиграл и отступил."); showScreen('screen-city'); }
        updateUI();
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // --- ТУТ БУДЕТ SUPABASE ---
    function sendMessage() {
        const val = document.getElementById('chat-input').value;
        if(!val) return;
        const box = document.getElementById('chat-box');
        box.innerHTML += `<div class="msg"><b>${p.name}:</b> ${val}</div>`;
        document.getElementById('chat-input').value = '';
        box.scrollTop = box.scrollHeight;
        // Здесь будет supabase.from('messages').insert(...)
    }
// --- ЛОГИКА ЧАТА (Добавь это вниз) ---

// 1. Загрузка истории (вызывай это при открытии экрана чата)
async function loadHistory() {
    const { data, error } = await supabaseClient
        .from('messages')
        .select('*')
        .order('created_at', { ascending: false })
        .limit(30);

    if (error) return console.error("Ошибка загрузки:", error);

    const box = document.getElementById('chat-box');
    box.innerHTML = '';
    data.reverse().forEach(m => {
        box.innerHTML += `<div class="msg"><b>${m.username}:</b> ${m.text}</div>`;
    });
    box.scrollTop = box.scrollHeight;
}

// 2. Слушаем новые сообщения (Realtime)
supabaseClient
    .channel('public:messages')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
        const box = document.getElementById('chat-box');
        box.innerHTML += `<div class="msg"><b>${payload.new.username}:</b> ${payload.new.text}</div>`;
        box.scrollTop = box.scrollHeight;
    })
    .subscribe();

// 3. Обновленная функция отправки (замени свою старую на эту)
async function sendMessage() {
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    if (!text) return;

    await supabaseClient.from('messages').insert([{ username: p.name, text: text }]);
    input.value = '';
}
    updateUI();
</script>
</body>
</html>
